name: Weekly Energy Brief Generation

on:
  schedule:
    - cron: '0 1 * * 2'  # 매주 화요일 10:00 KST (UTC+9)
  workflow_dispatch:       # 수동 트리거 가능

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Generate brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python pipeline/generate_brief.py

      - name: Commit & push output
        run: |
          git config user.name "gridedge-bot"
          git config user.email "bot@gridedge.io"
          git add docs/brief_latest.json docs/brief_latest.html
          git diff --cached --quiet || git commit -m "brief: $(date +'%Y-W%V')"
          git push
