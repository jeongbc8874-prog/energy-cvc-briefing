name: Daily Energy Brief Generation

on:
  schedule:
    - cron: '0 1 * * 1-5'   # 월-금 오전 10:00 KST (UTC+1 = KST-9+10)
  workflow_dispatch:          # 수동 트리거 가능

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python generate_brief.py

      - name: Commit & push output
        run: |
          git config user.name "gridedge-bot"
          git config user.email "bot@gridedge.io"
          git add docs/brief_latest.json docs/brief_latest.html docs/briefs/ docs/archive.html
          git stash
          git pull --rebase origin main
          git stash pop
          git diff --cached --quiet || git commit -m "brief: $(date +'%Y-%m-%d')"
          git push
