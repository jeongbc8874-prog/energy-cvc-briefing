name: Daily Energy CVC Signals

on:
  schedule:
    - cron: '0 22 * * *'   # 매일 오전 7시 KST (UTC 22:00)
  workflow_dispatch:         # 수동 실행 가능

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Collect signals
        run: python collect_energy_signals.py
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        continue-on-error: true
  
      - name: Run pipeline
        run: python generate-signals.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Build company profiles      ← 이것만 추가
        run: python build_company_profile.py


      - name: Commit & push data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "CVC AI Agent"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily signals: $(date '+%Y-%m-%d')"
          git push
