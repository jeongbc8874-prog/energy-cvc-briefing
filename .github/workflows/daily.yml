- name: Collect signals
  run: BASE_DIR=data python collect_energy_signals.py

- name: Process capital flow
  run: python process_capital_flow.py

- name: Commit & push data
  run: |
    git config --local user.email "action@github.com"
    git config --local user.name "CVC AI Agent"
    git add data/
    git diff --quiet && git diff --staged --quiet || git commit -m "Daily capital flow update: $(date '+%Y-%m-%d')"
    git push
