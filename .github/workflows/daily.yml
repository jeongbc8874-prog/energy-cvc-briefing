name: Daily CVC Signal Generator

on:
  schedule:
    - cron: '0 22 * * *'   # 매일 오전 7시 KST (UTC 22:00)
  workflow_dispatch:         # 수동 실행 가능

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate signals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: node generate-signals.js

      - name: Commit & push data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "CVC AI Agent"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily signals: $(date '+%Y-%m-%d')"
          git push
