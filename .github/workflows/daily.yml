name: Daily Energy CVC Briefing

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: node generate.js

      - name: Save result
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Energy CVC AI Agent"
          git add index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily briefing"
          git push
