<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Energy CVC Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&family=Spectral:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#F6F4F0;color:#1A1710;min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#E6E2DA;border-radius:99px;}

.header{background:#0F2744;padding:13px 24px;position:sticky;top:0;z-index:100;border-bottom:1px solid #0A1E38;}
.header-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.header h1{font-family:'Spectral',serif;font-size:18px;font-weight:700;color:#F0EDE6;letter-spacing:-0.2px;}
.header-sub{font-size:11px;color:#6B7F96;margin-top:2px;}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.badge-live{font-family:'DM Mono',monospace;font-size:10px;color:#4ADE80;padding:3px 10px;border-radius:20px;background:#0F3020;border:1px solid #1A5030;}

.tab-bar{background:#162336;border-bottom:1px solid #1E2E38;padding:0 24px;}
.tab-bar-inner{max-width:1280px;margin:0 auto;display:flex;}
.tab{font-size:12px;font-weight:500;color:#6B7F96;padding:11px 16px;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;}
.tab.active{color:#C8DFF0;border-bottom-color:#4A9EFF;font-weight:600;}

.filter-bar{background:#F6F4F0;padding:10px 24px;border-bottom:1px solid #E6E2DA;position:sticky;top:50px;z-index:90;}
.filter-bar-inner{max-width:1280px;margin:0 auto;display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.chip{font-size:11px;font-weight:500;padding:4px 11px;border-radius:20px;border:1px solid #E6E2DA;background:#fff;color:#4A4538;cursor:pointer;transition:all 0.15s;}
.chip.active{background:#1B3A5C;color:#fff;border-color:#1B3A5C;font-weight:600;}
.chip.kr.active{background:#2A1E00;color:#FCD34D;border-color:#FFD700;}
.chip.cn.active{background:#7A0000;color:#fff;border-color:#CC0000;}
.chip.green.active{background:#0F3020;color:#4ADE80;border-color:#1A5030;}
.search-box{flex:1;min-width:160px;max-width:260px;padding:5px 12px;border:1px solid #E6E2DA;border-radius:20px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;}
.search-box:focus{border-color:#1B3A5C;}

.main{max-width:1280px;margin:0 auto;padding:18px 24px;display:grid;grid-template-columns:210px 1fr;gap:18px;}
@media(max-width:768px){.main{grid-template-columns:1fr;padding:12px 14px;}}

/* 사이드바 */
.sidebar{display:flex;flex-direction:column;gap:11px;}
.card{background:#fff;border:1px solid #E6E2DA;border-radius:7px;overflow:hidden;}
.card-hd{padding:10px 14px;border-bottom:1px solid #F0EDE8;font-size:10px;font-weight:700;color:#8A8070;text-transform:uppercase;letter-spacing:0.5px;}
.card-bd{padding:13px 14px;}
.stat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.stat-row:last-child{margin-bottom:0;}
.sn{font-family:'DM Mono',monospace;font-size:15px;font-weight:700;}
.sl{font-size:12px;color:#4A4538;}

/* 정책 트리거 */
.policy-item{padding:9px 11px;border-radius:5px;margin-bottom:6px;cursor:pointer;transition:all 0.15s;}
.policy-item:hover{transform:translateY(-1px);}
.policy-label{font-size:12px;font-weight:600;margin-bottom:3px;}
.policy-desc{font-size:11px;line-height:1.5;color:#4A4538;}
.policy-cos{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.policy-co{font-size:10px;padding:1px 6px;border-radius:10px;background:rgba(255,255,255,0.6);}

/* 피드 */
.feed-wrap{background:#fff;border:1px solid #E6E2DA;border-radius:7px;overflow:hidden;}
.feed-hd{padding:10px 18px;border-bottom:1px solid #E6E2DA;display:flex;justify-content:space-between;align-items:center;}
.feed-title{font-size:11px;font-weight:700;color:#8A8070;text-transform:uppercase;letter-spacing:0.5px;}
.feed-count{font-family:'DM Mono',monospace;font-size:10px;color:#B8B0A0;}

/* 신호 카드 */
.signal{border-bottom:1px solid #F0EDE8;transition:background 0.1s;cursor:pointer;}
.signal:last-child{border-bottom:none;}
.signal:hover{background:#FAF9F6;}
.signal-hd{padding:12px 18px;}
.signal-bd{padding:0 18px 14px;animation:fadeIn 0.2s;}
.badges{display:flex;align-items:center;gap:4px;margin-bottom:5px;flex-wrap:wrap;}
.b{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:3px;font-size:11px;font-weight:600;white-space:nowrap;}
.b-unlisted{background:#EDF6F1;color:#1A5C36;border:1px solid #A7E3BE;}
.b-listed{background:#F4F2EE;color:#8A8070;border:1px solid #D8D0C4;}
.b-eco{background:#EDF2F8;color:#1B3A5C;border:1px solid #C0D4EC;}
.b-high{background:#FDF0F0;color:#7A2020;border:1px solid #F0C0C0;}
.b-med{background:#FDF4E8;color:#6B3600;border:1px solid #F0D8A8;}
.b-low{background:#F4F2EE;color:#8A8070;border:1px solid #D8D0C4;}
.b-real{background:#EDF6F1;color:#1A5C36;border:1px solid #A7E3BE;}
.b-action{background:#FDF0F0;color:#7A2020;border:1px solid #F0C0C0;font-weight:700;}
.b-stage{background:#F0EDE8;color:#5A4A30;border:1px solid #D8C8A0;}
.b-cat-kr{background:#FFF8E0;color:#92400E;border:1px solid #EAD640;}
.b-cat-cn{background:#FFF0F0;color:#CC0000;border:1px solid #FFB0B0;}
.b-cat-gl{background:#EDF2F8;color:#1B3A5C;border:1px solid #C0D4EC;}
.title-row{display:flex;align-items:baseline;gap:7px;flex-wrap:wrap;}
.co-name{font-size:13px;font-weight:700;flex-shrink:0;}
.sig-title{font-size:13px;font-weight:600;color:#1A1710;line-height:1.4;text-decoration:none;}
.sig-title:hover{text-decoration:underline;color:#1B3A5C;}
.expand-hint{font-size:10px;color:#B8B0A0;margin-top:3px;}

/* 딥 인사이트 */
.insight-box{background:#FFFBEE;border:1px solid #EAD640;border-radius:5px;padding:11px 13px;margin-bottom:8px;}
.insight-lbl{font-size:10px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px;}
.insight-txt{font-size:12px;color:#4A3500;line-height:1.75;}
.action-box{background:#FFF8DC;border-radius:4px;padding:5px 9px;margin-top:6px;font-size:12px;color:#4A3500;}
.risk-box{background:#FEF2F2;border:1px solid #FCA5A5;border-radius:4px;padding:5px 9px;margin-top:5px;font-size:11px;color:#7A2020;}

/* 스코어카드 */
.scorecard{background:#F0F7FF;border:1px solid #BFDBFE;border-radius:6px;padding:11px 13px;margin-bottom:8px;}
.sc-title{font-size:10px;font-weight:700;color:#1E40AF;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.sc-conviction{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.sc-item{background:rgba(255,255,255,0.7);border-radius:4px;padding:6px 8px;}
.sc-item-label{font-size:10px;color:#4A5568;margin-bottom:3px;}
.sc-bar-wrap{display:flex;align-items:center;gap:5px;}
.sc-bar-bg{flex:1;height:4px;background:#DBEAFE;border-radius:99px;overflow:hidden;}
.sc-bar-fill{height:100%;border-radius:99px;}
.sc-score{font-family:'DM Mono',monospace;font-size:10px;color:#1E40AF;font-weight:600;}
.sc-timing{font-size:11px;color:#1E40AF;font-weight:600;margin-top:5px;}
.sc-oneline{font-size:12px;color:#1E3A8A;font-style:italic;margin-top:4px;padding-top:5px;border-top:1px solid #BFDBFE;}

/* 유사 딜 */
.comp-deals{background:#F5F3FF;border:1px solid #DDD6FE;border-radius:6px;padding:11px 13px;margin-bottom:8px;}
.comp-title{font-size:10px;font-weight:700;color:#5B21B6;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px;}
.deal-item{background:rgba(255,255,255,0.7);border-radius:4px;padding:7px 9px;margin-bottom:5px;}
.deal-item:last-child{margin-bottom:0;}
.deal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.deal-co{font-size:12px;font-weight:700;color:#5B21B6;}
.deal-amt{font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:#7C3AED;}
.deal-meta{font-size:10px;color:#6D28D9;}
.deal-inv{font-size:10px;color:#7C3AED;margin-top:2px;}

/* 정책 트리거 (신호 내) */
.policy-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.ptag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}

/* 출처 */
.source-row{font-size:10px;color:#B8B0A0;margin-bottom:10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.real-badge{background:#EDF6F1;color:#1A5C36;border:1px solid #A7E3BE;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;}
.ai-badge{background:#FDF4E8;color:#6B3600;border:1px solid #F0D8A8;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;}

/* 기업 프로파일 탭 */
.profile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.profile-card{background:#fff;border:1px solid #E6E2DA;border-radius:7px;padding:15px;cursor:pointer;transition:all 0.15s;}
.profile-card:hover{border-color:#1B3A5C;box-shadow:0 2px 8px rgba(27,58,92,0.1);}
.profile-name{font-size:14px;font-weight:700;color:#1A1710;margin-bottom:4px;}
.profile-meta{font-size:11px;color:#8A8070;margin-bottom:8px;}
.profile-stats{display:flex;gap:10px;margin-bottom:8px;}
.profile-stat{text-align:center;}
.profile-stat-n{font-family:'DM Mono',monospace;font-size:16px;font-weight:700;color:#1A1710;}
.profile-stat-l{font-size:10px;color:#8A8070;}
.profile-history{display:flex;gap:3px;align-items:flex-end;height:30px;}
.history-bar{flex:1;border-radius:2px 2px 0 0;min-width:4px;}

/* 브리핑 */
.brief-card{background:#0F2744;border-radius:7px;padding:16px 20px;margin-bottom:14px;}
.brief-title{font-family:'Spectral',serif;font-size:13px;font-weight:700;color:#EDE9E0;margin-bottom:7px;display:flex;align-items:center;gap:8px;}
.brief-text{font-size:12px;color:#9AB0C0;line-height:1.9;white-space:pre-wrap;}

/* 통계 카드 */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
@media(max-width:600px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:#fff;border:1px solid #E6E2DA;border-radius:7px;padding:11px 13px;}
.stat-card-n{font-family:'DM Mono',monospace;font-size:20px;font-weight:700;}
.stat-card-l{font-size:11px;color:#8A8070;margin-top:2px;}

/* 히스토리 */
.history-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.history-card{background:#fff;border:1px solid #E6E2DA;border-radius:7px;padding:13px;cursor:pointer;transition:all 0.15s;}
.history-card:hover{border-color:#1B3A5C;}
.history-date{font-family:'DM Mono',monospace;font-size:12px;color:#1B3A5C;font-weight:600;margin-bottom:4px;}

.empty{text-align:center;padding:48px 24px;}
.loading{text-align:center;padding:40px;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.spinner{font-size:26px;animation:spin 1.5s linear infinite;display:inline-block;margin-bottom:10px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <h1>⚡ Energy CVC Intelligence</h1>
      <div class="header-sub">국내 + 글로벌 + 중국 · 기업 프로파일 · 스코어카드 · 정책 트리거 · 유사 딜</div>
    </div>
    <div class="header-right">
      <div class="badge-live" id="liveBadge">● 로딩 중</div>
      <button onclick="copyReport()" id="copyBtn" style="display:none;font-size:11px;font-weight:600;padding:5px 12px;border-radius:5px;background:#1A5C36;color:#fff;border:none;cursor:pointer;">📋 복사</button>
      <button onclick="switchTab('settings')" style="font-size:11px;color:#C8DFF0;background:none;border:1px solid #2A3F58;border-radius:5px;padding:5px 11px;cursor:pointer;">⚙ 설정</button>
    </div>
  </div>
</div>

<div class="tab-bar">
  <div class="tab-bar-inner">
    <button class="tab active" onclick="switchTab('today')">📡 오늘 신호</button>
    <button class="tab" onclick="switchTab('profiles')">🏢 기업 프로파일</button>
    <button class="tab" onclick="switchTab('policy')">📋 정책 트리거</button>
    <button class="tab" onclick="switchTab('history')">🗂 과거 검색</button>
    <button class="tab" onclick="switchTab('settings')">⚙ 설정</button>
  </div>
</div>

<div class="filter-bar" id="filterBar">
  <div class="filter-bar-inner">
    <input class="search-box" id="searchInput" placeholder="🔍 기업명, 키워드…" oninput="renderFeed()">
    <button class="chip active" onclick="setFilter('all',this)">전체</button>
    <button class="chip kr" onclick="setFilter('kr',this)">🇰🇷 국내</button>
    <button class="chip" onclick="setFilter('global',this)">🌍 글로벌</button>
    <button class="chip cn" onclick="setFilter('cn',this)">🇨🇳 중국</button>
    <button class="chip green" onclick="setFilter('unlisted',this)">🟢 비상장</button>
    <button class="chip" onclick="setFilter('high',this)">🔴 High</button>
    <button class="chip" onclick="setFilter('investigate',this)">⚡ 즉시검토</button>
    <button class="chip" onclick="setFilter('scorecard',this)">📊 스코어카드</button>
  </div>
</div>

<div class="main" id="mainGrid">
  <div class="sidebar">
    <div class="card"><div class="card-hd">결과 요약</div><div class="card-bd" id="statsBox"><div style="font-size:11px;color:#B8B0A0">로딩 중…</div></div></div>
    <div class="card"><div class="card-hd">🗂 날짜별</div><div class="card-bd" style="padding:7px 7px" id="dateList"><div style="font-size:11px;color:#B8B0A0">로딩 중…</div></div></div>
    <div class="card" id="policyCard"><div class="card-hd">📋 정책 트리거</div><div class="card-bd" id="policyMini"></div></div>
  </div>
  <div id="feedArea"><div class="loading"><div class="spinner">⟳</div><div style="font-size:13px;color:#8A8070">데이터 로딩 중…</div></div></div>
</div>

<!-- 설정 패널 -->
<div id="settingsPanel" style="display:none;padding:24px;max-width:560px;margin:0 auto;">
  <div class="card"><div class="card-hd">API 설정</div><div class="card-bd">
    <div style="font-size:12px;color:#8A8070;margin-bottom:12px;line-height:1.6">데이터는 GitHub Actions가 매일 오전 7시(KST) 자동 수집합니다.</div>
    <div style="padding:12px;background:#F0FDF4;border-radius:5px;border:1px solid #A7E3BE;font-size:11px;color:#1A5C36;line-height:1.7">
      ✓ 매일 오전 7시 KST 자동 실행<br>
      ✓ NewsAPI 실제 뉴스 수집<br>
      ✓ Claude AI 투자 분석<br>
      ✓ 기업 프로파일 누적 저장<br>
      ✓ 스코어카드 자동 생성
    </div>
  </div></div>
</div>

<script>
let DATA=null, SIGNALS=[], DATE_INDEX=[], PROFILES={}, POLICY=[];
let currentFilter="all", currentView="all", expandedIds=new Set(), currentTab="today";

// ── 데이터 로드 ────────────────────────────────────────────
async function loadData() {
  try {
    const res=await fetch("data/latest.json?"+Date.now());
    if(!res.ok)throw new Error("없음");
    DATA=await res.json();
    SIGNALS=DATA.signals||[];
    POLICY=DATA.policyTriggers||[];
    document.getElementById("liveBadge").textContent="● "+( DATA.dateKr||DATA.date);
    document.getElementById("copyBtn").style.display="flex";
    renderSidebar();renderFeed();renderPolicyMini();
  } catch(e) {
    document.getElementById("liveBadge").textContent="● 데이터 없음";
    document.getElementById("feedArea").innerHTML=`<div class="empty"><div style="font-size:36px;margin-bottom:12px">📭</div><div style="font-family:'Spectral',serif;font-size:18px;margin-bottom:8px">데이터 없음</div><div style="font-size:13px;color:#8A8070">Actions → Run workflow 실행 후 새로고침</div></div>`;
  }
}
async function loadIndex() {
  try{const r=await fetch("data/index.json?"+Date.now());if(!r.ok)return;DATE_INDEX=await r.json();renderDateList();}catch{}
}
async function loadProfiles() {
  try{const r=await fetch("data/company-profiles.json?"+Date.now());if(!r.ok)return;PROFILES=await r.json();}catch{}
}

// ── 사이드바 ───────────────────────────────────────────────
function renderSidebar() {
  if(!DATA)return;
  const s=DATA.stats;
  document.getElementById("statsBox").innerHTML=`
    ${[{n:s.total,l:"총 신호",c:"#1A1710"},{n:s.unlisted||0,l:"🟢 비상장",c:"#1A5C36"},{n:s.kr,l:"🇰🇷 국내",c:"#B8860B"},{n:s.global,l:"🌍 글로벌",c:"#1B3A5C"},{n:s.cn,l:"🇨🇳 중국",c:"#CC0000"},{n:s.high,l:"High",c:"#B83232"},{n:s.investigate,l:"즉시 검토",c:"#A85400"},{n:s.withScorecard||0,l:"📊 스코어카드",c:"#1E40AF"},{n:s.profiledCompanies||0,l:"🏢 프로파일",c:"#5B21B6"}]
    .map(x=>`<div class="stat-row"><span class="sl">${x.l}</span><span class="sn" style="color:${x.c}">${x.n||0}</span></div>`).join("")}`;
}
function renderDateList() {
  const el=document.getElementById("dateList");
  if(!DATE_INDEX.length){el.innerHTML=`<div style="font-size:11px;color:#B8B0A0">없음</div>`;return;}
  el.innerHTML=DATE_INDEX.slice(0,20).map(d=>`
    <div onclick="loadDate('${d.date}')" style="padding:6px 8px;border-radius:4px;cursor:pointer;margin-bottom:2px;transition:background 0.1s" onmouseover="this.style.background='#F0EDE8'" onmouseout="this.style.background='transparent'">
      <div style="font-size:11px;color:#1A1710;font-weight:500">${d.dateKr||d.date}</div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:#B8B0A0">${d.stats?.total||0}건 · High ${d.stats?.high||0}</div>
    </div>`).join("");
}
function renderPolicyMini() {
  const el=document.getElementById("policyMini");
  if(!POLICY.length){el.innerHTML=`<div style="font-size:11px;color:#B8B0A0">없음</div>`;return;}
  const urgencyStyle={High:"background:#FDF0F0;border:1px solid #F0C0C0;",Medium:"background:#FDF4E8;border:1px solid #F0D8A8;",Low:"background:#F4F2EE;border:1px solid #D8D0C4;"};
  const urgencyColor={High:"#7A2020",Medium:"#6B3600",Low:"#8A8070"};
  el.innerHTML=POLICY.slice(0,5).map(p=>`
    <div class="policy-item" style="${urgencyStyle[p.urgency]||''}" onclick="switchTab('policy')">
      <div class="policy-label" style="color:${urgencyColor[p.urgency]||'#1A1710'}">${p.label} <span style="font-size:10px;font-weight:400;opacity:0.7">[${p.region}]</span></div>
      <div class="policy-desc">${p.desc.slice(0,70)}…</div>
      <div class="policy-cos">${(p.beneficiaries||[]).slice(0,3).map(c=>`<span class="policy-co" style="color:${urgencyColor[p.urgency]}">${c.split("(")[0].trim()}</span>`).join("")}</div>
    </div>`).join("");
}

// ── 피드 렌더링 ────────────────────────────────────────────
function getFiltered() {
  const q=(document.getElementById("searchInput")?.value||"").toLowerCase();
  return SIGNALS.filter(s=>{
    if(currentFilter==="kr")        return s.isKorean;
    if(currentFilter==="global")    return !s.isKorean&&!s.isChina;
    if(currentFilter==="cn")        return s.isChina;
    if(currentFilter==="unlisted")  return s.companyType==="unlisted_startup";
    if(currentFilter==="high")      return s.relevance==="High";
    if(currentFilter==="investigate")return s.next_action==="Investigate";
    if(currentFilter==="scorecard") return !!s.scorecard;
    return true;
  }).filter(s=>!q||(s.company||"").toLowerCase().includes(q)||(s.title||"").toLowerCase().includes(q)||(s.category||"").toLowerCase().includes(q)||(s.deep_insight||"").toLowerCase().includes(q))
  .sort((a,b)=>{
    const sa=(a.companyType==="unlisted_startup"?10:0)+({High:3,Medium:1,Low:0}[a.relevance]||0);
    const sb=(b.companyType==="unlisted_startup"?10:0)+({High:3,Medium:1,Low:0}[b.relevance]||0);
    return sb-sa;
  });
}

function renderFeed() {
  const signals=getFiltered();
  const area=document.getElementById("feedArea");
  let html="";

  // 통계
  if(DATA?.stats){
    const s=DATA.stats;
    html+=`<div class="stats-grid">${[{n:s.total,l:"총 신호",c:"#1A1710"},{n:s.unlisted||0,l:"🟢 비상장",c:"#1A5C36"},{n:s.high,l:"High",c:"#B83232"},{n:s.investigate||0,l:"즉시 검토",c:"#A85400"}].map(x=>`<div class="stat-card"><div class="stat-card-n" style="color:${x.c}">${x.n||0}</div><div class="stat-card-l">${x.l}</div></div>`).join("")}</div>`;
  }

  // 브리핑
  if(DATA?.brief){
    html+=`<div class="brief-card"><div class="brief-title">✦ 오늘의 CVC 딥 브리핑 <span style="font-family:'DM Mono',monospace;font-size:9px;color:#4ADE80;background:#0F3020;padding:2px 7px;border-radius:3px;border:1px solid #1A5030">실제뉴스 기반</span></div><div class="brief-text">${esc(DATA.brief)}</div></div>`;
  }

  if(!signals.length){html+=`<div class="card empty"><div style="font-size:30px;margin-bottom:10px">🔍</div><div style="font-size:14px;color:#8A8070">해당 조건의 신호 없음</div></div>`;area.innerHTML=html;return;}

  html+=`<div class="feed-wrap"><div class="feed-hd"><span class="feed-title">투자 신호 · 비상장 우선</span><span class="feed-count">${signals.length}건</span></div>`;

  signals.forEach(s=>{
    const open=expandedIds.has(s.id);
    const isU=s.companyType==="unlisted_startup", isKr=s.isKorean, isCn=s.isChina;
    const borderColor=isKr?"#B8860B":isCn?"#EE1C25":isU?"#1A5C36":s.relevance==="High"?"#B83232":"transparent";
    const catBadgeCls=isKr?"b-cat-kr":isCn?"b-cat-cn":"b-cat-gl";
    const typeBadge=isU?`<span class="b b-unlisted">🟢 비상장</span>`:s.companyType==="ecosystem"?`<span class="b b-eco">생태계</span>`:`<span class="b b-listed">상장</span>`;
    const relBadge=`<span class="b b-${(s.relevance||"low").toLowerCase()}">${s.relevance}</span>`;
    const stageBadge=s.fundingStage&&s.fundingStage!=="N/A"?`<span class="b b-stage">${s.fundingStage}</span>`:"";
    const rtBadge=s.isRealNews?`<span class="b b-real">✓실시간</span>`:"";
    const actBadge=s.next_action&&s.next_action!=="Skip"?`<span class="b b-action">→${s.next_action}</span>`:"";
    const coColor=isU?"#1A5C36":isKr?"#92400E":isCn?"#CC0000":"#1B3A5C";
    const hasSc=!!s.scorecard, hasDeals=(s.comparableDeals||[]).length>0, hasPolicy=(s.policyTriggers||[]).length>0;

    html+=`<div class="signal" style="border-left:3px solid ${borderColor}" onclick="toggleExpand('${s.id}')">
      <div class="signal-hd">
        <div class="badges">
          ${typeBadge}${stageBadge}<span class="b ${catBadgeCls}">${s.emoji||""} ${s.category}</span>
          <span class="b" style="background:#F4F2EE;color:#8A8070;border:1px solid #D8D0C4;font-size:10px">${s.country}</span>
          ${rtBadge}${relBadge}${actBadge}
          ${hasSc?`<span class="b" style="background:#DBEAFE;color:#1E40AF;border:1px solid #BFDBFE">📊</span>`:""}
          ${hasDeals?`<span class="b" style="background:#EDE9FE;color:#5B21B6;border:1px solid #DDD6FE">🔗</span>`:""}
          ${hasPolicy?`<span class="b" style="background:#FEF3C7;color:#92400E;border:1px solid #FCD34D">📋</span>`:""}
          <span style="margin-left:auto;font-family:'DM Mono',monospace;font-size:9px;color:#B8B0A0">${s.pubDate||""}</span>
        </div>
        <div class="title-row">
          ${s.company&&s.company!=="Unknown"?`<span class="co-name" style="color:${coColor}">${esc(s.company)}</span>`:""}
          ${s.url?`<a class="sig-title" href="${esc(s.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(s.title||"")}</a>`:`<span class="sig-title" style="cursor:default">${esc(s.title||"")}</span>`}
        </div>
        ${!open?`<div class="expand-hint">▼ 딥 인사이트${hasSc?" · 스코어카드":""}${hasDeals?" · 유사딜":""}${hasPolicy?" · 정책":""}  클릭</div>`:""}
      </div>`;

    if(open){
      html+=`<div class="signal-bd">
        <div class="source-row">
          ${s.isRealNews?`<span class="real-badge">✓ 실제뉴스</span>`:`<span class="ai-badge">AI생성</span>`}
          <span>${esc(s.source||"")}</span><span>·</span><span>${esc(s.pubDate||"")}</span>
          ${s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener" style="color:#1B3A5C;font-size:10px;" onclick="event.stopPropagation()">원문 보기 →</a>`:""}
        </div>
        <div style="font-size:12px;color:#4A4538;line-height:1.7;margin-bottom:10px">${esc(s.summary||"")}</div>`;

      // 딥 인사이트
      if(s.deep_insight){
        html+=`<div class="insight-box"><div class="insight-lbl">✦ 에너지 심사역 딥 인사이트</div><div class="insight-txt">${esc(s.deep_insight)}</div>
          ${s.cvc_action?`<div class="action-box">📋 CVC 액션: ${esc(s.cvc_action)}</div>`:""}
          ${s.risk?`<div class="risk-box">⚠ 리스크: ${esc(s.risk)}</div>`:""}
        </div>`;
      }

      // 스코어카드
      if(s.scorecard){
        const sc=s.scorecard;
        const items=[{k:"technology",l:"기술 검증"},{k:"commercialization",l:"상업화"},{k:"team",l:"팀 신호"},{k:"partnership",l:"파트너십"},{k:"fundraising_timing",l:"자금조달 임박"}];
        const convColor={High:"#1A5C36",Medium:"#A85400",Low:"#B83232"}[sc.conviction]||"#8A8070";
        const convBg={High:"#EDF6F1",Medium:"#FDF4E8",Low:"#FDF0F0"}[sc.conviction]||"#F4F2EE";
        const timingColor={Immediate:"#B83232","3-6months":"#A85400","6-12months":"#1B3A5C",Watch:"#8A8070"}[sc.timing_signal]||"#8A8070";
        html+=`<div class="scorecard">
          <div class="sc-title">📊 투자 스코어카드 <span class="sc-conviction" style="background:${convBg};color:${convColor}">${sc.conviction}</span></div>
          <div class="sc-grid">${items.map(item=>{const v=sc[item.k];if(!v)return"";const pct=(v.score/v.max)*100;return`<div class="sc-item"><div class="sc-item-label">${item.l}</div><div class="sc-bar-wrap"><div class="sc-bar-bg"><div class="sc-bar-fill" style="width:${pct}%;background:#3B82F6"></div></div><span class="sc-score">${v.score}/${v.max}</span></div>${v.reason?`<div style="font-size:10px;color:#4A5568;margin-top:2px">${esc(v.reason)}</div>`:""}</div>`;}).join("")}</div>
          <div class="sc-timing" style="color:${timingColor}">⏱ 타이밍: ${sc.timing_signal}</div>
          ${sc.one_line?`<div class="sc-oneline">${esc(sc.one_line)}</div>`:""}
        </div>`;
      }

      // 유사 딜 레퍼런스
      if((s.comparableDeals||[]).length>0){
        html+=`<div class="comp-deals"><div class="comp-title">🔗 유사 딜 레퍼런스 (해외 비교)</div>
          ${s.comparableDeals.map(d=>`<div class="deal-item">
            <div class="deal-top"><span class="deal-co">${esc(d.company)}</span><span class="deal-amt">${esc(d.amount)}</span></div>
            <div class="deal-meta">${esc(d.country)} · ${esc(d.sector)} · ${esc(d.stage)} · ${esc(d.year)}</div>
            ${d.valuation?`<div class="deal-meta">밸류에이션: ${esc(d.valuation)}</div>`:""}
            ${(d.investors||[]).length?`<div class="deal-inv">투자자: ${d.investors.slice(0,3).map(esc).join(", ")}</div>`:""}
          </div>`).join("")}
        </div>`;
      }

      // 정책 트리거
      if((s.policyTriggers||[]).length>0){
        html+=`<div style="background:#FEF9E7;border:1px solid #FCD34D;border-radius:5px;padding:10px 12px;margin-bottom:8px">
          <div style="font-size:10px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px">📋 정책/규제 트리거</div>
          ${s.policyTriggers.map(p=>`<div style="margin-bottom:5px"><span style="font-size:11px;font-weight:600;color:${p.urgency==="High"?"#7A2020":p.urgency==="Medium"?"#6B3600":"#8A8070"}">${p.label} [${p.region}]</span><div style="font-size:11px;color:#4A3500;margin-top:2px">${esc(p.desc)}</div></div>`).join("")}
        </div>`;
      }

      html+=`</div>`;
    }
    html+=`</div>`;
  });
  html+=`</div>`;
  area.innerHTML=html;
}

// ── 기업 프로파일 탭 ──────────────────────────────────────
function renderProfiles() {
  const area=document.getElementById("feedArea");
  const cos=Object.values(PROFILES);
  if(!cos.length){area.innerHTML=`<div class="empty"><div style="font-size:36px;margin-bottom:12px">🏢</div><div style="font-size:14px;color:#8A8070">누적 프로파일 없음<br><small>매일 자동 실행되면 쌓입니다</small></div></div>`;return;}
  cos.sort((a,b)=>(b.highCount||0)-(a.highCount||0));
  area.innerHTML=`<div class="profile-grid">${cos.map(p=>{
    const sc=p.latestScorecard;
    const convColor={High:"#1A5C36",Medium:"#A85400",Low:"#B83232"}[sc?.conviction]||"#8A8070";
    return`<div class="profile-card">
      <div class="profile-name">${esc(p.name)}</div>
      <div class="profile-meta">${esc(p.sector)} · 최초: ${p.firstSeen||"?"} · 최근: ${p.lastSeen||"?"}</div>
      <div class="profile-stats">
        <div class="profile-stat"><div class="profile-stat-n">${p.signalCount||0}</div><div class="profile-stat-l">총 신호</div></div>
        <div class="profile-stat"><div class="profile-stat-n" style="color:#B83232">${p.highCount||0}</div><div class="profile-stat-l">High</div></div>
        <div class="profile-stat"><div class="profile-stat-n" style="color:#A85400">${p.recentActivity||0}</div><div class="profile-stat-l">30일</div></div>
      </div>
      ${sc?`<div style="font-size:11px;font-weight:600;color:${convColor};margin-top:5px">📊 ${sc.conviction} · ${sc.timing_signal||""}</div><div style="font-size:11px;color:#4A4538;font-style:italic;margin-top:3px">${esc(sc.one_line||"")}</div>`:""}
      ${p.fundingStage&&p.fundingStage!=="N/A"?`<div style="margin-top:6px"><span style="background:#F0EDE8;color:#5A4A30;border:1px solid #D8C8A0;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600">${p.fundingStage}</span></div>`:""}
    </div>`;}).join("")}</div>`;
}

// ── 정책 트리거 탭 ─────────────────────────────────────────
function renderPolicyTab() {
  const area=document.getElementById("feedArea");
  if(!POLICY.length){area.innerHTML=`<div class="empty"><div style="font-size:14px;color:#8A8070">정책 트리거 없음</div></div>`;return;}
  const urgencyStyle={High:"background:#FDF0F0;border:1px solid #F0C0C0;",Medium:"background:#FDF4E8;border:1px solid #F0D8A8;",Low:"background:#F4F2EE;border:1px solid #D8D0C4;"};
  const urgencyColor={High:"#7A2020",Medium:"#6B3600",Low:"#8A8070"};
  area.innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px">
    ${POLICY.map(p=>`<div style="${urgencyStyle[p.urgency]||''}border-radius:8px;padding:16px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div style="font-size:14px;font-weight:700;color:${urgencyColor[p.urgency]}">${esc(p.label)}</div>
        <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:${urgencyStyle[p.urgency].split(";")[0].replace("background:","")};color:${urgencyColor[p.urgency]}">${p.urgency} · ${p.region}</span>
      </div>
      <div style="font-size:12px;color:#4A4538;line-height:1.7;margin-bottom:10px">${esc(p.desc)}</div>
      <div style="font-size:10px;font-weight:600;color:${urgencyColor[p.urgency]};margin-bottom:5px">수혜 기업</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">${(p.beneficiaries||[]).map(c=>`<span style="font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,0.7);color:${urgencyColor[p.urgency]};font-weight:500">${esc(c.split("(")[0].trim())}</span>`).join("")}</div>
      <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">${(p.sectors||[]).map(s=>`<span style="font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(255,255,255,0.5);color:#4A4538">${esc(s)}</span>`).join("")}</div>
    </div>`).join("")}
  </div>`;
}

// ── 히스토리 탭 ───────────────────────────────────────────
function renderHistory() {
  const area=document.getElementById("feedArea");
  if(!DATE_INDEX.length){area.innerHTML=`<div class="empty"><div style="font-size:14px;color:#8A8070">히스토리 없음</div></div>`;return;}
  area.innerHTML=`<div class="history-grid">${DATE_INDEX.map(d=>`<div class="history-card" onclick="loadDate('${d.date}')">
    <div class="history-date">${d.date}</div>
    <div style="font-size:12px;color:#4A4538;margin-bottom:6px">${d.dateKr||""}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">${[{n:d.stats?.total||0,l:"총",c:"#1A1710"},{n:d.stats?.high||0,l:"High",c:"#B83232"},{n:d.stats?.kr||0,l:"국내",c:"#B8860B"},{n:d.stats?.cn||0,l:"중국",c:"#CC0000"}].map(x=>`<span style="font-size:11px;color:${x.c}">${x.l} ${x.n}</span>`).join("")}</div>
  </div>`).join("")}</div>`;
}

// ── UI 이벤트 ─────────────────────────────────────────────
function switchTab(tab) {
  currentTab=tab;
  document.querySelectorAll(".tab").forEach((t,i)=>{t.classList.toggle("active",["today","profiles","policy","history","settings"][i]===tab);});
  document.getElementById("filterBar").style.display=tab==="today"?"block":"none";
  document.getElementById("settingsPanel").style.display=tab==="settings"?"block":"none";
  document.getElementById("mainGrid").style.display=tab==="settings"?"none":"grid";
  if(tab==="today")renderFeed();
  else if(tab==="profiles")renderProfiles();
  else if(tab==="policy")renderPolicyTab();
  else if(tab==="history")renderHistory();
}

function setFilter(f,btn){currentFilter=f;document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));btn.classList.add("active");renderFeed();}
function toggleExpand(id){if(expandedIds.has(id))expandedIds.delete(id);else expandedIds.add(id);renderFeed();}
function esc(str){return(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

async function loadDate(date) {
  try{const r=await fetch(`data/${date}.json?`+Date.now());if(!r.ok)throw new Error();DATA=await r.json();SIGNALS=DATA.signals||[];POLICY=DATA.policyTriggers||[];switchTab("today");}
  catch{alert(`${date} 데이터를 불러올 수 없습니다.`);}
}

function copyReport(){
  if(!DATA)return;
  const s=DATA.stats;
  let t=`ENERGY CVC INTELLIGENCE — ${DATA.dateKr||DATA.date}\n총 ${s.total}건 · 비상장 ${s.unlisted||0} · High ${s.high}\n${"=".repeat(60)}\n\n`;
  if(DATA.brief)t+=`【CVC 딥 브리핑】\n${DATA.brief}\n\n${"=".repeat(60)}\n\n`;
  getFiltered().forEach((sig,i)=>{
    t+=`${i+1}. [${sig.relevance}] ${sig.company||""} (${sig.fundingStage||sig.companyType})\n   ${sig.title}\n   출처: ${sig.source||""} · ${sig.pubDate||""}\n   ${sig.summary||""}\n   ▶ ${sig.deep_insight||""}\n`;
    if(sig.cvc_action)t+=`   📋 ${sig.cvc_action}\n`;
    if(sig.risk)t+=`   ⚠ ${sig.risk}\n`;
    if(sig.scorecard)t+=`   📊 ${sig.scorecard.conviction} · ${sig.scorecard.timing_signal} · ${sig.scorecard.one_line||""}\n`;
    if(sig.url)t+=`   🔗 ${sig.url}\n`;
    t+="\n";
  });
  navigator.clipboard.writeText(t).then(()=>alert("✅ 복사 완료!")).catch(()=>alert("복사 실패"));
}

document.addEventListener("DOMContentLoaded",async()=>{
  await Promise.all([loadData(),loadIndex(),loadProfiles()]);
});
</script>
