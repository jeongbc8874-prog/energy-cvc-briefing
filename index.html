function getProposals(){
  try{ return JSON.parse(localStorage.getItem("src_proposals")||"[]"); }
  catch(e){ return []; }
}
function saveProposals(arr){
  try{ localStorage.setItem("src_proposals",JSON.stringify(arr)); }
  catch(e){ console.warn("localStorage unavailable — proposals not persisted"); }
}

function submitProposal(){
  var name   = (document.getElementById("p-name")||{}).value.trim();
  var url    = (document.getElementById("p-url")||{}).value.trim();
  var type   = (document.getElementById("p-type")||{}).value;
  var tier   = (document.getElementById("p-tier")||{}).value;
  var geo    = (document.getElementById("p-geo")||{}).value  || "GLOBAL";
  var lang   = (document.getElementById("p-lang")||{}).value || "en";
  var topics = (document.getElementById("p-topics")||{}).value.trim();
  var reason = (document.getElementById("p-reason")||{}).value.trim();
  var limits = (document.getElementById("p-limits")||{}).value.trim();

  var err = document.getElementById("prop-error");
  var ok  = document.getElementById("prop-status");
  err.style.display="none"; ok.style.display="none";

  // Validate required fields
  var missing = [];
  if(!name)   missing.push("name");
  if(!url)    missing.push("RSS URL");
  if(!type)   missing.push("source type");
  if(!tier)   missing.push("reliability tier");
  if(!topics) missing.push("topics");
  if(!reason) missing.push("reason for proposal");
  if(missing.length){
    err.textContent = "Required: "+missing.join(", ");
    err.style.display="inline";
    return;
  }

  // Basic URL check
  if(!url.startsWith("http")){
    err.textContent = "RSS URL must start with http:// or https://";
    err.style.display="inline";
    return;
  }

  var proposal = {
    id:            "prop_"+Date.now(),
    name:          name,
    url:           url,
    source_type:   type,
    reliability:   parseInt(tier),
    topics:        topics.split(",").map(t=>t.trim()).filter(Boolean),
    geography:     geo,
    language:      lang,
    proposed_reason: reason,
    known_limitations: limits||null,
    proposed_date: new Date().toISOString().slice(0,10),
    status:        "pending",
    review_notes:  null,
  };

  var proposals = getProposals();
  proposals.unshift(proposal);
  saveProposals(proposals);

  ok.style.display="inline";
  clearProposalForm();
  renderProposalQueue();
}

function clearProposalForm(){
  ["p-name","p-url","p-topics","p-reason","p-limits"].forEach(id=>{
    var el=document.getElementById(id); if(el) el.value="";
  });
  ["p-type","p-tier"].forEach(id=>{
    var el=document.getElementById(id); if(el) el.selectedIndex=0;
  });
  var err=document.getElementById("prop-error");
  if(err) err.style.display="none";
}

function renderProposalQueue(){
  var body  = document.getElementById("prop-queue-body");
  var count = document.getElementById("prop-queue-count");
  if(!body) return;

  var proposals = getProposals();
  if(count) count.textContent = proposals.length;

  if(!proposals.length){
    body.innerHTML=`<div style="padding:14px;font-family:var(--mono);font-size:10px;color:var(--ink4)">No proposals yet. Use the form above to propose a new source.</div>`;
    return;
  }

  var statusClass = {pending:"prop-pending",approved:"prop-approved",rejected:"prop-rejected"};
  var h = "";
  proposals.forEach((p,idx)=>{
    var sc = statusClass[p.status]||"prop-pending";
    h += `<div class="prop-queue-item">`;
    h += `<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px">`;
    h += `<div><span style="font-size:13px;font-weight:600">${esc(p.name)}</span>`;
    h += ` <span class="rel-badge rel-${p.reliability}">Tier ${p.reliability}</span>`;
    h += ` <span class="type-badge type-${p.source_type}">${esc(p.source_type)}</span></div>`;
    h += `<div style="display:flex;gap:5px;align-items:center;flex-shrink:0">`;
    h += `<span class="prop-status ${sc}">${esc(p.status).toUpperCase()}</span>`;
    if(p.status==="pending"){
      h += `<button onclick="approveProposal(${idx})" style="font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 8px;background:#F0FDF4;color:#0A6640;border:1px solid #A7F3D0;cursor:pointer">✓ APPROVE</button>`;
      h += `<button onclick="rejectProposal(${idx})" style="font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 8px;background:#FEE2E2;color:var(--red);border:1px solid #FCA5A5;cursor:pointer">✗ REJECT</button>`;
    }
    h += `<button onclick="deleteProposal(${idx})" style="font-family:var(--mono);font-size:9px;padding:2px 8px;background:var(--bg);color:var(--ink4);border:1px solid var(--b);cursor:pointer">✕</button>`;
    h += `</div></div>`;
    h += `<div style="font-family:var(--mono);font-size:10px;color:var(--ink4);margin-bottom:5px">`;
    h += `<a href="${esc(p.url)}" target="_blank" rel="noopener" style="color:var(--blue)">${esc(p.url)}</a>`;
    h += ` · ${esc(p.geography)} · ${esc(p.language)} · Proposed ${esc(p.proposed_date)}</div>`;
    h += `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px">${(p.topics||[]).map(t=>`<span class="src-reg-topic">${esc(t)}</span>`).join("")}</div>`;
    h += `<div style="font-size:12px;color:var(--ink2);line-height:1.6"><b>Reason:</b> ${esc(p.proposed_reason)}</div>`;
    if(p.known_limitations) h += `<div style="font-size:11px;color:var(--amber);margin-top:3px"><b>Limitations:</b> ${esc(p.known_limitations)}</div>`;
    if(p.status!=="pending"){
      h += `<div style="margin-top:8px;padding:6px 10px;background:var(--bg);border-left:2px solid var(--b);font-family:var(--mono);font-size:10px;color:var(--ink4)">`;
      h += p.status==="approved"
        ? `✓ Approved. To activate: add entry to SOURCE_REGISTRY in generate-signals.py and redeploy.`
        : `✗ Rejected.`;
      if(p.review_notes) h += ` ${esc(p.review_notes)}`;
      h += `</div>`;
    }
    h += `</div>`;
  });
  body.innerHTML = h;
}

function approveProposal(idx){
  var proposals = getProposals();
  if(!proposals[idx]) return;
  var note = prompt("Approval note (optional — e.g. 'Add to ESS sources, Tier 2'):");
  proposals[idx].status = "approved";
  proposals[idx].review_notes = note||null;
  proposals[idx].reviewed_date = new Date().toISOString().slice(0,10);
  saveProposals(proposals);
  renderProposalQueue();
}

function rejectProposal(idx){
  var proposals = getProposals();
  if(!proposals[idx]) return;
  var note = prompt("Rejection reason:");
  proposals[idx].status = "rejected";
  proposals[idx].review_notes = note||"No reason given.";
  proposals[idx].reviewed_date = new Date().toISOString().slice(0,10);
  saveProposals(proposals);
  renderProposalQueue();
}

function deleteProposal(idx){
  if(!confirm("Delete this proposal?")) return;
  var proposals = getProposals();
  proposals.splice(idx,1);
  saveProposals(proposals);
  renderProposalQueue();
}

function renderSourcesTab(){
  var el=document.getElementById("feed-col"),log=SRCLOG,rel=D&&D.reliability||{};
  if(!log.length){el.innerHTML='<div class="box-nodata"><h3>Source status unavailable</h3><p>Run pipeline first. Requires generate-signals.py v2+</p></div>';return;}
  var ok=log.filter(s=>s.status==="success").length,par=log.filter(s=>s.status==="partial").length,fai=log.filter(s=>s.status==="failed").length;
  var sc=fai>0&&ok===0?"var(--red)":fai>0||par>0?"var(--amber)":"var(--green)";
  var h=`<div class="card"><div class="chd">Data Source Health</div><div style="padding:14px;border-bottom:1px solid var(--b2);display:flex;gap:20px;flex-wrap:wrap;align-items:center">`;
  [{n:ok,l:"Success",c:"var(--green)"},{n:par,l:"Partial",c:"var(--amber)"},{n:fai,l:"Failed",c:"var(--red)"},{n:log.length,l:"Total",c:"var(--ink)"}].forEach(x=>{h+=`<div><div style="font-family:var(--mono);font-size:20px;font-weight:700;color:${x.c}">${x.n}</div><div style="font-size:11px;color:var(--ink3)">${x.l}</div></div>`;});
  h+=`<div style="margin-left:auto"><span style="font-family:var(--mono);font-size:12px;font-weight:700;color:${sc}">${fai>0&&ok===0?"⚠ ALL FAILED":fai>0?"⚠ PARTIAL":"✓ ALL OK"}</span></div></div>`;
  log.forEach(s=>{
    var dc=s.status==="success"?"var(--green)":s.status==="partial"?"var(--amber)":"var(--red)";var ic=s.status==="success"?"✓":s.status==="partial"?"◐":"✗";
    var ts="";if(s.fetched_at){try{ts=new Date(s.fetched_at).toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});}catch(e){ts=s.fetched_at.slice(0,16);}}
    h+=`<div style="padding:14px 18px;border-bottom:1px solid var(--b2)${s.status==="failed"?";background:#FFF8F8":""}"><div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px"><div style="display:flex;align-items:center;gap:10px"><span style="font-family:var(--mono);font-size:14px;font-weight:700;color:${dc}">${ic}</span><span style="font-size:13px;font-weight:600">${esc(s.name)}</span></div><span style="font-family:var(--mono);font-size:10px;font-weight:700;color:${dc}">${s.status.toUpperCase()}</span></div>`;
    h+=`<div style="display:flex;gap:16px;flex-wrap:wrap;font-family:var(--mono);font-size:10px;color:var(--ink4);margin-bottom:${s.error?6:0}px"><span>Items: <b style="color:var(--ink2)">${s.items}</b></span><span>Fetched: <b style="color:var(--ink2)">${ts}</b></span>${s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener" style="color:var(--blue)">→ Feed URL</a>`:""}</div>`;
    if(s.error) h+=`<div style="font-family:var(--mono);font-size:10px;color:var(--red);background:#FFF5F5;padding:5px 9px;border-left:2px solid var(--red)">⚠ ${esc(s.error)}</div>`;
    h+=`</div>`;
  });
  h+=`<div style="padding:12px 18px;background:var(--bg);font-size:11px;color:var(--ink3);line-height:1.7">⚠ Failed source signals are not included. Data completeness may be affected.</div></div>`;
  el.innerHTML=h;
}

// WATCHLIST TAB
// MVP: pre-curated default watchlist (companies with watchlist_default=true)
// Paid pilot: user-editable watchlist with per-company alert thresholds
// Scale: shared team watchlists, alert webhooks
// ════════════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════════════
// WATCHLIST STORAGE ENGINE
// localStorage-based for MVP. Replace get/save fns with API calls
// in Paid Pilot tier — all UI logic above remains unchanged.
// ════════════════════════════════════════════════════════════════

var WL_KEY      = "eci_watchlist_v1";
var ALERTS_KEY  = "eci_alerts_seen_v1";
var WL_SEL      = null;   // currently selected watchlist item id for detail view

function wlGet(){
  try{ return JSON.parse(localStorage.getItem(WL_KEY)||"[]"); }
  catch(e){ return []; }
}
function wlSave(arr){
  try{ localStorage.setItem(WL_KEY,JSON.stringify(arr)); }
  catch(e){ console.warn("localStorage unavailable"); }
}
function alertsSeenGet(){
  try{ return JSON.parse(localStorage.getItem(ALERTS_KEY)||"[]"); }
  catch(e){ return []; }
}
function alertsSeenSave(arr){
  try{ localStorage.setItem(ALERTS_KEY,JSON.stringify(arr)); }
  catch(e){}
}

// Check if entity is on watchlist
function wlHas(entity_type, entity_id){
  return wlGet().some(function(w){ return w.entity_type===entity_type && w.entity_id===entity_id; });
}

// Get watchlist entry
function wlEntry(entity_type, entity_id){
  return wlGet().find(function(w){ return w.entity_type===entity_type && w.entity_id===entity_id; })||null;
}

// Add / update
function wlAdd(entry){
  var list = wlGet();
  var idx  = list.findIndex(function(w){ return w.entity_type===entry.entity_type && w.entity_id===entry.entity_id; });
  if(idx>=0) list[idx] = entry;
  else list.unshift(entry);
  wlSave(list);
}

// Remove
function wlRemove(entity_type, entity_id){
  wlSave(wlGet().filter(function(w){ return !(w.entity_type===entity_type && w.entity_id===entity_id); }));
}

// ════════════════════════════════════════════════════════════════
// ALERT ENGINE
// Checks alert_candidates[] (from JSON) against watchlist.
// Surfaces unread alerts. Marks alerts as seen.
// ════════════════════════════════════════════════════════════════

function getMatchingAlerts(){
  var candidates = D && D.alert_candidates || [];
  var watchlist  = wlGet();
  var seen       = alertsSeenGet();
  var results    = [];

  candidates.forEach(function(c){
    // Check if this entity is on watchlist
    var entry = watchlist.find(function(w){
      if(w.entity_id === c.entity_id) return true;
      // Segment watchlist matches any signal in that segment
      if(w.entity_type==="segment" && w.entity_id===c.segment) return true;
      return false;
    });
    if(!entry) return;

    // Check threshold
    var threshold = entry.threshold || "high";
    var scoreOk = (threshold==="all") ||
                  (threshold==="medium" && c.score>=35) ||
                  (threshold==="high"   && c.score>=60);
    if(!scoreOk && !c.alert_type==="negative") return;
    // Negative signals always pass threshold

    var alertId = c.signal_id + "_" + c.entity_id;
    results.push({
      ...c,
      alert_id:    alertId,
      is_new:      !seen.includes(alertId),
      wl_entry:    entry,
    });
  });

  // Sort: unread first, then negative, then score
  results.sort(function(a,b){
    if(a.is_new!==b.is_new) return a.is_new?-1:1;
    if(a.alert_type!==b.alert_type){
      if(a.alert_type==="negative") return -1;
      if(b.alert_type==="negative") return  1;
    }
    return b.score-a.score;
  });

  return results;
}

function countUnreadAlerts(){
  return getMatchingAlerts().filter(function(a){ return a.is_new; }).length;
}

function markAlertSeen(alertId){
  var seen = alertsSeenGet();
  if(!seen.includes(alertId)){
    seen.push(alertId);
    alertsSeenSave(seen);
  }
}

function markAllAlertsSeen(){
  var all = getMatchingAlerts().map(function(a){ return a.alert_id; });
  alertsSeenSave(all);
  renderAlerts();
  updateAlertBadge();
}

function dismissAlert(alertId){
  markAlertSeen(alertId);
  renderAlerts();
  updateAlertBadge();
}

function updateAlertBadge(){
  var n    = countUnreadAlerts();
  var badge= document.getElementById("alert-badge");
  var wlb  = document.getElementById("wl-badge");
  if(badge){ badge.textContent=n; badge.style.display=n>0?"inline":"none"; }
  if(wlb){ var wn=wlGet().length; wlb.textContent=wn; wlb.style.display=wn>0?"inline":"none"; }
}

// ADD-TO-WATCHLIST MODAL
// ════════════════════════════════════════════════════════════════

function wlToggleModal(entity_type, entity_id, entity_name, extra){
  var existing = wlEntry(entity_type, entity_id);
  if(existing){
    // Already watching — show edit or remove prompt
    showWlModal(entity_type, entity_id, entity_name, extra, existing);
  } else {
    showWlModal(entity_type, entity_id, entity_name, extra, null);
  }
}

function showWlModal(entity_type, entity_id, entity_name, extra, existing){
  var overlay = document.createElement("div");
  overlay.className = "wl-modal-overlay";
  overlay.id = "wl-modal-overlay";
  overlay.onclick = function(e){ if(e.target===overlay) closeWlModal(); };

  var typeLabels = {company:"Company",project:"Project",segment:"Segment",buyer:"Strategic Buyer"};
  var typeIcons  = {company:"🏢",project:"🏗",segment:"⚡",buyer:"🏭"};
  var thresholds = [
    {v:"high",   l:"High signals only (score ≥ 60)"},
    {v:"medium", l:"Medium + High (score ≥ 35)"},
    {v:"all",    l:"All signals including negatives"},
  ];
  var curTh = existing ? existing.threshold : "high";
  var curNote = existing ? (existing.note||"") : "";

  var h = `<div class="wl-modal">`;
  h += `<div class="wl-modal-hd">`;
  h += `<span class="wl-modal-title">${existing?"Edit":"Add to"} Watchlist</span>`;
  h += `<button class="wl-modal-close" onclick="closeWlModal()">✕</button>`;
  h += `</div>`;
  h += `<div class="wl-modal-body">`;

  // Entity header
  h += `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border:1px solid var(--b);margin-bottom:14px">`;
  h += `<span style="font-size:20px">${typeIcons[entity_type]||"●"}</span>`;
  h += `<div><div style="font-size:13px;font-weight:700">${esc(entity_name)}</div>`;
  h += `<div style="font-family:var(--mono);font-size:10px;color:var(--ink4)">${esc(typeLabels[entity_type]||entity_type)}</div></div>`;
  h += `</div>`;

  // Alert threshold
  h += `<div class="wl-field"><label>Alert Threshold</label>`;
  h += `<select id="wl-threshold">`;
  thresholds.forEach(function(t){
    h += `<option value="${t.v}"${t.v===curTh?" selected":""}>${t.l}</option>`;
  });
  h += `</select>`;
  h += `<div style="font-size:11px;color:var(--ink4);margin-top:3px">You'll see an alert in the Alerts tab when a signal above this threshold is detected for this entity.</div>`;
  h += `</div>`;

  // Note
  h += `<div class="wl-field"><label>Note (optional)</label>`;
  h += `<textarea id="wl-note" rows="2" style="resize:vertical" placeholder="e.g. Monitoring for Series C signals, check certification gate">${esc(curNote)}</textarea></div>`;

  // Email / Slack stubs
  h += `<div style="padding:8px 10px;background:#F0F5FF;border:1px solid #BFDBFE;font-size:11px;color:#1A56DB;margin-bottom:14px">`;
  h += `<b>Email / Slack delivery</b> — Paid Pilot feature.<br>Alerts are available in-app now. External delivery (email digest, Slack webhook) is wired in the Paid Pilot tier.`;
  h += `</div>`;

  // Actions
  h += `<div class="wl-modal-actions">`;
  h += `<button class="wl-save-btn" onclick="saveWlEntry('${entity_type}','${esc(entity_id)}','${esc(entity_name)}')">`;
  h += existing ? "Update" : "Add to Watchlist";
  h += `</button>`;
  if(existing){
    h += `<button onclick="removeFromWl('${entity_type}','${esc(entity_id)}')" style="font-family:var(--mono);font-size:10px;color:var(--red);background:none;border:none;cursor:pointer;padding:7px 10px">Remove</button>`;
  }
  h += `<button class="wl-modal-close" onclick="closeWlModal()" style="font-family:var(--mono);font-size:10px;color:var(--ink4);background:none;border:1px solid var(--b);padding:7px 10px;cursor:pointer">Cancel</button>`;
  h += `</div>`;
  h += `</div></div>`; // body + modal

  overlay.innerHTML = h;
  document.body.appendChild(overlay);
}

function saveWlEntry(entity_type, entity_id, entity_name){
  var threshold = (document.getElementById("wl-threshold")||{}).value || "high";
  var note      = (document.getElementById("wl-note")||{}).value || "";
  wlAdd({
    entity_type: entity_type,
    entity_id:   entity_id,
    entity_name: entity_name,
    threshold:   threshold,
    note:        note,
    added_at:    new Date().toISOString().slice(0,10),
  });
  closeWlModal();
  updateAlertBadge();
  // Re-render current tab to update button states
  if(curTab==="watchlist") renderWatchlist();
  if(curTab==="companies") renderCompanies();
  if(curTab==="projects")  renderProjects();
  if(curTab==="buyers")    renderBuyers();
}

function removeFromWl(entity_type, entity_id){
  wlRemove(entity_type, entity_id);
  closeWlModal();
  updateAlertBadge();
  if(curTab==="watchlist") renderWatchlist();
  if(curTab==="companies") renderCompanies();
}

function closeWlModal(){
  var o = document.getElementById("wl-modal-overlay");
  if(o) o.remove();
}

// ════════════════════════════════════════════════════════════════

function renderWatchlist(){
  var el   = document.getElementById("feed-col");
  var list = wlGet();
  var alerts = getMatchingAlerts();
  var unread = alerts.filter(function(a){ return a.is_new; }).length;

  if(!list.length){
    el.innerHTML = `<div class="wl-empty">
      <div style="font-size:36px;margin-bottom:12px">☆</div>
      <h3>Your watchlist is empty</h3>
      <p>Add companies, projects, segments, or strategic buyers to your watchlist using the <b>☆ Watch</b> button on any entity card. You'll see alerts here whenever a new high-signal event is detected for that entity.</p>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="gbtn" onclick="switchTabByName('companies')">Browse Companies →</button>
        <button class="gbtn" onclick="switchTabByName('projects')">Browse Projects →</button>
        <button class="gbtn" onclick="switchTabByName('buyers')">Browse Buyers →</button>
      </div>
    </div>`;
    return;
  }

  var typeIcon  = {company:"🏢",project:"🏗",segment:"⚡",buyer:"🏭"};
  var typeColor = {company:"var(--blue)",project:"#1A56DB",segment:"#5B21B6",buyer:"var(--green)"};
  var typeLabel = {company:"Company",project:"Project",segment:"Segment",buyer:"Strategic Buyer"};

  // Compute alert count per watchlist entry
  var alertsByEntity = {};
  alerts.forEach(function(a){
    alertsByEntity[a.entity_id] = (alertsByEntity[a.entity_id]||[]).concat([a]);
  });

  var h = `<div class="wl-grid">`;

  // ── Left sidebar: watchlist items ────────────────────────────────────
  h += `<div class="wl-sidebar"><div class="card">`;
  h += `<div class="chd">Watchlist <span style="font-weight:400;color:var(--ink4)">${list.length}</span>`;
  if(unread>0) h += `<span style="font-family:var(--mono);font-size:9px;font-weight:700;padding:1px 6px;background:#FEE2E2;color:var(--red);border-radius:10px;margin-left:6px">${unread} new</span>`;
  h += `</div>`;

  list.forEach(function(w){
    var ea = alertsByEntity[w.entity_id] || [];
    var newCt = ea.filter(function(a){ return a.is_new; }).length;
    var isSelected = WL_SEL===w.entity_id;
    var ic   = typeIcon[w.entity_type]||"●";
    var tc   = typeColor[w.entity_type]||"var(--ink4)";
    var thMap = {high:"th-high",medium:"th-medium",all:"th-all"};
    h += `<div class="wl-list-item${isSelected?" selected":""}" onclick="WL_SEL='${esc(w.entity_id)}';renderWatchlist()">`;
    h += `<div class="wl-item-icon" style="background:${tc}15;border:1px solid ${tc}35">${ic}</div>`;
    h += `<div style="flex:1;min-width:0">`;
    h += `<div class="wl-item-name">${esc(w.entity_name)}</div>`;
    h += `<div class="wl-item-meta">${esc(typeLabel[w.entity_type]||w.entity_type)} · <span class="threshold-pill ${thMap[w.threshold]||"th-high"}">${esc(w.threshold)}</span></div>`;
    h += `</div>`;
    if(newCt>0) h += `<span class="wl-item-badge">${newCt}</span>`;
    h += `</div>`;
  });

  h += `<div style="padding:8px 14px;border-top:1px solid var(--b2)">`;
  h += `<button class="gbtn" style="width:100%;font-size:10px" onclick="wlGet().forEach(function(w){wlRemove(w.entity_type,w.entity_id);});updateAlertBadge();renderWatchlist()">Clear All</button>`;
  h += `</div></div></div>`;

  // ── Right: alerts for selected entity (or all) ────────────────────────
  h += `<div>`;

  // Alert controls
  h += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">`;
  var selEntry = WL_SEL ? list.find(function(w){ return w.entity_id===WL_SEL; }) : null;
  h += `<div>`;
  if(selEntry){
    h += `<div style="font-size:14px;font-weight:700">${esc(selEntry.entity_name)}</div>`;
    h += `<div style="font-family:var(--mono);font-size:10px;color:var(--ink4)">`;
    h += `${esc(typeLabel[selEntry.entity_type]||"")} · threshold: <span class="threshold-pill ${selEntry.threshold==="high"?"th-high":selEntry.threshold==="medium"?"th-medium":"th-all"}">${esc(selEntry.threshold)}</span>`;
    if(selEntry.note) h += ` · ${esc(selEntry.note)}`;
    h += `</div>`;
  } else {

    h += `<button class="gbtn" onclick="showWlModal('${selEntry.entity_type}','${esc(selEntry.entity_id)}','${esc(selEntry.entity_name)}',{},wlEntry('${selEntry.entity_type}','${esc(selEntry.entity_id)}'))">Edit</button>`;
  }
  if(unread>0) h += `<button class="gbtn" onclick="markAllAlertsSeen()">Mark all read</button>`;
  if(WL_SEL) h += `<button class="gbtn" onclick="WL_SEL=null;renderWatchlist()">← All</button>`;
  h += `</div></div>`;

  // Render alert cards
  var visibleAlerts = WL_SEL
    ? alerts.filter(function(a){ return a.entity_id===WL_SEL; })
    : alerts;

  if(!visibleAlerts.length){
    h += `<div class="card"><div style="padding:28px;text-align:center">`;
    h += `<div style="font-size:28px;margin-bottom:8px">✓</div>`;
    h += `<div style="font-size:13px;font-weight:600;margin-bottom:4px">No alerts</div>`;
    h += `<div style="font-size:12px;color:var(--ink3)">`;
    h += D && D.alert_candidates && D.alert_candidates.length
      ? `No high-signal events today matched your watchlist threshold.`
      : `Pipeline hasn't run yet, or no signals were collected today.`;
    h += `</div></div></div>`;
  } else {
    h += renderAlertCards(visibleAlerts);
  }

  h += `</div>`; // right col
  h += `</div>`; // wl-grid
  el.innerHTML = h;
}

  h += `</div>`;

  h += `</div></div>`;

  } else {
    h += renderAlertCards(alerts);
  }

  el.innerHTML = h;

function renderAlertCards(alerts){
  var typeIcon  = {Certification:"✓",Contract:"📄",Deployment:"🚀",Pilot:"🔬",Financing:"💰",Hiring:"👤",Partnership:"🤝",Grant:"🏛",Negative:"⚠",News:"●"};
  var entityIcon= {company:"🏢",project:"🏗",segment:"⚡",buyer:"🏭"};
  var confColor2= {High:"#16A34A","Medium-High":"#65A30D",Medium:"#CA8A04","Medium-Low":"#EA580C",Low:"#DC2626"};
  var h = "";

  alerts.forEach(function(a){
    var isNeg   = a.alert_type==="negative";
    var isNew   = a.is_new;
    var cls     = isNeg?"alert-neg":a.score>=60?"alert-high":"alert-med";
    var ic      = typeIcon[a.event_type]||"●";
    var eic     = entityIcon[a.entity_type]||"●";
    var cc      = confColor2[a.confidence]||"var(--ink4)";
    var thLabel = (a.wl_entry&&a.wl_entry.threshold)||"high";
    var thMap   = {high:"th-high",medium:"th-medium",all:"th-all"};

    h += `<div class="alert-card ${cls}" style="${isNew?"box-shadow:0 0 0 1px var(--red)20;":""}">`;
    h += `<div class="alert-hd">`;

    // Icon
    h += `<div class="alert-icon" style="background:${isNeg?"#FEE2E2":a.score>=60?"#F0FDF4":"#FFFBEB"};border:1px solid ${isNeg?"#FCA5A5":a.score>=60?"#A7F3D0":"#FDE68A"}">${ic}</div>`;

    h += `<div class="alert-body">`;

    // Entity + type + new badge
    h += `<div class="alert-entity">`;
    h += `<span>${eic} ${esc(a.entity_name||"")}</span>`;
    h += `<span style="font-family:var(--mono);font-size:9px;color:var(--ink4)">/ ${esc(a.entity_type)}</span>`;
    if(isNew) h += `<span style="font-family:var(--mono);font-size:9px;font-weight:700;padding:1px 6px;background:#FEE2E2;color:var(--red);border-radius:10px">NEW</span>`;
    h += `<span style="margin-left:auto">`;
    if(isNeg) h += `<span style="font-family:var(--mono);font-size:9px;font-weight:700;color:var(--red);padding:1px 6px;background:#FEE2E2;border:1px solid #FCA5A5">⚠ NEG</span>`;
    else      h += `<span style="font-family:var(--mono);font-size:9px;font-weight:700;color:${a.score>=60?"var(--green)":"var(--amber)"};padding:1px 6px;background:${a.score>=60?"#F0FDF4":"#FFFBEB"};border:1px solid ${a.score>=60?"#A7F3D0":"#FDE68A"}">${a.score>=60?"HIGH":"MED"} ${a.score}</span>`;
    h += `</span>`;
    h += `</div>`;

    // Headline
    h += `<div class="alert-headline">${a.source_url?`<a href="${esc(a.source_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(a.headline)}</a>`:esc(a.headline)}</div>`;

    // Why it matters
    if(a.why_it_matters){
      h += `<div class="alert-why">${esc(a.why_it_matters)}</div>`;
    }

    // Meta row
    h += `<div class="alert-meta">`;
    h += `<span class="alert-conf" style="background:${cc}18;color:${cc};border:1px solid ${cc}40">● ${esc(a.confidence||"Low")}</span>`;
    h += `<span class="tag t0">${esc(a.event_type||"")}</span>`;
    h += `<span class="tag t0">${esc(a.segment||"")}</span>`;
    h += `<span style="font-family:var(--mono);font-size:9px;color:var(--ink4)">${esc(a.source)} · ${esc(a.date)}</span>`;
    if(a.stage) h += `<span style="font-family:var(--mono);font-size:9px;color:var(--ink4)">Stage: ${esc(a.stage)}</span>`;
    h += `</div>`;

    // Dismiss
    h += `<div style="margin-top:6px">`;
    if(isNew) h += `<button class="alert-dismiss" onclick="event.stopPropagation();dismissAlert('${a.alert_id}')">✓ Mark read</button>`;
    h += `<button class="alert-dismiss" onclick="event.stopPropagation();showWlModal('${a.entity_type}','${esc(a.entity_id)}','${esc(a.entity_name)}',{},wlEntry('${a.entity_type}','${esc(a.entity_id)}'))">⚙ Alert settings</button>`;
    h += `</div>`;

    h += `</div></div>`; // alert-body + alert-hd
    h += `</div>`; // alert-card
  });
  return h;
}

function renderErr(msg){
  document.getElementById("feed-col").innerHTML=`<div class="box-err"><h3>⚠ LOAD FAILED</h3><div style="font-size:12px;margin-bottom:6px">${esc(msg)}</div><div style="font-size:10px;color:#888">F12 → Console for details</div></div>`;
}

// ════════════════════════════════════════════════════════════════
// COPY REPORT
// ════════════════════════════════════════════════════════════════
function copyReport(){
  if(!D) return;
  var s=D.stats||{},rel=D.reliability||{};
  var t=`ENERGY CAPITAL INTELLIGENCE — ${D.dateKr||D.date}\nTotal ${s.total} · High ${s.high} · Neg ${s.negative}\nSources ok:${rel.sources_ok} partial:${rel.sources_partial} failed:${rel.sources_failed}\n${"=".repeat(50)}\n\n`;
  if(D.brief) t+=`[BRIEF]\n${D.brief}\n\n${"=".repeat(50)}\n\n`;
  getFiltered().forEach((ev,i)=>{t+=`${i+1}. [${ev.event_type}] ${ev.company_name||"Unassigned"} — ${ev.title}\n   ${ev.source_name} · ${ev.event_date} · score: ${ev.signal_strength}\n${ev.source_url?"   "+ev.source_url+"\n":""}\n`;});
  navigator.clipboard.writeText(t).then(()=>alert("✅ Copied!")).catch(()=>alert("Copy failed"));
}

// ════════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════════
function confColor(c){return{"High":"#16A34A","Medium-High":"#65A30D","Medium":"#CA8A04","Medium-Low":"#EA580C","Low":"#DC2626"}[c]||"var(--ink4)";}
function tagFor(type,isNeg){
  if(isNeg) return`<span class="tag tN">⚠ Neg</span>`;
  var m={Certification:"tC",Contract:"tB",Deployment:"tB",Pilot:"tP",Hiring:"tA",Financing:"tF",Partnership:"t0",Grant:"tA",Expansion:"tC",News:"t0"};
  return`<span class="tag ${m[type]||"t0"}">${type||"News"}</span>`;
}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function toggle(id){EXP.has(id)?EXP.delete(id):EXP.add(id);renderFeed();}
function toggleCo(id){CO_EXP.has(id)?CO_EXP.delete(id):CO_EXP.add(id);renderCompanies();}
function toggleProj(id){PROJ_EXP.has(id)?PROJ_EXP.delete(id):PROJ_EXP.add(id);renderProjects();}
function toggleBuyer(id){BUYER_EXP.has(id)?BUYER_EXP.delete(id):BUYER_EXP.add(id);renderBuyers();}
function setTier(t,btn){curTier=t;document.querySelectorAll(".pill").forEach(p=>p.classList.remove("on"));btn.classList.add("on");renderFeed();}
function switchTab(tab,btn){
  curTab=tab;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));btn.classList.add("on");
  document.getElementById("fbar").style.display=["signals","negative"].includes(tab)?"block":"none";
  EXP.clear();
  if(tab==="signals")  {curTier="all";renderFeed();}
  if(tab==="negative") {curTier="neg";renderFeed();}
  if(tab==="companies")  renderCompanies();
  if(tab==="projects")   renderProjects();
  if(tab==="buyers")     renderBuyers();
  if(tab==="sources")    renderSourcesTab();
  if(tab==="watchlist")  renderWatchlist();
  if(tab==="alerts")     renderAlerts();
  if(tab==="sectors")    renderSectors();
  if(tab==="rulebook")   renderRulebook();
  if(tab==="history")    renderHistory();
}
function switchTabByName(n){var tabs=document.querySelectorAll(".tab");var names=["signals","companies","projects","buyers","negative","sources","watchlist","sectors","rulebook","history"];var i=names.indexOf(n);if(i>=0&&tabs[i])switchTab(n,tabs[i]);}

// INIT
// ════════════════════════════════════════════════════════════════
(async function(){
  await loadIndex();
  var ok=await loadData();
  if(ok) renderFeed();
})();
</script>
