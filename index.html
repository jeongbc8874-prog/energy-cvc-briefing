<script>
/* =========================================================================
   Energy Capital Intelligence — Cleaned Runtime
   Goal: stop infinite loading, safely adapt latest.json, render defensively
   ========================================================================= */

window.onerror = function (msg, src, line, col, err) {
  console.error("[window.onerror]", { msg, src, line, col, err });
  try {
    renderErr(String(msg || "Unknown runtime error"));
  } catch (_) {}
};

console.log("[boot] script loaded");

/* =========================================================================
   STATE
   ========================================================================= */
let D = null;
let SIGS = [];
let IDX = [];
let SRCLOG = [];

let curTier = "all";
let curTab = "signals";

const EXP = new Set();
const CO_EXP = new Set();
const PROJ_EXP = new Set();
const BUYER_EXP = new Set();

let PANELS_EXP = false;
let SRC_OPEN = false;
let MEMO_CO_ID = null;

/* =========================================================================
   HELPERS
   ========================================================================= */
function esc(v) {
  return String(v ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function arr(v) { return Array.isArray(v) ? v : []; }
function obj(v) { return v && typeof v === "object" ? v : {}; }
function confColor(c) {
  return {
    "High": "#16A34A",
    "Medium-High": "#65A30D",
    "Medium": "#CA8A04",
    "Medium-Low": "#EA580C",
    "Low": "#DC2626"
  }[c] || "var(--ink4)";
}
function safeDate(v) {
  if (!v) return "Unknown date";
  try { return new Date(v).toLocaleDateString("ko-KR"); } catch { return String(v); }
}
function tagFor(type, isNeg) {
  if (isNeg) return `<span class="tag tN">⚠ Neg</span>`;
  const m = {
    Certification:"tC", Contract:"tB", Deployment:"tB", Pilot:"tP",
    Hiring:"tA", Financing:"tF", Partnership:"t0", Grant:"tA",
    Expansion:"tC", News:"t0", Commercial:"tB", Funding:"tF", Policy:"tA"
  };
  return `<span class="tag ${m[type] || "t0"}">${esc(type || "News")}</span>`;
}
function byId(id) { return document.getElementById(id); }

/* =========================================================================
   WATCHLIST (localStorage MVP)
   ========================================================================= */
const WL_KEY = "eci_watchlist_v1";
function wlGet() {
  try { return JSON.parse(localStorage.getItem(WL_KEY) || "[]"); }
  catch { return []; }
}
function wlSave(v) {
  try { localStorage.setItem(WL_KEY, JSON.stringify(v)); } catch {}
}
function wlHas(entity_type, entity_id) {
  return wlGet().some(w => w.entity_type === entity_type && w.entity_id === entity_id);
}
function wlToggle(entity_type, entity_id, entity_name) {
  const list = wlGet();
  const idx = list.findIndex(w => w.entity_type === entity_type && w.entity_id === entity_id);
  if (idx >= 0) list.splice(idx, 1);
  else list.unshift({
    entity_type, entity_id, entity_name,
    added_at: new Date().toISOString().slice(0, 10)
  });
  wlSave(list);
  renderCurrentTab();
}
function wlButtonHtml(entity_type, entity_id, entity_name) {
  const on = wlHas(entity_type, entity_id);
  return `<button class="wl-btn ${on ? "wl-active" : ""}" onclick="event.stopPropagation();wlToggle('${esc(entity_type)}','${esc(entity_id)}','${esc(entity_name)}')">${on ? "★ Watching" : "☆ Watch"}</button>`;
}

/* =========================================================================
   DATA ADAPTER
   ========================================================================= */
function normalizeSignal(raw, i) {
  const ev = obj(raw);
  const title = ev.title || ev.headline || "Untitled signal";
  const summary = ev.summary || ev.description || "No summary available";
  const eventType = ev.event_type || ev.type || "News";
  const sourceName = ev.source_name || ev.source || "Unknown source";
  const eventDate = ev.event_date || ev.date || "";
  const signalStrength = Number(ev.signal_strength ?? ev.score ?? 0) || 0;

  const isNegative = !!ev.is_negative || /delay|cancel|freeze|negative/i.test(eventType);
  const signalTier =
    ev.signal_tier ||
    (isNegative ? "negative" : signalStrength >= 60 ? "high" : signalStrength >= 35 ? "medium" : "low");

  const evidence = obj(ev.evidence);
  return {
    id: ev.id || `sig_${i}`,
    title,
    summary,
    event_type: eventType,
    source_name: sourceName,
    source_url: ev.source_url || "",
    event_date: eventDate,
    signal_strength: signalStrength,
    signal_tier: signalTier,
    is_negative: isNegative,
    company_id: ev.company_id || "",
    company_name: ev.company_name || "",
    segment: ev.segment || ev.sector || "",
    score_breakdown: arr(ev.score_breakdown),
    evidence: {
      observed_fact: evidence.observed_fact || title,
      observed_fact_detail: evidence.observed_fact_detail || summary,
      matched_rule_name: evidence.matched_rule_name || ev.matched_rule_name || "",
      matched_rule_tier: evidence.matched_rule_tier || "",
      why_it_matters: evidence.why_it_matters || summary,
      missing_evidence: arr(evidence.missing_evidence),
      confidence: evidence.confidence || "Low",
      confidence_rationale: evidence.confidence_rationale || "",
      source_label: evidence.source_label || sourceName
    }
  };
}

function buildCompaniesFromSignals(signals) {
  const map = {};
  signals.forEach(ev => {
    if (!ev.company_id && !ev.company_name) return;
    const id = ev.company_id || `company_${ev.company_name.toLowerCase().replace(/\s+/g, "_")}`;
    if (!map[id]) {
      map[id] = {
        id,
        name: ev.company_name || "Unknown company",
        sector: ev.segment || "",
        country: "",
        description: "",
        stage_label: "Unknown",
        stage_desc: "",
        stage_color: "#A8A8A8",
        ttr: "Unknown",
        ttr_color: "#6E6E6E",
        investor_type: "",
        events: [],
        signal_count: 0,
        high_count: 0,
        neg_count: 0,
        reinforcing: 0,
        pattern: {},
        insight: {
          observed_facts: [],
          may_indicate: [],
          next_check: ""
        },
        gaps: [],
        type_counts: {},
        linked_projects: [],
        buyer_activity: {},
        sector_rulebook: {}
      };
    }
    const co = map[id];
    co.events.push(ev);
    co.signal_count += 1;
    if (ev.signal_tier === "high") co.high_count += 1;
    if (ev.is_negative) co.neg_count += 1;
    co.type_counts[ev.event_type] = (co.type_counts[ev.event_type] || 0) + 1;
    if (co.insight.observed_facts.length < 5) {
      co.insight.observed_facts.push(ev.evidence.observed_fact || ev.title);
    }
  });

  Object.values(map).forEach(co => {
    const types = Object.keys(co.type_counts);
    co.reinforcing = Math.min(types.length, co.high_count + (co.neg_count ? 1 : 0));
    if (co.high_count >= 2) {
      co.pattern = {
        label: "Reinforcing signals",
        color: "#1A56DB",
        memo: "Multiple higher-signal events observed in the current window."
      };
      co.insight.may_indicate = ["Commercial or fundraising momentum may be building."];
      co.ttr = "Near-term";
      co.ttr_color = "#C0392B";
    } else if (co.signal_count >= 2) {
      co.pattern = {
        label: "Emerging activity",
        color: "#CA8A04",
        memo: "Several signals observed, but evidence chain remains incomplete."
      };
      co.insight.may_indicate = ["Worth monitoring for additional confirming events."];
      co.ttr = "Mid-term";
      co.ttr_color = "#CA8A04";
    } else {
      co.ttr = "Long-term";
      co.ttr_color = "#6E6E6E";
    }

    if (!co.type_counts.Contract && !co.type_counts.Deployment) {
      co.gaps.push({ label: "No commercial contract evidence", severity: "high", memo: "No explicit contract/deployment signal observed.", rule_id: "no_contract" });
    }
    if (!co.type_counts.Certification && /marine|fuel cell|hydrogen/i.test(co.sector || "")) {
      co.gaps.push({ label: "No certification signal", severity: "medium", memo: "No class/type/certification signal observed.", rule_id: "no_cert" });
    }
    if (!co.type_counts.Pilot && !co.type_counts.Deployment) {
      co.gaps.push({ label: "No deployment evidence", severity: "medium", memo: "No field deployment or pilot conversion evidence.", rule_id: "no_deploy" });
    }

    if (!co.description) {
      co.description = co.sector ? `${co.sector} related company detected from current signal set.` : "Company inferred from current signal set.";
    }
  });

  return map;
}

function adaptLatestJson(raw) {
  const r = obj(raw);
  const stats = obj(r.stats);
  const signals = arr(r.signals).map(normalizeSignal);

  const sourceLog = arr(r.source_log);
  const sources = arr(r.sources);
  const reliability = obj(r.reliability);

  const companies = Object.keys(obj(r.companies)).length ? obj(r.companies) : buildCompaniesFromSignals(signals);

  return {
    date: r.date || "",
    dateKr: r.dateKr || r.date || "",
    generatedAt: r.generatedAt || "",
    brief: r.brief || "",
    stats: {
      total: stats.total ?? signals.length,
      high: stats.high ?? signals.filter(s => s.signal_tier === "high").length,
      medium: stats.medium ?? signals.filter(s => s.signal_tier === "medium").length,
      negative: stats.negative ?? signals.filter(s => s.is_negative).length,
      matched: stats.matched ?? signals.filter(s => s.company_id || s.company_name).length,
      filtered_out: stats.filtered_out ?? 0,
      by_segment: obj(stats.by_segment),
      by_type: obj(stats.by_type)
    },
    reliability: {
      sources_ok: reliability.sources_ok ?? sourceLog.filter(s => s.status === "success").length,
      sources_partial: reliability.sources_partial ?? sourceLog.filter(s => s.status === "partial").length,
      sources_failed: reliability.sources_failed ?? sourceLog.filter(s => s.status === "failed").length,
      sources_total: reliability.sources_total ?? (sourceLog.length || sources.length || 0),
      new_events: reliability.new_events ?? signals.length,
      filtered_out: reliability.filtered_out ?? (stats.filtered_out ?? 0)
    },
    signals,
    source_log: sourceLog,
    sources,
    companies,
    projects: arr(r.projects),
    strategic_buyers: arr(r.strategic_buyers),
    buyer_activity: obj(r.buyer_activity),
    panels: obj(r.panels),
    score_rulebook: arr(r.score_rulebook),
    filteredOut: arr(r.filteredOut),
    sector_rulebooks: obj(r.sector_rulebooks),
    source_registry: arr(r.source_registry),
    memos: obj(r.memos),
    alert_candidates: arr(r.alert_candidates)
  };
}

/* =========================================================================
   LOADING
   ========================================================================= */
async function loadIndex() {
  console.log("[boot] loadIndex started");
  try {
    const r = await fetch("data/index.json?" + Date.now());
    if (!r.ok) {
      console.warn("[loadIndex] skipped", r.status);
      IDX = [];
      return;
    }
    IDX = await r.json();
    console.log("[boot] loadIndex completed", IDX.length);
  } catch (e) {
    console.warn("[loadIndex] failed", e);
    IDX = [];
  }
}

async function loadData(url) {
  console.log("[boot] loadData started", url || "data/latest.json");
  setRelState("loading");
  const target = url || ("data/latest.json?" + Date.now());

  try {
    const r = await fetch(target);
    if (r.status === 404) {
      setRelState("nodata");
      renderNoData();
      return false;
    }
    if (!r.ok) throw new Error("HTTP " + r.status);

    const raw = await r.json();
    D = adaptLatestJson(raw);
    SIGS = arr(D.signals);
    SRCLOG = arr(D.source_log);

    updateRel();
    renderSidebar();
    renderPanels();

    const btnCopy = byId("btn-copy");
    if (btnCopy) btnCopy.style.display = "inline-flex";

    console.log("[boot] loadData completed", {
      signals: SIGS.length,
      companies: Object.keys(obj(D.companies)).length,
      projects: arr(D.projects).length,
      buyers: arr(D.strategic_buyers).length
    });

    return true;
  } catch (err) {
    console.error("[loadData] failed", err);
    setRelState("error", err.message);
    renderErr(err.message);
    return false;
  }
}

/* =========================================================================
   RELIABILITY BAR
   ========================================================================= */
function setRelState(s, msg) {
  const bar = byId("rbar");
  const dot = byId("rdot");
  const st = byId("r-status");
  if (!bar || !dot || !st) return;

  bar.className = "s-" + s;
  dot.className = "rdot " + s;

  let txt = {
    loading: "Initialising…",
    ok: "ALL SYSTEMS OK",
    partial: "PARTIAL — sources failed",
    error: "ERROR",
    nodata: "NO DATA — run pipeline"
  }[s] || s;

  if (msg && s === "error") txt = "ERROR: " + msg;
  st.textContent = txt;
}

function updateRel() {
  if (!D) return;

  const rel = obj(D.reliability);
  const log = arr(SRCLOG);
  const s = obj(D.stats);

  const ok = rel.sources_ok ?? log.filter(x => x.status === "success").length;
  const par = rel.sources_partial ?? log.filter(x => x.status === "partial").length;
  const fai = rel.sources_failed ?? log.filter(x => x.status === "failed").length;
  const tot = rel.sources_total ?? log.length;

  setRelState(fai > 0 && ok === 0 ? "error" : (fai > 0 || par > 0 ? "partial" : (ok > 0 ? "ok" : "nodata")));

  const upd = byId("r-upd");
  if (upd) {
    if (D.generatedAt) {
      try {
        upd.textContent = new Date(D.generatedAt).toLocaleString("ko-KR", {
          month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit"
        });
      } catch {
        upd.textContent = D.generatedAt;
      }
    } else upd.textContent = "—";
  }

  if (byId("r-ok")) byId("r-ok").textContent = ok + "✓";
  if (byId("r-tot")) byId("r-tot").textContent = " / " + tot;
  if (byId("r-evts")) byId("r-evts").textContent = String(rel.new_events ?? s.total ?? 0) + " kept";
  if (byId("r-filt")) byId("r-filt").textContent = String(rel.filtered_out ?? s.filtered_out ?? 0) + " dropped";

  if (par > 0) {
    byId("r-par").textContent = par + "~";
    byId("r-par").style.display = "inline";
    byId("r-psep").style.display = "inline";
  } else {
    byId("r-par").style.display = "none";
    byId("r-psep").style.display = "none";
  }

  if (fai > 0) {
    byId("r-fail").textContent = fai + "✗";
    byId("r-fail").style.display = "inline";
  } else {
    byId("r-fail").style.display = "none";
  }

  const pills = byId("src-pills");
  if (pills) {
    if (log.length) {
      pills.innerHTML = log.map(s => {
        const cls = s.status === "success" ? "ok" : s.status === "partial" ? "partial" : s.status === "failed" ? "failed" : "unknown";
        const ic = s.status === "success" ? "●" : s.status === "partial" ? "◐" : s.status === "failed" ? "✗" : "?";
        const tip = s.error ? `${s.name}: ${s.error}` : `${s.name}: ${s.items || 0} items`;
        return `<span class="sp ${cls}" title="${esc(tip)}">${ic} ${esc(s.name || "Unknown")}</span>`;
      }).join("");
    } else {
      pills.innerHTML = `<span class="sp unknown">No source log</span>`;
    }
  }

  const tb = byId("stbl-body");
  if (tb) {
    if (log.length) {
      tb.innerHTML = log.map(s => {
        const color = s.status === "success" ? "#4ADE80" : s.status === "partial" ? "#FCD34D" : "#FCA5A5";
        let ts = "";
        if (s.fetched_at) {
          try { ts = new Date(s.fetched_at).toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" }); }
          catch { ts = String(s.fetched_at); }
        }
        return `<tr>
          <td style="color:#C0C0C0">${esc(s.name || "Unknown")}</td>
          <td style="color:${color};font-weight:700">${esc((s.status || "unknown").toUpperCase())}</td>
          <td style="color:#888">${esc(s.items ?? "—")}</td>
          <td style="color:#666">${esc(ts || "—")}</td>
          <td style="color:#FCA5A5;font-size:9px">${esc(s.error || "—")}</td>
        </tr>`;
      }).join("");
    } else {
      tb.innerHTML = `<tr><td colspan="5" style="color:#666">No source detail available</td></tr>`;
    }
  }

  const srcSb = byId("src-sidebar");
  if (srcSb) {
    if (log.length) {
      srcSb.innerHTML = log.map(s => {
        const dc = s.status === "success" ? "var(--green)" : s.status === "partial" ? "var(--amber)" : "var(--red)";
        return `<div class="src-row">
          <span class="src-dot" style="background:${dc}"></span>
          <div style="flex:1">
            <div style="font-size:11px;color:var(--ink2)">${esc(s.name || "Unknown")}</div>
            <div style="font-family:var(--mono);font-size:9px;color:var(--ink4)">${esc(s.status || "unknown")} · ${esc(s.items ?? 0)}건</div>
            ${s.error ? `<div style="font-size:10px;color:var(--red)">${esc(s.error)}</div>` : ""}
          </div>
        </div>`;
      }).join("");
    } else {
      srcSb.innerHTML = `<div style="font-size:11px;color:var(--ink4)">No source log yet</div>`;
    }
  }
}

function toggleSrc() {
  SRC_OPEN = !SRC_OPEN;
  byId("src-detail-wrap").className = SRC_OPEN ? "open" : "";
  byId("r-toggle").textContent = SRC_OPEN ? "SOURCE DETAIL ▴" : "SOURCE DETAIL ▾";
}

/* =========================================================================
   SIDEBAR / PANELS
   ========================================================================= */
function renderSidebar() {
  if (!D) return;
  const s = obj(D.stats);

  const statsBox = byId("stats-box");
  if (statsBox) {
    const rows = [
      { n: s.total || 0, l: "Total", c: "var(--ink)" },
      { n: s.high || 0, l: "High signal", c: "var(--red)" },
      { n: s.medium || 0, l: "Medium", c: "var(--amber)" },
      { n: s.matched || 0, l: "Company match", c: "var(--blue)" },
      { n: s.negative || 0, l: "Negative", c: "var(--red)" },
      { n: s.filtered_out || 0, l: "Filtered", c: "var(--ink4)" }
    ];
    statsBox.innerHTML = rows.map(x => `
      <div class="sr">
        <span class="sl">${x.l}</span>
        <span class="sn" style="color:${x.c}">${x.n}</span>
      </div>
    `).join("");
  }

  const segBox = byId("seg-box");
  if (segBox) {
    const segs = obj(s.by_segment);
    const vals = Object.values(segs);
    const mx = vals.length ? Math.max(...vals, 1) : 1;
    const entries = Object.entries(segs).sort((a,b)=>b[1]-a[1]).slice(0,8);
    segBox.innerHTML = entries.length ? entries.map(([k,v]) => `
      <div class="segrow">
        <span class="segnm">${esc(k)}</span>
        <div class="segbg"><div class="segfl" style="width:${Math.round(v/mx*100)}%"></div></div>
        <span class="segct">${v}</span>
      </div>
    `).join("") : `<div style="font-size:11px;color:var(--ink4)">No segment data</div>`;
  }
}

function renderPanels() {
  if (!D) return;
  const p = obj(D.panels);
  const negs = arr(p.negative_signals);
  const miss = arr(p.missing_evidence);

  const row = byId("panels-row");
  if (row) {
    if (negs.length || miss.length) row.classList.add("show");
    else row.classList.remove("show");
  }

  if (byId("neg-count")) byId("neg-count").textContent = negs.length;
  if (byId("miss-count")) byId("miss-count").textContent = miss.length;

  const nb = byId("neg-body");
  if (nb) {
    if (!negs.length) {
      nb.innerHTML = `<div class="panel-empty">NO NEGATIVE SIGNALS DETECTED</div>`;
    } else {
      const shown = PANELS_EXP ? negs : negs.slice(0, 4);
      nb.innerHTML = shown.map(n => `
        <div class="neg-item ${n.severity === "critical" ? "c" : n.severity === "high" ? "h" : "m"}">
          <div class="neg-lbl"><span>⚠</span><span>${esc(n.label || "Negative signal")}</span></div>
          ${n.company_name ? `<div style="font-family:var(--mono);font-size:10px;font-weight:600;color:var(--blue);margin-bottom:3px">${esc(n.company_name)}</div>` : ""}
          <div class="neg-title">${n.source_url ? `<a href="${esc(n.source_url)}" target="_blank" rel="noopener">${esc(n.title || "")}</a>` : esc(n.title || "")}</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--ink4)">${esc(n.source_name || "")} · ${esc(n.event_date || "")}</div>
          <div class="neg-memo">${esc(n.memo || "")}</div>
        </div>
      `).join("") + (negs.length > 4 ? `<div class="panel-more" onclick="PANELS_EXP=!PANELS_EXP;renderPanels()">${PANELS_EXP ? "▴ Collapse" : "+"+(negs.length-4)+" more →"}</div>` : "");
    }
  }

  const mb = byId("miss-body");
  if (mb) {
    if (!miss.length) {
      mb.innerHTML = `<div class="panel-empty">NO GAPS DETECTED</div>`;
    } else {
      const shown = PANELS_EXP ? miss : miss.slice(0, 3);
      mb.innerHTML = shown.map(c => `
        <div class="miss-co">
          <div style="display:flex;align-items:center;gap:7px;margin-bottom:2px">
            <span style="font-size:12px;font-weight:700">${esc(c.company_name || "Unknown company")}</span>
          </div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--ink4);margin-bottom:6px">${esc(c.sector || "")} · ${esc(c.stage || "")}</div>
          ${arr(c.gaps).map(g => `
            <div class="miss-gap">
              <span style="color:var(--red);font-weight:700;flex-shrink:0">✗</span>
              <div>
                <div style="font-weight:500;color:var(--amber)">${esc(g.label || "")}</div>
                <div class="miss-memo">${esc(g.memo || "")}</div>
              </div>
            </div>
          `).join("")}
        </div>
      `).join("") + (miss.length > 3 ? `<div class="panel-more" onclick="PANELS_EXP=!PANELS_EXP;renderPanels()">${PANELS_EXP ? "▴ Collapse" : "+"+(miss.length-3)+" more →"}</div>` : "");
    }
  }
}

/* =========================================================================
   FILTERING / FEED
   ========================================================================= */
function getFiltered() {
  const q = (byId("srch")?.value || "").trim().toLowerCase();
  return SIGS.filter(ev => {
    if (curTier === "high") return ev.signal_tier === "high";
    if (curTier === "medium") return ev.signal_tier === "medium";
    if (curTier === "neg") return ev.is_negative;
    if (curTier === "unmatched") return !ev.company_id;
    return true;
  }).filter(ev => {
    if (!q) return true;
    const hay = [ev.title, ev.company_name, ev.segment, ev.event_type, ev.source_name].join(" ").toLowerCase();
    return q.split(/\s+/).every(k => hay.includes(k));
  });
}

function renderScoreBreakdown(ev) {
  const bd = arr(ev.score_breakdown);
  const str = ev.signal_strength || 0;
  const baseScore = {
    Certification:88, Contract:92, Deployment:88, Pilot:70,
    Financing:82, Hiring:72, Partnership:47, Grant:46,
    Expansion:72, News:15, Commercial:85, Funding:82, Policy:40
  }[ev.event_type] || 15;
  const tc = str >= 60 ? "#16A34A" : str >= 35 ? "#CA8A04" : "#DC2626";
  let h = `<div class="rb-wrap"><div style="font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);margin-bottom:7px">Score Breakdown</div>`;
  h += `<div class="rb-row"><span class="rb-pos">${baseScore}</span><span style="color:var(--ink3)">base (${esc(ev.event_type || "News")} event)</span></div>`;
  bd.forEach(b => {
    const delta = Number(b.delta || 0);
    h += `<div class="rb-row"><span class="${delta < 0 ? "rb-neg" : "rb-pos"}">${delta > 0 ? "+" : ""}${delta}</span><span style="color:var(--ink3)">${esc(b.reason || "")}</span></div>`;
  });
  h += `<div class="rb-ttl"><span style="color:${tc};font-size:15px">${str}</span><span style="font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 8px;background:${tc}18;color:${tc}">${esc((ev.signal_tier || "low").toUpperCase())}</span></div></div>`;
  return h;
}

        h += `<div class="co-sec"><div class="co-sec-title">Description</div><div style="font-size:12px;color:var(--ink3);line-height:1.65">${esc(co.description)}</div></div>`;

      }
      h += `</div>`;
    }

    h += `</div>`;
  });
  h += `</div>`;
  el.innerHTML = h;
}

    ttr: co.ttr || "Unknown",
    description: co.description || "",
    observed_facts: arr(ins.observed_facts).map(f => ({ fact: f, source: "Signal feed" })),
    key_signals: high.slice(0, 3).map(ev => ({
      headline: ev.title,
      event_type: ev.event_type,
      score: ev.signal_strength,
      date: ev.event_date,
      source: ev.source_name,
      source_url: ev.source_url,
      why_it_matters: ev.evidence?.why_it_matters || ev.summary,
      confidence: ev.evidence?.confidence || "Low",
      missing_for_this: arr(ev.evidence?.missing_evidence)
    })),
    pattern: obj(co.pattern),
    risks: neg.map(ev => ({
      type: "negative_signal",
      subtype: ev.event_type,
      headline: ev.title,
      source: ev.source_name,
      date: ev.event_date,
      framing: ev.evidence?.why_it_matters || ""
    })),
    missing_evidence: gaps.map(g => ({
      label: g.label,
      severity: g.severity || "medium",
      memo: g.memo || ""
    })),
    next_questions: gaps.slice(0, 3).map((g, i) => ({
      question: `How will management address: ${g.label}?`,
      from_gap: g.label
    })),
    data_quality: {
      total_signals: evs.length,
      high_signals: high.length,
      negative_signals: neg.length,
      sources: [...new Set(evs.map(e => e.source_name).filter(Boolean))],
      confidence: high.length ? "Medium" : "Low",
      caveat: "Generated from current public signal set only. No primary research used."
    },
    generated_date: D?.date || ""
  };
}

      <div class="memo-classbar">

          </div>
        </div>
      </div>

      <div class="memo-section">
        <div class="memo-section-title"><span class="memo-section-num">1</span>Observed Facts</div>
        ${arr(m.observed_facts).length ? arr(m.observed_facts).map(f => `<div class="memo-fact"><span class="memo-fact-icon" style="color:var(--green);font-weight:700">✓</span><div><div>${esc(f.fact || f)}</div><div class="memo-fact-source">${esc(f.source || "")}</div></div></div>`).join("") : `<div style="font-size:12px;color:var(--ink4)">No facts available.</div>`}
      </div>

      <div class="memo-section">
        <div class="memo-section-title"><span class="memo-section-num">2</span>Key Signals</div>
        ${arr(m.key_signals).length ? arr(m.key_signals).map(s => `<div class="memo-signal"><div class="memo-signal-hd"><div class="memo-signal-title">${s.source_url ? `<a href="${esc(s.source_url)}" target="_blank" rel="noopener">${esc(s.headline)}</a>` : esc(s.headline)}</div><div style="font-family:var(--mono);font-size:10px;color:var(--ink4)">${esc(s.score)}</div></div><div style="font-family:var(--mono);font-size:9px;color:var(--ink4);margin-bottom:5px">${esc(s.source || "")} · ${esc(s.date || "")}</div><div class="memo-signal-why">${esc(s.why_it_matters || "")}</div></div>`).join("") : `<div style="font-size:12px;color:var(--ink4)">No high-signal events.</div>`}
      </div>

      <div class="memo-section">
        <div class="memo-section-title"><span class="memo-section-num">3</span>Detected Pattern</div>
        <div class="memo-narrative">${esc(m.pattern?.memo || "No clear pattern detected.")}</div>
      </div>

      <div class="memo-section">
        <div class="memo-section-title"><span class="memo-section-num">4</span>Risks</div>
        ${arr(m.risks).length ? arr(m.risks).map(r => `<div class="memo-risk"><span class="memo-risk-sev" style="background:#FEE2E2;color:#DC2626;border:1px solid #FCA5A540">NEG</span><div class="memo-risk-body"><div class="memo-risk-headline">${esc(r.headline || "")}</div><div class="memo-risk-frame">${esc(r.framing || "")}</div></div></div>`).join("") : `<div style="font-size:12px;color:var(--green)">No negative signals detected.</div>`}
      </div>

      <div class="memo-section">
        <div class="memo-section-title"><span class="memo-section-num">5</span>Missing Evidence</div>
        ${arr(m.missing_evidence).length ? arr(m.missing_evidence).map(g => `<div class="memo-gap"><div class="memo-gap-hd"><span class="memo-gap-label">✗ ${esc(g.label || "")}</span></div><div class="memo-gap-memo">${esc(g.memo || "")}</div></div>`).join("") : `<div style="font-size:12px;color:var(--green)">No structural evidence gaps detected.</div>`}
      </div>

      <div class="memo-section">
        <div class="memo-section-title"><span class="memo-section-num">6</span>Suggested Next Questions</div>

function renderMemoTab() {
  const el = byId("feed-col");
  if (!MEMO_CO_ID) {
    const cos = Object.values(obj(D?.companies)).sort((a,b)=>(b.high_count||0)-(a.high_count||0));
    if (!cos.length) {
      el.innerHTML = `<div class="empty">No company data for memo generation</div>`;
      return;
    }
    let h = `<div class="memo-page"><div style="margin-bottom:16px"><div style="font-family:var(--mono);font-size:10px;font-weight:700;color:var(--ink4);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Investment Memo Generator</div><div style="font-size:13px;color:var(--ink2);line-height:1.65">Select a company to generate a structured memo from current signals.</div></div><div class="card">`;
    cos.forEach(co => {
      h += `<div style="display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--b2);cursor:pointer" onclick="openMemo('${esc(co.id)}')"><div style="width:3px;height:36px;background:${co.stage_color||"#A8A8A8"};flex-shrink:0;border-radius:2px"></div><div style="flex:1"><div style="font-size:13px;font-weight:600">${esc(co.name || "")}</div><div style="font-family:var(--mono);font-size:10px;color:var(--ink4)">${esc(co.sector || "")} · ${esc(co.ttr || "")}</div></div><div style="display:flex;gap:6px;align-items:center">${co.high_count ? `<span class="tag tH">HIGH ${co.high_count}</span>` : ""}${co.neg_count ? `<span class="tag tN">⚠ ${co.neg_count}</span>` : ""}<span style="font-family:var(--mono);font-size:10px;color:var(--blue)">→</span></div></div>`;
    });
    h += `</div></div>`;
    el.innerHTML = h;
    return;
  }

  const memo = D?.memos?.[MEMO_CO_ID] || buildMemoFromCompany(obj(D?.companies?.[MEMO_CO_ID]));
  renderMemoDoc(el, memo);
}

function renderSectors() {
  const el = byId("feed-col");
  const rbs = obj(D?.sector_rulebooks);
  if (!Object.keys(rbs).length) {
    el.innerHTML = `<div class="empty">No sector rulebooks yet</div>`;
    return;
  }
  let h = "";
  Object.entries(rbs).forEach(([seg, rb]) => {
    h += `<div class="rb-sector-card">
      <div class="rb-sector-hd"><span class="rb-sector-nm">${esc(rb.name || seg)}</span><span style="font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 9px;background:#EFF6FF;color:#1A56DB;border:1px solid #BFDBFE">${esc(seg)}</span></div>
      <div class="rb-sector-row"><div class="rb-sector-lbl">Key Gate</div><div class="rb-sector-val">${esc(rb.key_gate || "—")}</div></div>
      <div class="rb-sector-row"><div class="rb-sector-lbl">Commercial Threshold</div><div class="rb-sector-val">${esc(rb.commercial_threshold || "—")}</div></div>
      <div class="rb-sector-row"><div class="rb-sector-lbl">Policy Driver</div><div class="rb-sector-val">${esc(rb.policy_driver || "—")}</div></div>
    </div>`;
  });
  el.innerHTML = h;
}

function renderRulebook() {
  const el = byId("feed-col");
  const rb = arr(D?.score_rulebook);
  const fo = arr(D?.filteredOut);

  let h = `<div class="card"><div class="chd">Signal Scoring Rulebook</div><div style="padding:14px">`;
  if (!rb.length) {
    h += `<div style="font-size:12px;color:var(--ink4)">No explicit score rulebook in JSON.</div>`;
  } else {
    rb.forEach(g => {
      h += `<div class="rb-group"><div class="rb-group-title" style="color:${esc(g.color || "#6E6E6E")}">${esc(g.group || "")}</div>${arr(g.items).map(item => `<div class="rb-item"><span style="width:6px;height:6px;border-radius:50%;background:${esc(g.color || "#6E6E6E")};flex-shrink:0;margin-top:5px;display:inline-block"></span><span>${esc(item)}</span></div>`).join("")}</div>`;
    });
  }
  if (fo.length) {
    h += `<div class="rb-group" style="margin-top:20px"><div class="rb-group-title" style="color:var(--red)">Dropped This Run (${fo.length})</div>${fo.slice(0,10).map(ev => `<div style="padding:7px 10px;border-bottom:1px solid var(--b2);display:flex;gap:10px;align-items:flex-start"><span style="font-family:var(--mono);font-size:10px;font-weight:700;color:var(--red);flex-shrink:0">${esc(ev.signal_strength || 0)}</span><div style="flex:1"><div style="font-size:11px;color:var(--ink3)">${esc(ev.title || "")}</div><div style="font-family:var(--mono);font-size:9px;color:var(--ink4);margin-top:2px">${esc(ev.source_name || "")}</div></div></div>`).join("")}</div>`;
  }
  h += `</div></div>`;
  el.innerHTML = h;
}

function renderHistory() {
  const el = byId("feed-col");
  if (!IDX.length) {
    el.innerHTML = `<div class="empty">No archive data</div>`;
    return;
  }
  let h = `<div class="card"><div class="chd">Archive <span style="font-weight:400;color:var(--ink4)">${IDX.length} days</span></div>`;
  IDX.forEach(d => {
    h += `<div class="hist-row" onclick="loadArchive('${esc(d.date)}')"><span class="hist-date">${esc(d.date || "")}</span><span class="hist-dk">${esc(d.dateKr || "")}</span><div style="display:flex;gap:10px"><span style="font-family:var(--mono);font-size:10px;color:var(--ink4)">${esc(d.stats?.total || 0)} signals</span></div></div>`;
  });
  h += `</div>`;
  el.innerHTML = h;
}

function renderWatchlist() {
  const el = byId("feed-col");
  const list = wlGet();
  if (!list.length) {
    el.innerHTML = `<div class="wl-empty"><div style="font-size:36px;margin-bottom:12px">☆</div><h3>Your watchlist is empty</h3><p>Add companies, projects, buyers, or segments using the watch button.</p></div>`;
    return;
  }
  let h = `<div class="card"><div class="chd">Watchlist <span style="font-weight:400;color:var(--ink4)">${list.length}</span></div>`;
  list.forEach(w => {
    h += `<div class="wl-item"><div class="wl-nm">${esc(w.entity_name || "")}</div><div style="font-family:var(--mono);font-size:10px;color:var(--ink4)">${esc(w.entity_type || "")}</div><button class="wl-btn wl-active" onclick="event.stopPropagation();wlToggle('${esc(w.entity_type)}','${esc(w.entity_id)}','${esc(w.entity_name)}')">Remove</button></div>`;
  });
  h += `</div>`;
  el.innerHTML = h;
}

/* =========================================================================
   UI STATES / MISC
   ========================================================================= */
function renderNoData() {
  const el = byId("feed-col");
  if (!el) return;
  el.innerHTML = `<div class="box-nodata"><div style="font-size:32px;margin-bottom:12px">📭</div><h3>No data</h3><p><code>data/latest.json</code> not found.</p></div>`;
}

function renderErr(msg) {
  const el = byId("feed-col");
  if (!el) return;
  el.innerHTML = `<div class="box-err"><h3>⚠ LOAD FAILED</h3><div style="font-size:12px;margin-bottom:6px">${esc(msg)}</div><div style="font-size:10px;color:#888">Check browser console for details.</div></div>`;
}

function copyReport() {
  if (!D) return;
  let t = `ENERGY CAPITAL INTELLIGENCE — ${D.dateKr || D.date}\n`;
  t += `Total ${D.stats?.total || 0} · High ${D.stats?.high || 0} · Negative ${D.stats?.negative || 0}\n`;
  t += `${"=".repeat(50)}\n\n`;
  if (D.brief) t += `[BRIEF]\n${D.brief}\n\n`;
  getFiltered().forEach((ev, i) => {
    t += `${i+1}. [${ev.event_type}] ${ev.company_name || "Unassigned"} — ${ev.title}\n`;
    t += `   ${ev.source_name} · ${ev.event_date} · score: ${ev.signal_strength}\n`;
    if (ev.source_url) t += `   ${ev.source_url}\n`;
    t += `\n`;
  });
  navigator.clipboard.writeText(t).then(() => alert("✅ Copied!")).catch(() => alert("Copy failed"));
}

function copyMemo() {
  const co = obj(D?.companies?.[MEMO_CO_ID]);
  if (!co.id) return alert("No memo data.");
  const memo = D?.memos?.[MEMO_CO_ID] || buildMemoFromCompany(co);

  const lines = [];
  lines.push("INTERNAL INVESTMENT TRIAGE MEMO — CONFIDENTIAL");
  lines.push("=".repeat(60));
  lines.push(`${memo.company_name} · ${memo.sector} · ${memo.stage_label} · ${memo.ttr}`);
  lines.push(`Confidence: ${memo.data_quality?.confidence || "Low"}`);
  lines.push("");
  lines.push("1. OBSERVED FACTS");
  arr(memo.observed_facts).forEach(f => lines.push("  ✓ " + (f.fact || f)));
  lines.push("");
  lines.push("2. KEY SIGNALS");
  arr(memo.key_signals).forEach((s, i) => lines.push(`  [${i+1}] ${s.headline} — score ${s.score} · ${s.source} · ${s.date}`));
  lines.push("");
  lines.push("3. DETECTED PATTERN");
  lines.push("  " + (memo.pattern?.memo || "No clear pattern detected."));
  lines.push("");
  lines.push("4. RISKS");
  if (!arr(memo.risks).length) lines.push("  No negative signals detected.");
  arr(memo.risks).forEach(r => lines.push("  ⚠ " + r.headline));
  lines.push("");
  lines.push("5. MISSING EVIDENCE");
  if (!arr(memo.missing_evidence).length) lines.push("  No gaps detected.");
  arr(memo.missing_evidence).forEach(g => lines.push(`  ✗ [${(g.severity || "").toUpperCase()}] ${g.label}`));
  lines.push("");
  lines.push("6. NEXT QUESTIONS");
  arr(memo.next_questions).forEach((q, i) => lines.push(`  ${i+1}. ${q.question || q}`));
  lines.push("");
  lines.push(`DATA QUALITY: ${memo.data_quality?.total_signals || 0} signals · Sources: ${(memo.data_quality?.sources || []).join(", ")}`);
  navigator.clipboard.writeText(lines.join("\n")).then(() => alert("✅ Memo copied to clipboard")).catch(() => alert("Copy failed"));
}

function printMemo() {
  window.print();
}

function toggle(id) { EXP.has(id) ? EXP.delete(id) : EXP.add(id); renderFeed(); }
function toggleCo(id) { CO_EXP.has(id) ? CO_EXP.delete(id) : CO_EXP.add(id); renderCompanies(); }
function toggleProj(id) { PROJ_EXP.has(id) ? PROJ_EXP.delete(id) : PROJ_EXP.add(id); renderProjects(); }
function toggleBuyer(id) { BUYER_EXP.has(id) ? BUYER_EXP.delete(id) : BUYER_EXP.add(id); renderBuyers(); }

function setTier(t, btn) {
  curTier = t;
  document.querySelectorAll(".pill").forEach(p => p.classList.remove("on"));
  if (btn) btn.classList.add("on");
  renderFeed();
}

function renderCurrentTab() {
  if (curTab === "signals") return renderFeed();
  if (curTab === "negative") { curTier = "neg"; return renderFeed(); }
  if (curTab === "companies") return renderCompanies();
  if (curTab === "projects") return renderProjects();
  if (curTab === "buyers") return renderBuyers();
  if (curTab === "sources") return renderSourcesTab();
  if (curTab === "memo") return renderMemoTab();
  if (curTab === "watchlist") return renderWatchlist();
  if (curTab === "sectors") return renderSectors();
  if (curTab === "rulebook") return renderRulebook();
  if (curTab === "history") return renderHistory();
  return renderFeed();
}

function switchTab(tab, btn) {
  curTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("on"));
  if (btn) btn.classList.add("on");
  byId("fbar").style.display = ["signals", "negative"].includes(tab) ? "block" : "none";
  renderCurrentTab();
}

function switchTabByName(n) {
  const tabs = document.querySelectorAll(".tab");
  const names = ["signals","companies","projects","buyers","negative","sources","memo","watchlist","sectors","rulebook","history"];
  const i = names.indexOf(n);
  if (i >= 0 && tabs[i]) switchTab(n, tabs[i]);
}

async function loadArchive(date) {
  byId("feed-col").innerHTML = `<div class="box-loading"><span class="blink">■</span> Loading…</div>`;
  const ok = await loadData("data/" + date + ".json?" + Date.now());
  if (ok) switchTabByName("signals");
}

function openMemo(coId) {
  MEMO_CO_ID = coId;
  switchTabByName("memo");
}

/* =========================================================================
   INIT
   ========================================================================= */
(async function init() {
  console.log("[boot] init started");
  try {
    await loadIndex();
    const ok = await loadData();
    if (ok) {
      console.log("[boot] renderFeed");
      renderFeed();
    } else {
      console.warn("[boot] loadData returned false");
    }
  } catch (e) {
    console.error("[boot] init failed", e);
    renderErr(e.message || "Init failed");
    setRelState("error", e.message || "Init failed");
  }
})();
</script>
