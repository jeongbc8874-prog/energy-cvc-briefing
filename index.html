<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Energy Capital Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Serif:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0D0D0D; --ink2:#3C3C3C; --ink3:#6E6E6E; --ink4:#A8A8A8;
  --bg:#F4F2EE;  --surface:#FFFFFF; --b:#E2E0DA; --b2:#EDEBE6;
  --red:#C0392B; --blue:#1A56DB; --green:#0A6640; --amber:#92400E;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans KR',system-ui,sans-serif;
  --serif:'IBM Plex Serif',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;}
a{color:inherit;text-decoration:none;}
button{font-family:var(--mono);cursor:pointer;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:#CCC;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.blink{animation:blink 1.4s infinite;}

/* ── Reliability bar ──────────────────────────────────────── */
#rbar{font-family:var(--mono);font-size:10px;padding:0 24px;border-bottom:1px solid transparent;transition:all .2s;}
#rbar.s-ok     {background:#061806;border-color:#0A2A0A;color:#4ADE80;}
#rbar.s-partial{background:#1A1200;border-color:#3A2800;color:#FCD34D;}
#rbar.s-error  {background:#1A0707;border-color:#3A0F0F;color:#FCA5A5;}
#rbar.s-loading{background:#111;border-color:#1A1A1A;color:#444;}
#rbar.s-nodata {background:#111;border-color:#1A1A1A;color:#555;}
#rbar-in{max-width:1440px;margin:0 auto;display:flex;align-items:center;min-height:34px;flex-wrap:wrap;}
.rseg{display:flex;align-items:center;gap:5px;padding:8px 14px 8px 0;border-right:1px solid rgba(255,255,255,.06);margin-right:14px;}
.rseg:last-of-type{border-right:none;}
.rl{opacity:.4;font-size:9px;letter-spacing:.06em;margin-right:3px;}
.rdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-right:8px;}
.rdot.ok    {background:#4ADE80;}
.rdot.partial{background:#FCD34D;animation:blink 2s infinite;}
.rdot.error {background:#FCA5A5;animation:blink .8s infinite;}
.rdot.loading{background:#444;animation:blink 1.5s infinite;}
.rdot.nodata{background:#444;}
#src-pills{max-width:1440px;margin:0 auto;display:flex;gap:4px;flex-wrap:wrap;padding-bottom:7px;}
.sp{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.04em;padding:2px 8px;display:inline-flex;align-items:center;gap:4px;cursor:help;}
.sp.ok     {background:#0A1F0A;color:#4ADE80;border:1px solid #1A3A1A;}
.sp.partial{background:#241A00;color:#FCD34D;border:1px solid #4A3A00;}
.sp.failed {background:#1F0A0A;color:#FCA5A5;border:1px solid #4A1A1A;}
.sp.unknown{background:#1A1A1A;color:#777;border:1px solid #333;}
#src-detail-wrap{max-width:1440px;margin:0 auto;display:none;padding-bottom:8px;animation:fadeIn .15s;}
#src-detail-wrap.open{display:block;}
.stbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:10px;}
.stbl th{color:#444;font-weight:500;padding:4px 10px;text-align:left;border-bottom:1px solid #1E1E1E;}
.stbl td{padding:5px 10px;border-bottom:1px solid #181818;vertical-align:middle;}
.stbl tr:last-child td{border-bottom:none;}
.rbtn{margin-left:auto;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.06em;padding:3px 10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.35);cursor:pointer;}

/* ── Header ──────────────────────────────────────────────── */
#hdr{background:var(--ink);padding:0 24px;}
#hdr-in{max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 0;gap:16px;flex-wrap:wrap;}
#hdr-brand{display:flex;flex-direction:column;gap:3px;}
#hdr-brand h1{font-family:var(--serif);font-size:18px;font-weight:600;color:#F0EDE6;letter-spacing:-.2px;}
#hdr-tagline{font-family:var(--mono);font-size:9px;color:#555;letter-spacing:.12em;text-transform:uppercase;}
#hdr-actions{display:flex;gap:8px;align-items:center;}
.hbtn{font-family:var(--mono);font-size:10px;font-weight:600;padding:5px 13px;border:1px solid #333;background:transparent;color:#888;cursor:pointer;letter-spacing:.04em;}
.hbtn:hover{background:#1A1A1A;color:#C8C8C8;}
.hbtn.primary{background:var(--red);color:#FFF;border-color:var(--red);}
.hbtn.primary:hover{background:#A93226;}

/* ── Nav ─────────────────────────────────────────────────── */
#nav{background:var(--ink);border-bottom:1px solid #1A1A1A;padding:0 24px;}
#nav-in{max-width:1440px;margin:0 auto;display:flex;overflow-x:auto;}
.tab{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:#555;padding:10px 16px 8px;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .1s;}
.tab:hover{color:#AAA;}
.tab.on{color:#F0EDE6;border-bottom-color:var(--red);font-weight:600;}
.tab-badge{margin-left:4px;background:var(--red);color:#FFF;font-size:9px;padding:1px 5px;border-radius:10px;}

/* ── Filter bar ──────────────────────────────────────────── */
#fbar{background:var(--bg);border-bottom:1px solid var(--b);padding:8px 24px;position:sticky;top:0;z-index:80;}
#fbar-in{max-width:1440px;margin:0 auto;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
#srch{font-family:var(--mono);font-size:11px;padding:5px 10px;border:1px solid var(--b);background:var(--surface);color:var(--ink);outline:none;flex:1;min-width:160px;max-width:280px;}
#srch:focus{border-color:var(--ink);}
.pill{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.04em;padding:4px 10px;border:1px solid var(--b);background:var(--surface);color:var(--ink3);}
.pill:hover{border-color:var(--ink2);}
.pill.on{background:var(--ink);color:#FFF;border-color:var(--ink);}
.pill.red.on{background:var(--red);border-color:var(--red);}
.pill-sep{width:1px;height:18px;background:var(--b2);margin:0 4px;}

/* ── Panels row ──────────────────────────────────────────── */
#panels-row{max-width:1440px;margin:0 auto;padding:14px 24px 0;display:none;grid-template-columns:1fr 1fr;gap:12px;}
#panels-row.show{display:grid;}
@media(max-width:780px){#panels-row{grid-template-columns:1fr;}}
.panel{background:var(--surface);border:1px solid var(--b);overflow:hidden;}
.panel-hd{padding:10px 14px;border-bottom:2px solid;display:flex;align-items:center;justify-content:space-between;}
.panel-hd.neg {border-color:var(--red);background:#FFF5F5;}
.panel-hd.miss{border-color:var(--amber);background:#FFFBEB;}
.panel-title{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.panel-title.neg {color:var(--red);}
.panel-title.miss{color:var(--amber);}
.panel-badge{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 8px;}
.panel-badge.neg {background:#FEE2E2;color:var(--red);}
.panel-badge.miss{background:#FEF3C7;color:var(--amber);}
.neg-item{padding:10px 14px;border-bottom:1px solid var(--b2);border-left:3px solid transparent;}
.neg-item:last-child{border-bottom:none;}
.neg-item.c{border-left-color:#DC2626;background:#FFFAFA;}
.neg-item.h{border-left-color:#EA580C;}
.neg-item.m{border-left-color:var(--amber);}
.neg-lbl{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.neg-title{font-size:12px;font-weight:500;color:var(--ink);line-height:1.4;margin-bottom:2px;}
.neg-memo{font-size:11px;color:var(--ink3);line-height:1.6;margin-top:4px;padding-top:4px;border-top:1px solid var(--b2);}
.miss-co{padding:10px 14px;border-bottom:1px solid var(--b2);}
.miss-co:last-child{border-bottom:none;}
.miss-gap{display:flex;gap:7px;align-items:flex-start;padding:3px 0;font-size:11px;color:#7F1D1D;line-height:1.5;}
.miss-memo{font-size:10px;color:var(--ink4);margin-top:2px;line-height:1.5;}
.panel-more{padding:7px 14px;background:var(--bg);border-top:1px solid var(--b2);font-family:var(--mono);font-size:10px;color:var(--blue);text-align:center;}
.panel-more:hover{background:var(--b2);}
.panel-empty{padding:24px 14px;text-align:center;font-family:var(--mono);font-size:10px;color:var(--ink4);letter-spacing:.05em;}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
.sdot-c{background:#DC2626;}
.sdot-h{background:#EA580C;}
.sdot-m{background:var(--amber);}

/* ── Main layout ─────────────────────────────────────────── */
#main{max-width:1440px;margin:0 auto;padding:16px 24px;display:grid;grid-template-columns:1fr 300px;gap:16px;}
@media(max-width:1000px){#main{grid-template-columns:1fr;} #sidebar{display:none;}}

/* ── Cards (generic) ─────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--b);}
.chd{padding:9px 14px;border-bottom:1px solid var(--b2);font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);display:flex;align-items:center;justify-content:space-between;}
.cbd{padding:12px 14px;}

/* ── Evidence cards ──────────────────────────────────────── */
.ec{border-bottom:1px solid var(--b2);background:var(--surface);}
.ec:last-child{border-bottom:none;}
.ec:hover{background:#FAFAF8;}
.ec-hd{padding:13px 18px 10px;cursor:pointer;border-left:3px solid transparent;}
.ec-meta{display:flex;align-items:center;gap:5px;margin-bottom:5px;flex-wrap:wrap;}
.ec-co{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--blue);margin-bottom:3px;}
.ec-title{font-size:13px;font-weight:500;color:var(--ink);line-height:1.4;margin-bottom:3px;}
.ec-title a:hover{color:var(--red);}
.ec-sub{font-family:var(--mono);font-size:10px;color:var(--ink4);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ec-rule{font-family:var(--mono);font-size:9px;color:var(--ink4);margin-top:3px;}
.ec-rule-kw{color:var(--amber);font-weight:600;}
.ec-hint{font-family:var(--mono);font-size:9px;color:var(--ink4);margin-top:4px;letter-spacing:.04em;}
.sbar{display:inline-flex;align-items:center;gap:4px;}
.sbar-bg{width:46px;height:3px;background:var(--b2);overflow:hidden;}
.sbar-fill{height:100%;}
.sbar-n{font-family:var(--mono);font-size:10px;font-weight:700;}
.ec-body{border-top:1px solid var(--b2);animation:fadeIn .15s;}
.ec-row{display:grid;grid-template-columns:148px 1fr;border-bottom:1px solid var(--b2);}
.ec-row:last-child{border-bottom:none;}
.ec-lbl{padding:11px 12px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);background:var(--bg);border-right:1px solid var(--b2);display:flex;align-items:flex-start;padding-top:13px;}
.ec-val{padding:11px 16px;font-size:12px;color:var(--ink2);line-height:1.7;}
.ec-fact{padding:9px 12px;background:#F5F9FF;border-left:3px solid var(--blue);font-size:13px;color:var(--ink);line-height:1.65;}
.ec-fact-detail{font-size:11px;color:var(--ink3);margin-top:4px;line-height:1.6;}
.ec-why{padding:9px 12px;background:#FFFDF5;border-left:3px solid var(--amber);font-size:12px;color:var(--ink2);line-height:1.75;}
.ec-miss-wrap{padding:9px 12px;background:#FFF8F8;border-left:3px solid var(--red);}
.ec-miss-row{display:flex;gap:7px;font-size:12px;color:#7F1D1D;padding:2px 0;line-height:1.5;}
.ec-conf-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;font-family:var(--mono);font-size:11px;font-weight:700;}
.ec-src-link{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--blue);padding:3px 9px;border:1px solid #BFDBFE;background:#EFF6FF;display:inline-flex;align-items:center;gap:4px;}
.ec-src-link:hover{background:var(--blue);color:#FFF;}
.rb-wrap{padding:10px 14px;background:var(--bg);border-top:1px solid var(--b2);}
.rb-row{display:flex;align-items:center;gap:6px;padding:2px 0;font-family:var(--mono);font-size:10px;}
.rb-pos{color:#16A34A;font-weight:700;min-width:26px;text-align:right;}
.rb-neg{color:#DC2626;font-weight:700;min-width:26px;text-align:right;}
.rb-ttl{font-family:var(--mono);font-size:11px;font-weight:700;padding-top:6px;margin-top:5px;border-top:1px solid var(--b2);display:flex;gap:8px;align-items:center;}

/* ── Tags ────────────────────────────────────────────────── */
.tag{display:inline-flex;align-items:center;padding:1px 6px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.03em;white-space:nowrap;border:1px solid var(--b);}
.tH{background:#FEE2E2;color:var(--red);border-color:#FCA5A5;}
.tM{background:#FEF9C3;color:var(--amber);border-color:#FDE68A;}
.tN{background:#FFF1F0;color:var(--red);border-color:#FFCCC7;}
.tC{background:#F0FDF4;color:var(--green);border-color:#A7F3D0;}
.tB{background:#EFF6FF;color:var(--blue);border-color:#BFDBFE;}
.tP{background:#F5F3FF;color:#5B21B6;border-color:#DDD6FE;}
.tA{background:#FFFBEB;color:var(--amber);border-color:#FDE68A;}
.tF{background:#F0FDF4;color:var(--green);border-color:#A7F3D0;}
.t0{background:var(--bg);color:var(--ink4);}

/* ── Investment memo ─────────────────────────────────────── */
.memo{border:2px solid var(--ink);margin-top:12px;animation:fadeIn .15s;}
.memo-hd{background:var(--ink);padding:9px 14px;display:flex;justify-content:space-between;align-items:center;}
.memo-hd-l{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;color:#666;text-transform:uppercase;}
.memo-bd{padding:14px;}
.ms{margin-bottom:12px;}
.ml{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);margin-bottom:6px;}
.mF{display:flex;gap:7px;font-size:12px;color:var(--ink2);padding:4px 8px;background:var(--bg);border-left:2px solid var(--green);margin-bottom:3px;line-height:1.5;}
.mI{display:flex;gap:7px;font-size:12px;color:var(--ink2);padding:4px 8px;border-left:2px solid var(--blue);margin-bottom:3px;line-height:1.5;}
.mX{display:flex;gap:7px;font-size:12px;color:#7F1D1D;padding:4px 8px;background:#FFF5F5;border-left:2px solid var(--red);margin-bottom:3px;line-height:1.5;}
.mPat{padding:10px 13px;background:#F0F5FF;border-left:3px solid var(--blue);font-size:13px;color:var(--ink);line-height:1.7;}
.mNxt{padding:10px 13px;background:#FFFBEB;border-left:3px solid var(--amber);font-size:13px;color:var(--ink2);line-height:1.65;}

/* ── Company cards ───────────────────────────────────────── */
.co-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px;padding:16px 0;}
.co-card{background:var(--surface);border:1px solid var(--b);overflow:hidden;cursor:pointer;transition:border-color .1s,box-shadow .1s;}
.co-card:hover{border-color:#999;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.co-card.ri{border-width:2px;}
.co-sbar{height:3px;width:100%;}
.co-hd{padding:14px 16px 10px;}
.co-nm{font-size:15px;font-weight:700;color:var(--ink);}
.co-meta{font-family:var(--mono);font-size:10px;color:var(--ink4);margin:3px 0 8px;}
.co-pat{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px;}
.co-lbs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px;}
.co-lb{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.05em;padding:2px 8px;text-transform:uppercase;}
.co-types{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.co-type{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 7px;border:1px solid var(--b);background:var(--bg);color:var(--ink2);}
.co-type.hl{border-color:#A7F3D0;color:var(--green);background:#F0FDF4;}
.co-stats{display:flex;gap:14px;padding:8px 16px;background:var(--bg);border-top:1px solid var(--b2);}
.co-stat{display:flex;flex-direction:column;align-items:center;}
.co-stat-n{font-family:var(--mono);font-size:16px;font-weight:700;}
.co-stat-l{font-family:var(--mono);font-size:9px;color:var(--ink4);text-transform:uppercase;letter-spacing:.05em;}
.co-ri{display:flex;align-items:center;gap:6px;padding:4px 10px;margin:0 16px 8px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;}
.co-detail{border-top:2px solid var(--ink);animation:fadeIn .15s;}
.co-sec{padding:12px 16px;border-bottom:1px solid var(--b2);}
.co-sec:last-child{border-bottom:none;}
.co-sec-title{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.co-ev{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--b2);}
.co-ev:last-child{border-bottom:none;}
.co-ev-dt{font-family:var(--mono);font-size:10px;color:var(--ink4);min-width:80px;flex-shrink:0;padding-top:2px;}
.co-ev-title{font-size:12px;font-weight:500;line-height:1.4;margin-bottom:2px;}
.co-ev-title a:hover{color:var(--red);}
.co-ev-src{font-family:var(--mono);font-size:10px;color:var(--ink4);}
.co-miss{display:flex;gap:7px;font-size:12px;color:#7F1D1D;padding:3px 0;line-height:1.5;}
.co-gap-memo{font-size:10px;color:var(--ink4);margin-top:2px;line-height:1.5;}
.co-pat-memo{padding:9px 12px;background:#F0F5FF;border-left:3px solid var(--blue);font-size:12px;color:var(--ink2);line-height:1.7;}

/* ── Project view ────────────────────────────────────────── */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:12px;padding:14px 0;}
.proj-card{background:var(--surface);border:1px solid var(--b);overflow:hidden;cursor:pointer;}
.proj-card:hover{border-color:#999;}
.proj-status{height:3px;}
.proj-hd{padding:14px 16px 10px;}
.proj-nm{font-size:14px;font-weight:700;margin-bottom:3px;}
.proj-loc{font-family:var(--mono);font-size:10px;color:var(--ink4);margin-bottom:8px;}
.proj-kv{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:8px;}
.proj-k{font-family:var(--mono);font-size:9px;color:var(--ink4);margin-bottom:1px;text-transform:uppercase;}
.proj-v{font-size:12px;font-weight:600;}
.proj-desc{font-size:12px;color:var(--ink3);line-height:1.65;margin-bottom:8px;}
.proj-parties{padding:10px 16px;background:var(--bg);border-top:1px solid var(--b2);display:flex;gap:12px;flex-wrap:wrap;}
.proj-party{display:flex;flex-direction:column;}
.proj-party-l{font-family:var(--mono);font-size:9px;color:var(--ink4);text-transform:uppercase;}
.proj-party-v{font-size:12px;font-weight:600;}
.proj-detail{border-top:2px solid var(--ink);animation:fadeIn .15s;padding:14px 16px;}

/* ── Buyer view ──────────────────────────────────────────── */
.buyer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;padding:14px 0;}
.buyer-card{background:var(--surface);border:1px solid var(--b);overflow:hidden;cursor:pointer;}
.buyer-card:hover{border-color:#999;}
.buyer-hd{padding:14px 16px 10px;}
.buyer-nm{font-size:14px;font-weight:700;margin-bottom:3px;}
.buyer-type{font-family:var(--mono);font-size:10px;color:var(--ink4);margin-bottom:8px;}
.buyer-segs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.buyer-signal{font-size:12px;color:var(--ink2);line-height:1.65;padding:8px 10px;background:var(--bg);border-left:2px solid var(--amber);}
.buyer-activity{padding:10px 16px;border-top:1px solid var(--b2);}
.buyer-ev{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--b2);font-size:11px;}
.buyer-ev:last-child{border-bottom:none;}
.buyer-ev-dt{font-family:var(--mono);font-size:10px;color:var(--ink4);min-width:80px;flex-shrink:0;}

/* ── Sidebar ─────────────────────────────────────────────── */
.sr{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--b2);}
.sl{font-size:12px;color:var(--ink2);}
.sn{font-family:var(--mono);font-size:15px;font-weight:700;}
.segrow{display:flex;align-items:center;gap:8px;padding:4px 0;}
.segnm{font-size:11px;color:var(--ink2);min-width:110px;}
.segbg{flex:1;height:4px;background:var(--b2);overflow:hidden;}
.segfl{height:100%;background:var(--blue);}
.segct{font-family:var(--mono);font-size:10px;color:var(--ink4);min-width:18px;text-align:right;}
.src-row{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:1px solid var(--b2);}
.src-row:last-child{border-bottom:none;}
.src-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px;}

/* ── Rulebook tab ────────────────────────────────────────── */
.rb-group{margin-bottom:14px;}
.rb-group-title{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 0;margin-bottom:6px;border-bottom:1px solid var(--b2);}
.rb-item{font-size:12px;color:var(--ink2);padding:3px 0;display:flex;align-items:flex-start;gap:7px;line-height:1.5;}

/* ── History ─────────────────────────────────────────────── */
.hist-row{display:flex;align-items:center;gap:14px;padding:10px 18px;border-bottom:1px solid var(--b2);cursor:pointer;}
.hist-row:hover{background:var(--bg);}
.hist-date{font-family:var(--mono);font-size:11px;font-weight:600;min-width:90px;}
.hist-dk{font-size:12px;color:var(--ink3);flex:1;}

/* ── Brief box ───────────────────────────────────────────── */
#brief-box{background:var(--ink);padding:16px 20px;margin-bottom:14px;}
#brief-lbl{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;color:#555;margin-bottom:8px;}
#brief-txt{font-size:12px;color:#C0C0C0;line-height:1.85;white-space:pre-wrap;}

/* ── UI states ───────────────────────────────────────────── */
.box-loading{padding:48px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--ink4);letter-spacing:.08em;}
.box-nodata{padding:48px;text-align:center;}
.box-nodata h3{font-size:15px;font-weight:600;margin-bottom:8px;}
.box-nodata p{font-size:12px;color:var(--ink3);line-height:1.7;margin-bottom:16px;}
.box-err{padding:18px;background:#FFF5F5;border:1px solid #FCA5A5;border-left:4px solid var(--red);}
.box-err h3{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--red);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.partial-banner{background:#1A1200;border:1px solid #4A3A00;border-left:4px solid #FCD34D;padding:9px 14px;margin-bottom:12px;font-family:var(--mono);font-size:10px;color:#FCD34D;display:flex;gap:10px;align-items:flex-start;animation:fadeIn .2s;}

/* ── misc ────────────────────────────────────────────────── */
.empty{text-align:center;padding:40px;font-size:13px;color:var(--ink3);}
.gbtn{font-family:var(--mono);font-size:10px;font-weight:600;padding:5px 12px;border:1px solid var(--b);background:var(--surface);color:var(--ink2);}
.gbtn:hover{background:var(--ink);color:#FFF;border-color:var(--ink);}

/* ── Commercialisation tier badges ─────────────────────────── */
.tier-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.06em;padding:2px 7px;text-transform:uppercase;}
.tier-mvp  {background:#F0FDF4;color:#0A6640;border:1px solid #A7F3D0;}
.tier-paid {background:#EFF6FF;color:#1A56DB;border:1px solid #BFDBFE;}
.tier-scale{background:#F5F3FF;color:#5B21B6;border:1px solid #DDD6FE;}
.tier-lock {background:#F4F4F5;color:#71717A;border:1px solid #D4D4D8;}
/* Feature stub banner */
.feature-stub{background:var(--bg);border:1px solid var(--b);border-left:3px solid #1A56DB;padding:12px 16px;margin-bottom:12px;}
.feature-stub h4{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#1A56DB;margin-bottom:6px;}
.feature-stub p{font-size:12px;color:var(--ink3);line-height:1.65;}
/* Watchlist item */
.wl-item{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--b2);cursor:pointer;}
.wl-item:last-child{border-bottom:none;}
.wl-item:hover{background:#FAFAF8;}
.wl-nm{font-size:13px;font-weight:600;flex:1;}
.wl-ttr{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 7px;}
/* Analyst note stub */
.note-stub{background:#FFFBEB;border:1px dashed #FDE68A;padding:10px 14px;font-size:12px;color:var(--amber);display:flex;gap:8px;align-items:center;}
/* Outcome stub */
.outcome-stub{background:#F0F5FF;border:1px dashed #BFDBFE;padding:10px 14px;font-size:12px;color:var(--blue);display:flex;gap:8px;align-items:center;}
/* Sector rulebook */
.rb-sector-card{background:var(--surface);border:1px solid var(--b);margin-bottom:12px;overflow:hidden;}
.rb-sector-hd{padding:12px 16px;border-bottom:1px solid var(--b2);display:flex;align-items:center;justify-content:space-between;}
.rb-sector-nm{font-size:14px;font-weight:700;}
.rb-sector-row{display:grid;grid-template-columns:180px 1fr;border-bottom:1px solid var(--b2);}
.rb-sector-row:last-child{border-bottom:none;}
.rb-sector-lbl{padding:9px 12px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);background:var(--bg);border-right:1px solid var(--b2);}
.rb-sector-val{padding:9px 14px;font-size:12px;color:var(--ink2);line-height:1.65;}


/* ── Source Registry ─────────────────────────────────────────── */
.src-reg-card{background:var(--surface);border:1px solid var(--b);margin-bottom:10px;overflow:hidden;}
.src-reg-hd{padding:12px 16px 10px;border-bottom:1px solid var(--b2);}
.src-reg-name{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:3px;}
.src-reg-meta{font-family:var(--mono);font-size:10px;color:var(--ink4);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.src-reg-topics{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px;}
.src-reg-topic{font-family:var(--mono);font-size:9px;padding:1px 7px;background:var(--bg);border:1px solid var(--b);color:var(--ink3);}
.src-reg-notes{font-size:11px;color:var(--ink3);line-height:1.65;padding:8px 16px;background:var(--bg);border-top:1px solid var(--b2);}
.rel-badge{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 7px;letter-spacing:.04em;}
.rel-1{background:#F0FDF4;color:#0A6640;border:1px solid #A7F3D0;}
.rel-2{background:#EFF6FF;color:#1A56DB;border:1px solid #BFDBFE;}
.rel-3{background:#FFFBEB;color:#92400E;border:1px solid #FDE68A;}
.type-badge{font-family:var(--mono);font-size:9px;font-weight:600;padding:2px 7px;}
.type-industry {background:var(--bg);color:var(--ink3);border:1px solid var(--b);}
.type-government{background:#FDF4FF;color:#7E22CE;border:1px solid #E9D5FF;}
.type-company   {background:#F0F9FF;color:#0369A1;border:1px solid #BAE6FD;}
.type-academic  {background:#FFF7ED;color:#C2410C;border:1px solid #FED7AA;}
/* Proposal form */
.prop-form{background:var(--surface);border:2px solid var(--ink);padding:0;}
.prop-form-hd{background:var(--ink);padding:10px 16px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;color:#888;text-transform:uppercase;}
.prop-form-bd{padding:16px;}
.prop-row{margin-bottom:12px;}
.prop-lbl{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink4);margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.prop-lbl .req{color:var(--red);}
.prop-input{font-family:var(--mono);font-size:12px;padding:6px 10px;border:1px solid var(--b);background:var(--surface);color:var(--ink);outline:none;width:100%;}
.prop-input:focus{border-color:var(--ink);}
.prop-select{font-family:var(--mono);font-size:12px;padding:6px 10px;border:1px solid var(--b);background:var(--surface);color:var(--ink);outline:none;}
.prop-input::placeholder{color:var(--ink4);}
.prop-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.prop-grid{grid-template-columns:1fr;}}
.prop-note{font-size:11px;color:var(--ink4);margin-top:3px;line-height:1.5;}
.prop-action{display:flex;gap:8px;align-items:center;margin-top:16px;padding-top:14px;border-top:1px solid var(--b2);}
.prop-submit{font-family:var(--mono);font-size:11px;font-weight:700;padding:7px 18px;background:var(--ink);color:#FFF;border:none;cursor:pointer;letter-spacing:.04em;}
.prop-submit:hover{background:#2A2A2A;}
.prop-cancel{font-family:var(--mono);font-size:10px;color:var(--ink4);background:none;border:none;cursor:pointer;padding:7px 10px;}
.prop-cancel:hover{color:var(--ink);}
/* Proposal queue */
.prop-queue-item{padding:10px 14px;border-bottom:1px solid var(--b2);border-left:3px solid var(--blue);background:#F8FBFF;}
.prop-queue-item:last-child{border-bottom:none;}
.prop-status{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 7px;text-transform:uppercase;}
.prop-pending {background:#FEF9C3;color:#92400E;border:1px solid #FDE68A;}
.prop-approved{background:#F0FDF4;color:#0A6640;border:1px solid #A7F3D0;}
.prop-rejected{background:#FEE2E2;color:#B91C1C;border:1px solid #FCA5A5;}


/* ── Project signal timeline ─────────────────────────────────── */
.proj-timeline-dot{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}


/* ════════════════════════════════════════════════════════
   WATCHLIST + ALERT SYSTEM
════════════════════════════════════════════════════════ */

/* Watchlist button — appears on every entity card */
.wl-btn{font-family:var(--mono);font-size:9px;font-weight:700;padding:3px 9px;border:1px solid var(--b);background:var(--surface);color:var(--ink4);cursor:pointer;letter-spacing:.04em;white-space:nowrap;transition:all .12s;}
.wl-btn:hover{border-color:var(--ink);color:var(--ink);}
.wl-btn.wl-active{background:#FEF9C3;color:#92400E;border-color:#FDE68A;}
.wl-btn.wl-active:hover{background:#FDE68A;}

/* Alert badge on nav */
.alert-dot{width:7px;height:7px;border-radius:50%;background:var(--red);display:inline-block;margin-left:3px;animation:blink 1.2s infinite;}

/* Watchlist page layout */
.wl-grid{display:grid;grid-template-columns:280px 1fr;gap:16px;align-items:start;}
@media(max-width:900px){.wl-grid{grid-template-columns:1fr;}}
.wl-sidebar{position:sticky;top:52px;}

/* Watchlist sidebar list */
.wl-list-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--b2);cursor:pointer;transition:background .07s;}
.wl-list-item:last-child{border-bottom:none;}
.wl-list-item:hover{background:var(--bg);}
.wl-list-item.selected{background:#EFF6FF;border-left:3px solid var(--blue);}
.wl-item-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.wl-item-name{font-size:12px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wl-item-meta{font-family:var(--mono);font-size:9px;color:var(--ink4);}
.wl-item-badge{font-family:var(--mono);font-size:9px;font-weight:700;padding:1px 6px;background:#FEE2E2;color:var(--red);border-radius:10px;}

/* Alert feed */
.alert-card{background:var(--surface);border:1px solid var(--b);margin-bottom:10px;overflow:hidden;animation:fadeIn .2s;}
.alert-card.alert-neg{border-left:4px solid var(--red);}
.alert-card.alert-high{border-left:4px solid var(--green);}
.alert-card.alert-med{border-left:4px solid var(--amber);}
.alert-hd{padding:12px 16px 10px;display:flex;gap:12px;align-items:flex-start;}
.alert-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.alert-body{flex:1;min-width:0;}
.alert-entity{font-family:var(--mono);font-size:10px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.alert-headline{font-size:13px;font-weight:600;color:var(--ink);line-height:1.4;margin-bottom:4px;}
.alert-why{font-size:12px;color:var(--ink3);line-height:1.65;padding:7px 10px;background:var(--bg);border-left:2px solid var(--amber);margin-bottom:6px;}
.alert-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.alert-conf{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 7px;}
.alert-dismiss{font-family:var(--mono);font-size:9px;color:var(--ink4);background:none;border:none;cursor:pointer;padding:2px 6px;}
.alert-dismiss:hover{color:var(--red);}

/* Add to watchlist modal */
.wl-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .1s;}
.wl-modal{background:var(--surface);border:2px solid var(--ink);width:420px;max-width:96vw;max-height:90vh;overflow-y:auto;}
.wl-modal-hd{background:var(--ink);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.wl-modal-title{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;color:#888;text-transform:uppercase;}
.wl-modal-close{background:none;border:none;color:#666;font-size:18px;cursor:pointer;padding:0 4px;line-height:1;}
.wl-modal-close:hover{color:#FFF;}
.wl-modal-body{padding:16px;}
.wl-field{margin-bottom:14px;}
.wl-field label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink4);display:block;margin-bottom:4px;}
.wl-field select,.wl-field input,.wl-field textarea{font-family:var(--mono);font-size:12px;padding:6px 10px;border:1px solid var(--b);background:var(--surface);color:var(--ink);width:100%;outline:none;}
.wl-field select:focus,.wl-field input:focus,.wl-field textarea:focus{border-color:var(--ink);}
.wl-threshold-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.wl-modal-actions{display:flex;gap:8px;padding-top:12px;border-top:1px solid var(--b2);}
.wl-save-btn{font-family:var(--mono);font-size:11px;font-weight:700;padding:7px 18px;background:var(--ink);color:#FFF;border:none;cursor:pointer;}
.wl-save-btn:hover{background:#222;}

/* Empty state */
.wl-empty{padding:40px 20px;text-align:center;}
.wl-empty h3{font-size:15px;font-weight:600;margin-bottom:8px;}
.wl-empty p{font-size:12px;color:var(--ink3);line-height:1.7;max-width:340px;margin:0 auto 16px;}

/* Threshold pill */
.threshold-pill{font-family:var(--mono);font-size:9px;font-weight:700;padding:1px 7px;text-transform:uppercase;}
.th-high  {background:#F0FDF4;color:#0A6640;border:1px solid #A7F3D0;}
.th-medium{background:#FEF9C3;color:#92400E;border:1px solid #FDE68A;}
.th-all   {background:#EFF6FF;color:#1A56DB;border:1px solid #BFDBFE;}

</style>
</head>
<body>

<!-- ═══════════════════════════ RELIABILITY BAR ════════════════════ -->
<div id="rbar" class="s-loading">
  <div id="rbar-in">
    <span class="rdot loading" id="rdot"></span>
    <div class="rseg"><span class="rl">STATUS</span><span id="r-status" style="font-weight:600;font-size:11px">Initialising…</span></div>
    <div class="rseg"><span class="rl">Updated</span><span id="r-upd" style="font-size:11px;color:#C0C0C0">—</span></div>
    <div class="rseg"><span class="rl">Sources</span>
      <span id="r-ok"  style="font-size:11px;font-weight:600;color:#4ADE80">—</span>
      <span style="color:#333;font-size:11px"> / </span>
      <span id="r-par" style="font-size:11px;font-weight:600;color:#FCD34D;display:none"></span>
      <span id="r-psep"style="color:#333;display:none;font-size:11px"> / </span>
      <span id="r-fail"style="font-size:11px;font-weight:600;color:#FCA5A5;display:none"></span>
      <span id="r-tot" style="font-size:11px;color:#C0C0C0">—</span>
    </div>
    <div class="rseg"><span class="rl">Events</span><span id="r-evts" style="font-size:11px;color:#C0C0C0">—</span></div>
    <div class="rseg"><span class="rl">Filtered</span><span id="r-filt" style="font-size:11px;color:#444">—</span></div>
    <button class="rbtn" onclick="toggleSrc()" id="r-toggle">SOURCE DETAIL ▾</button>
  </div>
  <div id="src-pills"></div>
  <div id="src-detail-wrap">
    <table class="stbl"><thead><tr><th>Source</th><th>Status</th><th>Items</th><th>Fetched</th><th>Error</th></tr></thead>
    <tbody id="stbl-body"></tbody></table>
  </div>
</div>

<!-- ═══════════════════════════ HEADER ═════════════════════════════ -->
<div id="hdr">
  <div id="hdr-in">
    <div id="hdr-brand">
      <h1>Energy Capital Intelligence</h1>
      <div id="hdr-tagline">Deal Sourcing · Pre-Funding Signals · Evidence-Based</div>
    </div>
    <div id="hdr-actions">
      <button class="hbtn" onclick="copyReport()" id="btn-copy" style="display:none">📋 Export</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════ NAV ════════════════════════════════ -->
<div id="nav">
  <div id="nav-in">
    <button class="tab on"  onclick="switchTab('signals',this)">Signal Feed</button>
    <button class="tab"     onclick="switchTab('companies',this)">Companies</button>
    <button class="tab"     onclick="switchTab('projects',this)">Projects</button>
    <button class="tab"     onclick="switchTab('buyers',this)">Buyers</button>
    <button class="tab"     onclick="switchTab('negative',this)">Negative<span class="tab-badge" id="neg-badge" style="display:none">0</span></button>
    <button class="tab"     onclick="switchTab('sources',this)">Sources</button>
    <button class="tab"     onclick="switchTab('watchlist',this)">Watchlist<span class="tab-badge" id="wl-badge" style="display:none">0</span></button>
    <button class="tab"     onclick="switchTab('sectors',this)">Sector Rulebooks</button>
    <button class="tab"     onclick="switchTab('rulebook',this)">Score Rules</button>
    <button class="tab"     onclick="switchTab('history',this)">Archive</button>
  </div>
</div>

<!-- ═══════════════════════════ FILTER BAR ═════════════════════════ -->
<div id="fbar">
  <div id="fbar-in">
    <input id="srch" placeholder="Search signals, companies, segments…" oninput="renderFeed()">
    <button class="pill on"  onclick="setTier('all',this)">All</button>
    <button class="pill"     onclick="setTier('high',this)">High</button>
    <button class="pill"     onclick="setTier('medium',this)">Medium</button>
    <button class="pill red" onclick="setTier('neg',this)">⚠ Negative</button>
    <div class="pill-sep"></div>
    <button class="pill"     onclick="setTier('unmatched',this)">Unmatched</button>
  </div>
</div>

<!-- ═══════════════════════════ PANELS ═════════════════════════════ -->
<div id="panels-row">
  <div class="panel" id="miss-panel">
    <div class="panel-hd miss"><span class="panel-title miss">⚑ Missing Evidence</span><span class="panel-badge miss" id="miss-count">0</span></div>
    <div id="miss-body"></div>
  </div>
  <div class="panel" id="neg-panel">
    <div class="panel-hd neg"><span class="panel-title neg">⚠ Negative Signals</span><span class="panel-badge neg" id="neg-count">0</span></div>
    <div id="neg-body"></div>
  </div>
</div>

<!-- ═══════════════════════════ MAIN ═══════════════════════════════ -->
<div id="main">
  <div id="feed-col">
    <div class="box-loading"><span class="blink">■</span>  LOADING INTELLIGENCE DATA…</div>
  </div>
  <div id="sidebar">
    <div class="card" style="margin-bottom:12px">
      <div class="chd">Summary</div>
      <div class="cbd" id="stats-box"></div>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div class="chd">Segments</div>
      <div class="cbd" id="seg-box"></div>
    </div>
    <div class="card">
      <div class="chd">Data Sources</div>
      <div class="cbd" id="src-sidebar"></div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════
var D=null, SIGS=[], IDX=[], SRCLOG=[];
var curTier="all", curTab="signals";
var EXP=new Set(), CO_EXP=new Set(), PROJ_EXP=new Set(), BUYER_EXP=new Set();
var PANELS_EXP=false, SRC_OPEN=false;

// ════════════════════════════════════════════════════════════════
// DATA LOADING
// ════════════════════════════════════════════════════════════════
async function loadData(url){
  setRelState("loading");
  url = url||("data/latest.json?"+Date.now());
  try{
    var r=await fetch(url);
    if(r.status===404){setRelState("nodata");renderNoData();return false;}
    if(!r.ok) throw new Error("HTTP "+r.status);
    D=await r.json(); SIGS=D.signals||[]; SRCLOG=D.source_log||[];
    updateRel(); renderSidebar(); renderPanels();
    document.getElementById("btn-copy").style.display="inline-flex";
    var negCt=(D.panels&&D.panels.panel_stats&&D.panels.panel_stats.negative_count)||0;
    var nb=document.getElementById("neg-badge");
    if(negCt>0){nb.textContent=negCt;nb.style.display="inline";}
    var wlCt=(D.panels&&D.panels.panel_stats&&D.panels.panel_stats.watchlist_count)||0;
    var wb=document.getElementById("wl-badge");
    if(wb&&wlCt>0){wb.textContent=wlCt;wb.style.display="inline";}
    return true;
  }catch(err){ setRelState("error",err.message); renderErr(err.message); return false; }
}
async function loadIndex(){
  try{var r=await fetch("data/index.json?"+Date.now());if(!r.ok)return;IDX=await r.json();}catch(e){}
}

function setRelState(s,msg){
  var bar=document.getElementById("rbar"),dot=document.getElementById("rdot"),st=document.getElementById("r-status");
  bar.className="s-"+s; dot.className="rdot "+s;
  var txt={loading:"Initialising…",ok:"ALL SYSTEMS OK",partial:"PARTIAL — sources failed",error:"ERROR",nodata:"NO DATA — run pipeline"}[s]||s;
  if(msg&&s==="error") txt="ERROR: "+msg;
  st.textContent=txt;
}
function updateRel(){
  if(!D) return;
  var rel=D.reliability||{}, log=SRCLOG, s=D.stats||{};
  var ok=rel.sources_ok||log.filter(x=>x.status==="success").length;
  var par=rel.sources_partial||log.filter(x=>x.status==="partial").length;
  var fai=rel.sources_failed||log.filter(x=>x.status==="failed").length;
  var tot=rel.sources_total||log.length||(D.sources||[]).length;
  setRelState(fai>0&&ok===0?"error":fai>0||par>0?"partial":ok>0?"ok":"nodata");
  if(D.generatedAt){
    try{var d=new Date(D.generatedAt);document.getElementById("r-upd").textContent=d.toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});}
    catch(e){document.getElementById("r-upd").textContent=D.generatedAt.slice(0,16);}
  }
  document.getElementById("r-ok").textContent=ok+"✓";
  document.getElementById("r-tot").textContent=" / "+tot;
  if(par>0){document.getElementById("r-par").textContent=par+"~";document.getElementById("r-par").style.display="inline";document.getElementById("r-psep").style.display="inline";}
  if(fai>0){document.getElementById("r-fail").textContent=fai+"✗";document.getElementById("r-fail").style.display="inline";}
  document.getElementById("r-evts").textContent=(rel.new_events!==undefined?rel.new_events:s.total||"—")+" kept";
  document.getElementById("r-filt").textContent=(rel.filtered_out!==undefined?rel.filtered_out:s.filtered_out||"—")+" dropped";
  // pills
  var el=document.getElementById("src-pills");
  if(log.length){
    el.innerHTML=log.map(s=>{var cls=s.status==="success"?"ok":s.status==="partial"?"partial":s.status==="failed"?"failed":"unknown";var ic=s.status==="success"?"●":s.status==="partial"?"◐":"✗";return`<span class="sp ${cls}" title="${esc(s.status==="failed"?s.name+": "+s.error:s.name+": "+s.items+" items")}">${ic} ${esc(s.name)}</span>`;}).join("");
  }
  // table
  var tb=document.getElementById("stbl-body");
  if(log.length){
    tb.innerHTML=log.map(s=>{var dc=s.status==="success"?"#4ADE80":s.status==="partial"?"#FCD34D":"#FCA5A5";var ts="";if(s.fetched_at){try{ts=new Date(s.fetched_at).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});}catch(e){ts=s.fetched_at.slice(11,16);}}return`<tr><td style="color:#C0C0C0">${esc(s.name)}</td><td style="color:${dc};font-weight:700">${s.status.toUpperCase()}</td><td style="color:#888">${s.items}</td><td style="color:#666">${ts}</td><td style="color:#FCA5A5;font-size:9px">${s.error?esc(s.error.slice(0,60)):"—"}</td></tr>`;}).join("");
  }
  // sidebar sources
  var srcSb=document.getElementById("src-sidebar");
  srcSb.innerHTML=log.length?log.map(s=>{var dc=s.status==="success"?"var(--green)":s.status==="partial"?"var(--amber)":"var(--red)";var ts="";if(s.fetched_at){try{ts=new Date(s.fetched_at).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});}catch(e){}}return`<div class="src-row"><span class="src-dot" style="background:${dc};margin-top:3px"></span><div style="flex:1"><div style="font-size:11px;color:var(--ink2)">${esc(s.name)}</div><div style="font-family:var(--mono);font-size:9px;color:var(--ink4)">${s.status==="failed"?"실패":s.items+"건"}${ts?" · "+ts:""}</div>${s.error?`<div style="font-size:10px;color:var(--red)">${esc(s.error.slice(0,50))}</div>`:""}</div></div>`;}).join(""):
    '<div style="font-size:11px;color:var(--ink4)">파이프라인 실행 후 표시</div>';
}

function renderPanels(){

  if(negs.length||miss.length) row.classList.add("show");

  // Negative
  var nb=document.getElementById("neg-body");
  if(!negs.length){nb.innerHTML='<div class="panel-empty">NO NEGATIVE SIGNALS DETECTED</div>';}
  else{
    var shown=PANELS_EXP?negs:negs.slice(0,4);

    }).join("")+(negs.length>4?`<div class="panel-more" onclick="PANELS_EXP=!PANELS_EXP;renderPanels()">${PANELS_EXP?"▴ Collapse":"+"+(negs.length-4)+" more →"}</div>`:"");
  }
  // Missing
  var mb=document.getElementById("miss-body");

    var shown=PANELS_EXP?miss:miss.slice(0,3);
    mb.innerHTML=shown.map(c=>{
      return`<div class="miss-co"><div style="display:flex;align-items:center;gap:7px;margin-bottom:2px"><span style="font-size:12px;font-weight:700">${esc(c.company_name)}</span>${c.critical_gaps>0?`<span style="font-family:var(--mono);font-size:9px;font-weight:700;color:#DC2626;padding:1px 6px;background:#FEE2E2">CRITICAL ${c.critical_gaps}</span>`:""}</div><div style="font-family:var(--mono);font-size:9px;color:var(--ink4);margin-bottom:6px">${esc(c.sector)} · ${esc(c.stage)} · ${c.gap_count} gap(s)</div>${c.gaps.map(g=>{var gc=g.severity==="critical"?"#DC2626":g.severity==="high"?"#EA580C":"var(--amber)";return`<div class="miss-gap"><span style="color:${gc};font-weight:700;flex-shrink:0">✗</span><div><div style="color:${gc};font-weight:500">${esc(g.label)}</div><div class="miss-memo">${esc(g.memo)}</div></div></div>`;}).join("")}</div>`;

function getFiltered(){
  var q=(document.getElementById("srch")||{value:""}).value.trim().toLowerCase();
  return SIGS.filter(ev=>{
    if(curTier==="high")      return ev.signal_tier==="high";
    if(curTier==="medium")    return ev.signal_tier==="medium";
    if(curTier==="neg")       return ev.is_negative;
    if(curTier==="unmatched") return !ev.company_id;
    return true;
  }).filter(ev=>{
    if(!q) return true;
    return [ev.title,ev.company_name,ev.segment,ev.event_type,ev.source_name].join(" ").toLowerCase()
      .includes&&q.split(/\s+/).every(k=>[ev.title,ev.company_name,ev.segment,ev.event_type,ev.source_name].join(" ").toLowerCase().includes(k));
  });
}

function renderFeed(){
  var sigs=getFiltered(), el=document.getElementById("feed-col"), h="";
  if(D&&D.reliability&&D.reliability.sources_failed>0){
    var fails=SRCLOG.filter(s=>s.status==="failed").map(s=>s.name);
    h+=`<div class="partial-banner"><span style="font-size:14px;flex-shrink:0">⚠</span><div><b>PARTIAL DATA</b> — ${D.reliability.sources_failed} source(s) failed: ${esc(fails.join(", "))}<br><span style="color:#A89000;font-weight:400">Signals from failed sources are not included in today's results.</span></div></div>`;
  }
  if(D&&D.brief&&curTier==="all"){h+=`<div id="brief-box"><div id="brief-lbl">INVESTMENT INTELLIGENCE BRIEF — ${esc(D.dateKr||D.date||"")}</div><div id="brief-txt">${esc(D.brief)}</div></div>`;}
  if(!sigs.length){h+=`<div class="card"><div class="empty">No signals matching current filter</div></div>`;el.innerHTML=h;return;}
  h+=`<div class="card"><div class="chd">${curTier.toUpperCase()} SIGNALS <span style="font-weight:400;color:var(--ink4)">${sigs.length}</span></div>`;
  sigs.forEach(ev=>{
    var op=EXP.has(ev.id), ev2=ev.evidence||{};
    var tc=ev.signal_tier==="high"?"var(--green)":ev.signal_tier==="medium"?"var(--amber)":"var(--ink4)";
    var bc=ev.is_negative?"var(--red)":ev.signal_tier==="high"?"var(--green)":"var(--b)";

    h+=`<div class="ec-meta">${tagFor(ev.event_type,ev.is_negative)}<span class="tag t0">${esc(ev.segment||"—")}</span>`;
    if(ev.signal_tier==="high")   h+=`<span class="tag tH">HIGH</span>`;
    if(ev.signal_tier==="medium") h+=`<span class="tag tM">MED</span>`;
    if(ev.is_negative)            h+=`<span class="tag tN">⚠ NEG</span>`;
    h+=`<span class="ec-conf-badge" style="border:1px solid ${cc}40;background:${cc}12;padding:1px 7px"><span style="width:6px;height:6px;border-radius:50%;background:${cc};display:inline-block;margin-right:4px"></span><span style="font-family:var(--mono);font-size:9px;font-weight:700;color:${cc}">${esc(ev2.confidence||"—")}</span></span>`;
    h+=`<span style="margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--ink4)">${esc(ev.event_date||"")}</span></div>`;
    if(ev.company_id) h+=`<div class="ec-co">${esc(ev.company_name||"")}</div>`;
    h+=`<div class="ec-title">${ev.source_url?`<a href="${esc(ev.source_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(ev.title||"")}</a>`:esc(ev.title||"")}</div>`;
    h+=`<div class="ec-sub"><span>${esc(ev.source_name||"—")}</span><span style="color:var(--b)">·</span><span class="sbar"><div class="sbar-bg"><div class="sbar-fill" style="width:${ev.signal_strength||0}%;background:${tc}"></div></div><span class="sbar-n" style="color:${tc}">${ev.signal_strength||0}</span></span>`;
    if(ev.segment) h+=`<button class="wl-btn" style="margin-left:auto;font-size:8px;padding:2px 7px" onclick="event.stopPropagation();wlToggleModal('segment','${ev.segment||""}','${ev.segment||""}',{})" title="Watch this segment">${wlHas('segment',ev.segment||'')?"★":"☆"} ${esc(ev.segment||"")}</button>`;
    h+=`</div>`;
    if(ev2.matched_rule_name&&ev2.matched_rule_name!=="no rule matched") h+=`<div class="ec-rule">rule: <span class="ec-rule-kw">${esc(ev2.matched_rule_name)}</span> · <span>${esc(ev2.matched_rule_tier||"")}</span></div>`;
    if(!op) h+=`<div class="ec-hint">▾ EXPAND EVIDENCE CARD</div>`;
    h+=`</div>`;
    if(op){
      h+=`<div class="ec-body">`;
      // 1. Observed fact — strictly from source, no generation
      h+=`<div class="ec-row"><div class="ec-lbl">Observed<br>Facts<div style="font-family:var(--mono);font-size:8px;color:var(--ink4);margin-top:3px;font-weight:400;text-transform:none;letter-spacing:0">source only</div></div><div class="ec-val"><div class="ec-fact">${esc(ev2.observed_fact||ev.title||"")}${ev2.observed_fact_detail?`<div class="ec-fact-detail">${esc(ev2.observed_fact_detail)}</div>`:""}</div><div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap">${ev.source_url?`<a class="ec-src-link" href="${esc(ev.source_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 Source →</a>`:""}<span style="font-family:var(--mono);font-size:10px;color:var(--ink4)">${esc(ev2.source_label||"")}</span></div></div></div>`;
      // 2. Matched rule
      h+=`<div class="ec-row"><div class="ec-lbl">Matched<br>Rule</div><div class="ec-val">${ev2.matched_rule_name&&ev2.matched_rule_name!=="no rule matched"?`<span style="font-family:var(--mono);font-size:11px;font-weight:700;color:var(--amber)">${esc(ev2.matched_rule_name)}</span> <span style="font-family:var(--mono);font-size:10px;color:var(--ink4)">${esc(ev2.matched_rule_tier||"")}</span>`:`<span style="font-family:var(--mono);font-size:11px;color:var(--ink4);font-style:italic">No specific rule matched</span>`}</div></div>`;

      h+=`<div class="ec-row"><div class="ec-lbl">What Is<br>Missing</div><div class="ec-val"><div class="ec-miss-wrap">${(ev2.missing_evidence||[]).map(m=>`<div class="ec-miss-row"><span style="color:var(--red);font-weight:700;flex-shrink:0">✗</span><span>${esc(m)}</span></div>`).join("")}</div></div></div>`;

      h+=`<div class="ec-row"><div class="ec-lbl">Confidence</div><div class="ec-val" style="display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap"><span class="ec-conf-badge" style="border:1px solid ${cc}40;background:${cc}12"><span style="width:8px;height:8px;border-radius:50%;background:${cc};display:inline-block;margin-right:5px"></span><span style="font-family:var(--mono);font-size:12px;font-weight:700;color:${cc}">${esc(ev2.confidence||"Low")}</span></span><span style="font-size:11px;color:var(--ink3)">${esc(ev2.confidence_rationale||"")}</span></div></div>`;
      // Score breakdown
      h+=renderScoreBreakdown(ev);
      // Company memo
      if(ev.company_id){h+=`<div style="padding:10px 16px;background:var(--bg);border-top:1px solid var(--b2)"><button class="gbtn" onclick="event.stopPropagation();showMemo('${ev.company_id}','${ev.id}')">View Company Memo →</button><div id="memo-${ev.id}"></div></div>`;}
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  h+=`</div>`;
  el.innerHTML=h;
}

function renderScoreBreakdown(ev){
  var bd=ev.score_breakdown||[], str=ev.signal_strength||0;
  var baseScore={Certification:88,Contract:92,Deployment:88,Pilot:70,Financing:82,Hiring:72,Partnership:47,Grant:46,Expansion:72,News:15}[ev.event_type]||15;
  var h=`<div class="rb-wrap"><div style="font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);margin-bottom:7px">Score Breakdown</div>`;
  h+=`<div class="rb-row"><span class="rb-pos">${baseScore}</span><span style="color:var(--ink3)">base (${esc(ev.event_type||"")} event)</span></div>`;
  bd.forEach(b=>{var neg=b.delta<0;h+=`<div class="rb-row"><span class="${neg?"rb-neg":"rb-pos"}">${neg?"":"+"}${b.delta}</span><span style="color:var(--ink3)">${esc(b.reason)}</span></div>`;});
  var tc=str>=60?"#16A34A":str>=35?"#CA8A04":"#DC2626";
  h+=`<div class="rb-ttl"><span style="color:${tc};font-size:15px">${str}</span><span style="font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 8px;background:${tc}18;color:${tc}">${(ev.signal_tier||"low").toUpperCase()}</span><span style="font-family:var(--mono);font-size:9px;color:var(--ink4)">${str>=60?"shown in feed (≥60)":str>=35?"shown w/ Medium filter (≥35)":str>=20?"DB only (<60)":"would be dropped (<20)"}</span></div></div>`;

}

    h+=`</div><div class="co-types">`;

    h+=`</div></div>`;
    h+=`<div class="co-stats">`;
    [{n:co.signal_count||0,l:"Signals",c:"var(--ink)"},{n:co.high_count||0,l:"High",c:"var(--red)"},{n:reinf,l:"Reinf",c:pat.color||"var(--blue)"},{n:neg,l:"Neg",c:"var(--amber)"}].forEach(x=>{h+=`<div class="co-stat"><span class="co-stat-n" style="color:${x.c}">${x.n}</span><span class="co-stat-l">${x.l}</span></div>`;});
    h+=`</div>`;
    h+=`<div style="padding:6px 14px;border-top:1px solid var(--b2);display:flex;align-items:center;gap:8px" onclick="event.stopPropagation()">`;
    h+=wlButtonHtml("company",co.id,co.name||"",{sector:co.sector,stage:co.stage_label});
    if(co.ttr) h+=`<span style="font-family:var(--mono);font-size:9px;color:var(--ink4)">TTR: ${esc(co.ttr)}</span>`;
    h+=`</div>`;
    if(isOpen){
      h+=`<div class="co-detail">`;
      if(pat.memo) h+=`<div class="co-sec"><div class="co-sec-title">Detected Pattern</div><div class="co-pat-memo">${esc(pat.memo)}</div></div>`;
      h+=`<div class="co-sec"><div class="co-sec-title">Commercialization Stage<span style="font-family:var(--mono);font-size:10px;font-weight:700;color:${sc}">${esc(co.stage_label||"")}</span></div><div style="font-size:12px;color:var(--ink3);line-height:1.65">${esc(co.stage_desc||"")}</div></div>`;
      if(ins.observed_facts&&ins.observed_facts.length) h+=`<div class="co-sec"><div class="co-sec-title">Observed Facts <span style="font-weight:400;color:var(--ink4)">(events only)</span></div>${ins.observed_facts.map(f=>`<div style="display:flex;gap:7px;font-size:12px;color:var(--ink2);padding:3px 0;line-height:1.5"><span style="color:var(--green);font-weight:700;flex-shrink:0">✓</span>${esc(f)}</div>`).join("")}</div>`;
      var gaps=co.gaps||[];
      if(gaps.length) h+=`<div class="co-sec" style="background:#FFF8F8"><div class="co-sec-title" style="color:var(--red)">Missing Evidence</div>${gaps.map(g=>{var gc=g.severity==="critical"?"#DC2626":g.severity==="high"?"#EA580C":"var(--amber)";return`<div class="co-miss"><span style="color:${gc};font-weight:700;flex-shrink:0">✗</span><div><div style="font-weight:500;color:${gc}">${esc(g.label)}</div><div class="co-gap-memo">${esc(g.memo)}</div></div></div>`;}).join("")}</div>`;
      if(ins.may_indicate&&ins.may_indicate.length) h+=`<div class="co-sec"><div class="co-sec-title">What This May Indicate <span style="font-weight:400;color:var(--ink4)">(inference)</span></div>${ins.may_indicate.map(m=>`<div style="display:flex;gap:7px;font-size:12px;color:var(--ink2);padding:3px 0;line-height:1.5"><span style="color:var(--blue);font-weight:700;flex-shrink:0">›</span>${esc(m)}</div>`).join("")}</div>`;
      if(ins.next_check) h+=`<div class="co-sec" style="background:#FFFBEB"><div class="co-sec-title" style="color:var(--amber)">Suggested Next Check</div><div style="font-size:12px;color:var(--ink2);line-height:1.65">${esc(ins.next_check)}</div></div>`;
      // Sector rulebook context
      if(co.sector_rulebook&&co.sector_rulebook.key_gate&&co.sector_rulebook.key_gate!=="—"){
        h+=`<div class="co-sec"><div class="co-sec-title">Sector Gate <span style="font-weight:400;color:var(--ink4)">${esc(co.sector||"")}</span></div>`;
        h+=`<div style="font-size:12px;color:var(--ink2);margin-bottom:5px;line-height:1.65"><b>Key Gate:</b> ${esc(co.sector_rulebook.key_gate)}</div>`;
        h+=`<div style="font-size:12px;color:var(--ink2);margin-bottom:5px;line-height:1.65"><b>Commercial Threshold:</b> ${esc(co.sector_rulebook.commercial_threshold||"—")}</div>`;
        if(co.sector_rulebook.red_flags&&co.sector_rulebook.red_flags.length) h+=`<div style="font-size:11px;color:var(--red)">${co.sector_rulebook.red_flags.map(f=>"✗ "+esc(f)).join(" · ")}</div>`;
        h+=`</div>`;
      }
      // linked projects
      if(co.linked_projects&&co.linked_projects.length) h+=`<div class="co-sec"><div class="co-sec-title">Linked Projects</div>${co.linked_projects.map(p=>`<div style="display:flex;gap:8px;font-size:12px;padding:3px 0"><span style="font-family:var(--mono);font-size:10px;padding:1px 6px;background:var(--bg);border:1px solid var(--b)">${esc(p.status)}</span><span>${esc(p.name)} <span style="color:var(--ink4)">— ${esc(p.location)}</span></span></div>`).join("")}</div>`;
      // Analyst notes + triage + outcome stubs (paid/scale tier)
      h+=renderAnalystStubs(co.id);
      if(evs.length) h+=`<div class="co-sec"><div class="co-sec-title">Signal Timeline <span style="font-weight:400;color:var(--ink4)">${evs.length} events</span></div>${evs.map(ev=>{var tc2=ev.signal_tier==="high"?"var(--green)":ev.signal_tier==="medium"?"var(--amber)":"var(--ink4)";var bc2=ev.is_negative?"var(--red)":ev.signal_tier==="high"?"var(--green)":"var(--b)";return`<div class="co-ev" style="border-left:2px solid ${bc2};padding-left:8px"><div class="co-ev-dt">${esc(ev.event_date||"")}</div><div style="flex:1"><div style="display:flex;gap:5px;margin-bottom:3px;flex-wrap:wrap">${tagFor(ev.event_type,ev.is_negative)}<span style="font-family:var(--mono);font-size:10px;font-weight:700;color:${tc2}">${ev.signal_strength||0}</span></div><div class="co-ev-title">${ev.source_url?`<a href="${esc(ev.source_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(ev.title||"")}</a>`:esc(ev.title||"")}</div><div class="co-ev-src">${esc(ev.source_name||"")}</div></div></div>`;}).join("")}</div>`;
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  h+=`</div>`;
  el.innerHTML=h;
}

// PROJECTS TAB
// ════════════════════════════════════════════════════════════════
function renderProjects(){
  var el=document.getElementById("feed-col");

  var typeIcon  ={"announcement":"📣","pilot":"🔬","partner":"🤝","certification":"✓","funding":"💰","contract":"📄","construction":"🏗","deployment":"🚀","delay":"⏱","regulatory":"🏛"};
  var typeColor ={"announcement":"#1A56DB","pilot":"#7D4E00","partner":"#5B21B6","certification":"#0A6640","funding":"#0A6640","contract":"#0A6640","construction":"#1A56DB","deployment":"#16A34A","delay":"#C0392B","regulatory":"#6E6E6E"};

  var total=projs.length, withInbound=projs.filter(p=>(p.inbound_signals||[]).length>0).length;

  h+=`<div style="padding:10px 16px;background:#FFF8F0;border-bottom:2px solid var(--amber)">`;
  h+=`<div style="font-family:var(--mono);font-size:9px;font-weight:700;color:var(--amber);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px">⚠ DATA INTEGRITY</div>`;
  h+=`<div style="font-size:12px;color:var(--ink2);line-height:1.65">Signal log entries are <b>analyst-curated</b> with source citations. Inbound signals from RSS are <b>pending review</b> — not yet confirmed facts. Do not cite unverified figures.</div>`;
  h+=`</div>`;
  h+=`<div style="padding:10px 16px;display:flex;gap:20px;flex-wrap:wrap;border-bottom:1px solid var(--b2)">`;
  [{n:total,l:"Projects",c:"var(--ink)"},...Object.entries(byStage).map(([k,v])=>({n:v,l:k,c:typeColor[k.toLowerCase()]||"var(--ink4)"})),{n:withInbound,l:"New signals (pending)",c:"var(--blue)"}]
    .forEach(x=>{h+=`<div><div style="font-family:var(--mono);font-size:18px;font-weight:700;color:${x.c}">${x.n}</div><div style="font-family:var(--mono);font-size:9px;color:var(--ink4);text-transform:uppercase;letter-spacing:.05em">${esc(x.l)}</div></div>`;});
  h+=`</div></div>`;

  // Project cards
  projs.forEach(p=>{
    var sc=p.stage_color||"#6E6E6E", isOpen=PROJ_EXP.has(p.id);
    var log=p.signal_log_sorted||p.signal_log||[];
    var logAsc=[...log].reverse();
    var known=p.what_is_known||[];
    var missing=p.what_is_missing||[];
    var inbound=p.inbound_signals||[];
    var negEvts=p.negative_events||[];
    var pc=p.pattern_color||"var(--ink4)";

    h+=`<div class="card" style="margin-bottom:12px;border-left:4px solid ${sc}">`;

    // ── Card header ─────────────────────────────────────────────────────
    h+=`<div style="padding:14px 16px 12px;cursor:pointer" onclick="toggleProj('${p.id}')">`;

    // Title row
    h+=`<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">`;
    h+=`<span style="font-size:15px;font-weight:700;color:var(--ink)">${esc(p.name||"")}</span>`;
    h+=`<span style="font-family:var(--mono);font-size:9px;font-weight:700;padding:3px 9px;background:${sc}18;color:${sc};border:1px solid ${sc}40;white-space:nowrap">${esc(p.current_stage||"Unknown")}</span>`;
    h+=`</div>`;

    // Location + type + parties
    h+=`<div style="font-family:var(--mono);font-size:10px;color:var(--ink4);margin-bottom:7px">`;
    h+=`📍 ${esc(p.location||"")} · ${esc(p.type||"")}`;
    h+=`</div>`;

    // Parties row
    h+=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px">`;
    [{l:"Developer",v:p.developer},{l:"Offtaker",v:p.offtaker},{l:"EPC",v:p.epc}].forEach(kv=>{
      if(!kv.v) return;
      var isUnknown = kv.v.includes("unknown")||kv.v.includes("TBD")||kv.v.includes("not yet");
      h+=`<div style="padding:4px 9px;background:var(--bg);border:1px solid var(--b)">`;
      h+=`<div style="font-family:var(--mono);font-size:8px;color:var(--ink4);text-transform:uppercase;margin-bottom:1px">${esc(kv.l)}</div>`;
      h+=`<div style="font-size:11px;font-weight:600;color:${isUnknown?"var(--red)":"var(--ink)"}">${esc(kv.v)}</div>`;
      h+=`</div>`;
    });
    h+=`</div>`;

    // Pattern
    if(p.pattern){
      h+=`<div style="font-size:11px;font-weight:500;color:${pc};margin-bottom:7px">`;
      h+=`${negEvts.length?"⚠":"●"} ${esc(p.pattern)}</div>`;
    }

    // Signal mini-timeline (collapsed view — last 3 events)
    if(log.length>0){
      h+=`<div style="display:flex;gap:0;align-items:center;margin-bottom:6px">`;
      logAsc.slice(-6).forEach((ev,i,arr)=>{
        var et=ev.event_type||"announcement";
        var ec=typeColor[et]||"#6E6E6E";
        var ei=typeIcon[et]||"●";
        var isLast=i===arr.length-1;
        h+=`<div style="display:flex;align-items:center">`;
        h+=`<span title="${esc(typeLabel[et]||et)} — ${esc(ev.date)}" style="width:22px;height:22px;border-radius:50%;background:${ec}18;border:1.5px solid ${ec};display:inline-flex;align-items:center;justify-content:center;font-size:11px;cursor:default">${ei}</span>`;
        if(!isLast) h+=`<span style="width:16px;height:1.5px;background:var(--b2);display:inline-block;margin:0 -1px"></span>`;
        h+=`</div>`;
      });
      if(log.length>6) h+=`<span style="font-family:var(--mono);font-size:9px;color:var(--ink4);margin-left:6px">+${log.length-6} more</span>`;
      h+=`</div>`;
    }

    // Stats row
    h+=`<div style="display:flex;gap:10px;align-items:center">`;
    h+=`<span style="font-family:var(--mono);font-size:10px;color:var(--ink4)">${log.length} confirmed event${log.length!==1?"s":""}</span>`;
    if(p.recent_event_count>0) h+=`<span style="font-family:var(--mono);font-size:10px;color:var(--blue)">${p.recent_event_count} in last 90d</span>`;
    if(negEvts.length>0) h+=`<span style="font-family:var(--mono);font-size:10px;color:var(--red)">⚠ ${negEvts.length} delay</span>`;
    if(inbound.length>0) h+=`<span style="font-family:var(--mono);font-size:10px;color:var(--blue);padding:1px 7px;background:#EFF6FF;border:1px solid #BFDBFE">${inbound.length} pending review</span>`;
    h+=`</div>`;

    if(!isOpen) h+=`<div style="font-family:var(--mono);font-size:9px;color:var(--ink4);margin-top:6px;letter-spacing:.04em">▾ EXPAND SIGNAL HISTORY</div>`;
    h+=`</div>`; // header click zone
    h+=`<div style="padding:6px 14px 8px;display:flex;align-items:center;gap:8px" onclick="event.stopPropagation()">`;
    h+=wlButtonHtml("project",p.id,p.name||"",{location:p.location,type:p.type});
    h+=`</div>`;

    // ── Expanded detail ─────────────────────────────────────────────────
    if(isOpen){
      h+=`<div style="border-top:2px solid var(--ink);animation:fadeIn .15s">`;

      // Investment angle
      if(p.investment_angle){
        h+=`<div style="padding:10px 16px;background:#F0F5FF;border-bottom:1px solid var(--b2)">`;
        h+=`<div style="font-family:var(--mono);font-size:9px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px">Investment Angle</div>`;
        h+=`<div style="font-size:12px;color:var(--ink2);line-height:1.65">${esc(p.investment_angle)}</div>`;
        h+=`</div>`;
      }

      // ── Signal log timeline ───────────────────────────────────────────
      h+=`<div style="padding:12px 16px 0">`;
      h+=`<div style="font-family:var(--mono);font-size:9px;font-weight:700;color:var(--ink4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px">Signal History <span style="font-weight:400">(analyst-curated, source-cited)</span></div>`;

      if(!logAsc.length){
        h+=`<div style="font-size:12px;color:var(--ink4);font-style:italic;padding:8px 0">No confirmed signals logged yet.</div>`;
      } else {
        logAsc.forEach((ev,idx)=>{
          var et=ev.event_type||"announcement";
          var ec=typeColor[et]||"#6E6E6E";
          var ei=typeIcon[et]||"●";
          var el2=typeLabel[et]||et;
          var isLast=idx===logAsc.length-1;

          h+=`<div style="display:flex;gap:12px;padding-bottom:${isLast?16:0}px">`;
          // Timeline spine
          h+=`<div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0">`;
          h+=`<span style="width:28px;height:28px;border-radius:50%;background:${ec}18;border:2px solid ${ec};display:inline-flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">${ei}</span>`;
          if(!isLast) h+=`<div style="width:2px;flex:1;min-height:20px;background:var(--b2);margin:3px 0"></div>`;
          h+=`</div>`;
          // Event content
          h+=`<div style="flex:1;padding-bottom:${isLast?0:16}px">`;
          h+=`<div style="display:flex;align-items:center;gap:7px;margin-bottom:4px;flex-wrap:wrap">`;
          h+=`<span style="font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 7px;background:${ec}15;color:${ec};border:1px solid ${ec}35;text-transform:uppercase;letter-spacing:.04em">${esc(el2)}</span>`;
          h+=`<span style="font-family:var(--mono);font-size:10px;color:var(--ink4)">${esc(ev.date||"")}</span>`;
          h+=`</div>`;
          h+=`<div style="font-size:13px;font-weight:500;color:var(--ink);margin-bottom:4px;line-height:1.4">${esc(ev.headline||"")}</div>`;
          // Source
          h+=`<div style="font-family:var(--mono);font-size:9px;color:var(--ink4);margin-bottom:6px">`;
          h+=`📄 ${esc(ev.source_of_record||"source unknown")}`;
          if(ev.source_url) h+=` <a href="${esc(ev.source_url)}" target="_blank" rel="noopener" style="color:var(--blue);margin-left:4px" onclick="event.stopPropagation()">→</a>`;
          h+=`</div>`;
          // Confirmed facts
          if((ev.confirmed_facts||[]).length){
            h+=`<div style="margin-bottom:4px">`;
            ev.confirmed_facts.forEach(f=>{
              h+=`<div style="display:flex;gap:6px;font-size:11px;color:var(--ink2);padding:2px 0;line-height:1.5">`;
              h+=`<span style="color:var(--green);font-weight:700;flex-shrink:0">✓</span><span>${esc(f)}</span>`;
              h+=`</div>`;
            });
            h+=`</div>`;
          }
          // Unknowns at this point in time
          if((ev.what_is_unknown||[]).length){
            h+=`<div style="background:#FFF8F8;border-left:2px solid var(--red);padding:5px 8px;margin-top:4px">`;
            ev.what_is_unknown.forEach(u=>{
              h+=`<div style="display:flex;gap:6px;font-size:10px;color:#7F1D1D;padding:1px 0;line-height:1.5">`;
              h+=`<span style="font-weight:700;flex-shrink:0">✗</span><span>${esc(u)}</span>`;
              h+=`</div>`;
            });
            h+=`</div>`;
          }
          h+=`</div>`; // event content
          h+=`</div>`; // timeline row
        });
      }
      h+=`</div>`; // signal log section

      // ── Current: What Is Known / What Is Missing ───────────────────────
      h+=`<div style="display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--b2)">`;

      // What is known
      h+=`<div style="padding:12px 14px;border-right:1px solid var(--b2)">`;
      h+=`<div style="font-family:var(--mono);font-size:9px;font-weight:700;color:var(--green);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px">Current: Known</div>`;
      if(!known.length){
        h+=`<div style="font-size:11px;color:var(--ink4);font-style:italic">No confirmed facts on record.</div>`;
      } else {
        known.slice(-5).forEach(k=>{
          var kc=typeColor[k.event_type]||"#6E6E6E";
          h+=`<div style="display:flex;gap:6px;padding:3px 0;font-size:11px;color:var(--ink2);line-height:1.5">`;
          h+=`<span style="color:var(--green);font-weight:700;flex-shrink:0">✓</span>`;
          h+=`<div><div>${esc(k.fact)}</div>`;
          h+=`<div style="font-family:var(--mono);font-size:8px;color:var(--ink4)">${esc(k.date)} · ${esc(k.source)}</div>`;
          h+=`</div></div>`;
        });
        if(known.length>5) h+=`<div style="font-family:var(--mono);font-size:9px;color:var(--ink4);padding-top:4px">+${known.length-5} earlier facts in log above</div>`;
      }
      h+=`</div>`;

      // What is missing
      h+=`<div style="padding:12px 14px;background:#FFF8F8">`;
      h+=`<div style="font-family:var(--mono);font-size:9px;font-weight:700;color:var(--red);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px">Current: Missing</div>`;
      if(!missing.length){
        h+=`<div style="font-size:11px;color:var(--ink4);font-style:italic">No gaps logged for latest entry.</div>`;
      } else {
        missing.forEach(m=>{
          h+=`<div style="display:flex;gap:6px;padding:3px 0;font-size:11px;color:#7F1D1D;line-height:1.5">`;
          h+=`<span style="font-weight:700;flex-shrink:0">✗</span>`;
          h+=`<div>${esc(m.item||m)}</div>`;
          h+=`</div>`;
        });
      }
      h+=`</div>`;

      h+=`</div>`; // known/missing grid

      // ── Inbound signals (pending analyst review) ──────────────────────
      if(inbound.length>0){
        h+=`<div style="border-top:1px solid var(--b2);padding:12px 16px;background:#F8FBFF">`;
        h+=`<div style="font-family:var(--mono);font-size:9px;font-weight:700;color:var(--blue);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px">`;
        h+=`⚡ Inbound Signals — Pending Review <span style="font-weight:400">(auto-matched from RSS)</span></div>`;
        h+=`<div style="font-size:11px;color:var(--blue);background:#EFF6FF;border:1px solid #BFDBFE;padding:5px 9px;margin-bottom:7px;line-height:1.5">`;
        h+=`These signals were auto-matched by keyword. <b>Analyst review required</b> before adding to the confirmed signal log.</div>`;
        inbound.forEach(s=>{
          var sc2=typeColor[s.event_type]||"var(--blue)";
          h+=`<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--b2);font-size:11px">`;
