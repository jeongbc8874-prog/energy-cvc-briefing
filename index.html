<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Energy CVC Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@300;400;500;600&family=IBM+Plex+Serif:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink:     #0A0A0A;
  --ink-2:   #3A3A3A;
  --ink-3:   #707070;
  --ink-4:   #A8A8A8;
  --rule:    #E2E2E2;
  --rule-2:  #F0F0F0;
  --paper:   #FAFAF8;
  --white:   #FFFFFF;
  --accent:  #D4380D;   /* 파이낸셜 타임스 느낌의 레드 */
  --accent-2:#0050B3;   /* 딥 블루 */
  --green:   #135200;
  --amber:   #874D00;
  --mono:    'IBM Plex Mono', monospace;
  --sans:    'IBM Plex Sans KR', sans-serif;
  --serif:   'IBM Plex Serif', serif;
}
* { box-sizing:border-box; margin:0; padding:0; }
html { font-size:14px; }
body { font-family:var(--sans); background:var(--paper); color:var(--ink); line-height:1.5; }
a { color:inherit; text-decoration:none; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:var(--rule); }

/* ── 최상단 티커 바 ── */
.ticker {
  background:var(--ink);
  color:#888;
  font-family:var(--mono);
  font-size:10px;
  padding:5px 20px;
  display:flex;
  align-items:center;
  gap:20px;
  overflow:hidden;
  white-space:nowrap;
  letter-spacing:0.03em;
}
.ticker-label { color:#555; text-transform:uppercase; letter-spacing:0.08em; }
.ticker-value { color:#C8C8C8; }
.ticker-sep { color:#333; }

/* ── 마스트헤드 ── */
.mast {
  background:var(--white);
  border-bottom:3px solid var(--ink);
  padding:0 20px;
}
.mast-in {
  max-width:1280px;
  margin:0 auto;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:14px 0 10px;
  gap:16px;
}
.mast-left { display:flex; align-items:center; gap:12px; }
.mast-center { text-align:center; }
.mast-title {
  font-family:var(--serif);
  font-size:22px;
  font-weight:600;
  color:var(--ink);
  letter-spacing:-0.3px;
  line-height:1;
}
.mast-sub {
  font-family:var(--mono);
  font-size:9px;
  color:var(--ink-3);
  letter-spacing:0.12em;
  text-transform:uppercase;
  margin-top:4px;
}
.mast-right { display:flex; align-items:center; justify-content:flex-end; gap:8px; }
.live-dot {
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-family:var(--mono);
  font-size:10px;
  color:var(--ink-3);
}
.live-dot::before {
  content:'';
  width:6px;
  height:6px;
  background:#22C55E;
  border-radius:50%;
  animation:pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── 날짜 바 ── */
.datebar {
  border-bottom:1px solid var(--rule);
  background:var(--white);
  padding:0 20px;
}
.datebar-in {
  max-width:1280px;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:6px 0;
  flex-wrap:wrap;
}
.datebar-date {
  font-family:var(--mono);
  font-size:10px;
  color:var(--ink-3);
  letter-spacing:0.05em;
}
.datebar-actions { display:flex; align-items:center; gap:8px; }
.btn-sm {
  font-family:var(--mono);
  font-size:10px;
  font-weight:500;
  padding:4px 10px;
  border:1px solid var(--rule);
  background:var(--white);
  color:var(--ink-2);
  cursor:pointer;
  letter-spacing:0.03em;
  transition:all 0.1s;
}
.btn-sm:hover { background:var(--ink); color:var(--white); border-color:var(--ink); }
.btn-primary { background:var(--accent); color:var(--white); border-color:var(--accent); }
.btn-primary:hover { background:#A8290A; }

/* ── 탭 네비 ── */
.nav {
  background:var(--white);
  border-bottom:1px solid var(--ink);
  padding:0 20px;
  position:sticky;
  top:0;
  z-index:100;
}
.nav-in {
  max-width:1280px;
  margin:0 auto;
  display:flex;
  align-items:flex-end;
  gap:0;
}
.nav-tab {
  font-family:var(--mono);
  font-size:11px;
  font-weight:500;
  letter-spacing:0.05em;
  text-transform:uppercase;
  color:var(--ink-3);
  padding:11px 18px 9px;
  border:none;
  background:none;
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color 0.1s;
  white-space:nowrap;
}
.nav-tab:hover { color:var(--ink); }
.nav-tab.on {
  color:var(--ink);
  border-bottom-color:var(--accent);
  font-weight:600;
}

/* ── 필터 바 ── */
.filter-bar {
  background:var(--paper);
  border-bottom:1px solid var(--rule);
  padding:8px 20px;
  position:sticky;
  top:42px;
  z-index:90;
}
.filter-in {
  max-width:1280px;
  margin:0 auto;
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
}
.srch {
  font-family:var(--mono);
  font-size:11px;
  padding:5px 10px;
  border:1px solid var(--rule);
  background:var(--white);
  color:var(--ink);
  outline:none;
  flex:1;
  min-width:160px;
  max-width:260px;
}
.srch:focus { border-color:var(--ink); }
.pill {
  font-family:var(--mono);
  font-size:10px;
  font-weight:500;
  letter-spacing:0.04em;
  padding:4px 10px;
  border:1px solid var(--rule);
  background:var(--white);
  color:var(--ink-3);
  cursor:pointer;
  transition:all 0.1s;
}
.pill:hover { border-color:var(--ink-2); color:var(--ink-2); }
.pill.on { background:var(--ink); color:var(--white); border-color:var(--ink); }
.pill.red.on { background:var(--accent); border-color:var(--accent); }
.pill.blue.on { background:var(--accent-2); border-color:var(--accent-2); }

/* ── 메인 레이아웃 ── */
.body {
  max-width:1280px;
  margin:0 auto;
  padding:0 20px;
  display:grid;
  grid-template-columns:1fr 280px;
  gap:0;
  min-height:calc(100vh - 160px);
}
@media(max-width:900px) {
  .body { grid-template-columns:1fr; }
  .sidebar { display:none; }
}

/* ── 메인 피드 ── */
.feed { border-right:1px solid var(--rule); padding:0; }
.feed-hd {
  padding:16px 20px 12px;
  border-bottom:1px solid var(--rule-2);
  display:flex;
  align-items:baseline;
  gap:10px;
}
.feed-title {
  font-family:var(--mono);
  font-size:10px;
  font-weight:600;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--ink-3);
}
.feed-count {
  font-family:var(--mono);
  font-size:10px;
  color:var(--ink-4);
}

/* ── 신호 카드 ── */
.sig {
  border-bottom:1px solid var(--rule-2);
  padding:16px 20px;
  cursor:pointer;
  transition:background 0.08s;
  position:relative;
}
.sig:hover { background:var(--white); }
.sig.expanded { background:var(--white); }
.sig-meta {
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:6px;
  flex-wrap:wrap;
}
.tag {
  font-family:var(--mono);
  font-size:9px;
  font-weight:600;
  letter-spacing:0.08em;
  text-transform:uppercase;
  padding:2px 6px;
}
.tag-kr  { background:#FFF7E6; color:#874D00; }
.tag-cn  { background:#FFF1F0; color:#A8071A; }
.tag-gl  { background:#F0F5FF; color:#0050B3; }
.tag-dart{ background:#F6FFED; color:#135200; }
.tag-H   { background:#FFF1F0; color:var(--accent); }
.tag-M   { background:#FFFBE6; color:var(--amber); }
.tag-ev  { color:var(--ink-3); border:1px solid var(--rule); background:transparent; }
.tag-cv  { color:#0050B3; border:1px solid #BAE0FF; background:#F0F5FF; }
.sig-time {
  font-family:var(--mono);
  font-size:10px;
  color:var(--ink-4);
  margin-left:auto;
}
.sig-co {
  font-family:var(--mono);
  font-size:11px;
  font-weight:600;
  letter-spacing:0.03em;
  margin-bottom:4px;
}
.sig-title {
  font-size:14px;
  font-weight:500;
  color:var(--ink);
  line-height:1.45;
  margin-bottom:4px;
}
.sig-title a {
  color:var(--ink);
  border-bottom:1px solid transparent;
  transition:border-color 0.1s;
}
.sig-title a:hover { border-bottom-color:var(--accent); color:var(--accent); }
.sig-src {
  font-family:var(--mono);
  font-size:10px;
  color:var(--ink-4);
}
.expand-hint {
  font-family:var(--mono);
  font-size:10px;
  color:var(--ink-4);
  margin-top:4px;
}

/* ── 펼침 영역 ── */
.sig-body {
  margin-top:12px;
  padding-top:12px;
  border-top:1px solid var(--rule-2);
  animation:slideDown 0.15s ease;
}
@keyframes slideDown { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

.smr {
  font-size:13px;
  color:var(--ink-2);
  line-height:1.7;
  margin-bottom:10px;
}

/* 수치 추출 박스 */
.facts-row {
  display:flex;
  gap:16px;
  flex-wrap:wrap;
  margin-bottom:10px;
  padding:8px 12px;
  background:var(--paper);
  border-left:3px solid var(--ink);
}
.fact-item { display:flex; flex-direction:column; gap:2px; }
.fact-label {
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--ink-4);
}
.fact-value {
  font-family:var(--mono);
  font-size:12px;
  font-weight:600;
  color:var(--ink);
}

/* 도메인 인사이트 */
.insight {
  border-left:3px solid var(--accent);
  padding:10px 12px;
  margin-bottom:8px;
  background:var(--white);
}
.insight-label {
  font-family:var(--mono);
  font-size:9px;
  font-weight:600;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:5px;
}
.insight-text {
  font-size:13px;
  color:var(--ink-2);
  line-height:1.7;
}
.why-now {
  font-family:var(--mono);
  font-size:11px;
  color:var(--ink-3);
  margin-top:6px;
  padding-top:6px;
  border-top:1px solid var(--rule-2);
}

/* 교차검증 */
.cv-row {
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:8px;
}
.cv-badge {
  font-family:var(--mono);
  font-size:9px;
  font-weight:600;
  letter-spacing:0.06em;
  padding:2px 7px;
  text-transform:uppercase;
}
.cv-1 { background:#F5F5F5; color:var(--ink-3); }
.cv-2 { background:#E6F4FF; color:#0050B3; }
.cv-3 { background:#F6FFED; color:#135200; }

/* 원문 링크 */
.orig-link {
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-family:var(--mono);
  font-size:10px;
  font-weight:500;
  color:var(--accent-2);
  padding:4px 10px;
  border:1px solid #BAE0FF;
  background:#F0F5FF;
  letter-spacing:0.03em;
  transition:all 0.1s;
}
.orig-link:hover { background:var(--accent-2); color:var(--white); border-color:var(--accent-2); }

/* 리스크 */
.risk-row {
  font-family:var(--mono);
  font-size:10px;
  color:var(--amber);
  margin-top:6px;
  padding:4px 8px;
  border:1px solid #FFD591;
  background:#FFFBE6;
}

/* ── 사이드바 ── */
.sidebar {
  padding:20px 0 20px 20px;
  display:flex;
  flex-direction:column;
  gap:24px;
}
.sb-section {}
.sb-hd {
  font-family:var(--mono);
  font-size:9px;
  font-weight:600;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--ink-4);
  padding-bottom:8px;
  border-bottom:1px solid var(--rule);
  margin-bottom:10px;
}
.sb-stat {
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  padding:5px 0;
  border-bottom:1px solid var(--rule-2);
}
.sb-stat-l { font-size:12px; color:var(--ink-2); }
.sb-stat-n { font-family:var(--mono); font-size:15px; font-weight:600; }

/* 정책 미니 카드 */
.pol-mini {
  padding:8px 10px;
  margin-bottom:6px;
  border-left:2px solid var(--rule);
  cursor:pointer;
  transition:all 0.1s;
}
.pol-mini:hover { border-left-color:var(--accent); background:var(--white); }
.pol-mini-label { font-size:11px; font-weight:500; color:var(--ink); margin-bottom:2px; }
.pol-mini-sub { font-family:var(--mono); font-size:10px; color:var(--ink-4); }
.pol-mini-H { border-left-color:var(--accent); }
.pol-mini-M { border-left-color:var(--amber); }

/* 브리핑 */
.brief-box {
  background:var(--ink);
  padding:16px 20px;
  margin:0;
}
.brief-label {
  font-family:var(--mono);
  font-size:9px;
  font-weight:600;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:#666;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:8px;
}
.brief-label::after {
  content:'';
  flex:1;
  height:1px;
  background:#333;
}
.brief-text {
  font-size:12px;
  color:#C0C0C0;
  line-height:1.85;
  white-space:pre-wrap;
}

/* ── 정책 탭 ── */
.pol-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:1px;
  background:var(--rule);
}
.pol-card {
  background:var(--white);
  padding:20px;
}
.pol-card-hd {
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:10px;
}
.pol-card-title { font-size:14px; font-weight:600; color:var(--ink); }
.pol-urg {
  font-family:var(--mono);
  font-size:9px;
  font-weight:600;
  letter-spacing:0.06em;
  padding:2px 7px;
  text-transform:uppercase;
}
.pol-H { background:#FFF1F0; color:var(--accent); }
.pol-M { background:#FFFBE6; color:var(--amber); }
.pol-L { background:#F5F5F5; color:var(--ink-3); }
.pol-desc { font-size:12px; color:var(--ink-2); line-height:1.65; margin-bottom:12px; }
.pol-cos {
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  margin-bottom:12px;
}
.pol-co {
  font-family:var(--mono);
  font-size:10px;
  padding:2px 8px;
  border:1px solid var(--rule);
  color:var(--ink-3);
}
.pol-link-btn {
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-family:var(--mono);
  font-size:10px;
  font-weight:600;
  letter-spacing:0.04em;
  color:var(--accent-2);
  padding:5px 12px;
  border:1px solid #BAE0FF;
  background:#F0F5FF;
  text-decoration:none;
  transition:all 0.1s;
}
.pol-link-btn:hover { background:var(--accent-2); color:var(--white); border-color:var(--accent-2); }

/* ── 히스토리 (심플) ── */
.hist-wrap { padding:0; }
.hist-srch {
  padding:16px 20px;
  border-bottom:1px solid var(--rule);
  display:flex;
  gap:8px;
  align-items:center;
}
.hist-list {}
.hist-row {
  display:flex;
  align-items:center;
  gap:16px;
  padding:12px 20px;
  border-bottom:1px solid var(--rule-2);
  cursor:pointer;
  transition:background 0.08s;
}
.hist-row:hover { background:var(--white); }
.hist-date {
  font-family:var(--mono);
  font-size:11px;
  font-weight:600;
  color:var(--ink);
  min-width:90px;
}
.hist-datek { font-size:12px; color:var(--ink-3); flex:1; }
.hist-stats { display:flex; gap:12px; }
.hist-stat { font-family:var(--mono); font-size:10px; color:var(--ink-4); }

/* ── DART 탭 ── */
.dart-empty {
  padding:48px 20px;
  text-align:center;
}
.dart-row {
  padding:14px 20px;
  border-bottom:1px solid var(--rule-2);
  display:flex;
  align-items:flex-start;
  gap:14px;
}
.dart-row:hover { background:var(--white); }
.dart-co {
  font-family:var(--mono);
  font-size:10px;
  font-weight:600;
  color:var(--green);
  min-width:100px;
}
.dart-title-col { flex:1; }
.dart-title-link {
  font-size:13px;
  font-weight:500;
  color:var(--ink);
  border-bottom:1px solid transparent;
  transition:border-color 0.1s;
}
.dart-title-link:hover { border-bottom-color:var(--accent); color:var(--accent); }
.dart-date { font-family:var(--mono); font-size:10px; color:var(--ink-4); margin-top:3px; }

/* ── 팩트 배너 ── */
.fact-notice {
  font-family:var(--mono);
  font-size:10px;
  color:var(--ink-4);
  letter-spacing:0.04em;
  padding:8px 20px;
  border-bottom:1px solid var(--rule-2);
  background:var(--white);
  display:flex;
  align-items:center;
  gap:10px;
}
.fact-dot { color:#22C55E; font-size:12px; }

/* ── 로딩 ── */
.loading {
  padding:60px 20px;
  text-align:center;
  font-family:var(--mono);
  font-size:11px;
  color:var(--ink-4);
  letter-spacing:0.08em;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.blink { animation:blink 1.2s infinite; }

/* ── 빈 상태 ── */
.empty {
  padding:60px 20px;
  text-align:center;
  font-family:var(--mono);
  font-size:11px;
  color:var(--ink-4);
  letter-spacing:0.06em;
}
</style>
</head>
<body>

<!-- 티커 -->
<div class="ticker">
  <span class="ticker-label">Energy CVC</span>
  <span class="ticker-sep">|</span>
  <span id="tickerDate" class="ticker-value">—</span>
  <span class="ticker-sep">|</span>
  <span id="tickerStats" class="ticker-value">로딩 중...</span>
  <span class="ticker-sep">|</span>
  <span class="ticker-label">팩트 전용</span>
  <span class="ticker-sep">|</span>
  <span class="ticker-value">NewsAPI + DART + 에너지 도메인 분석</span>
</div>

<!-- 마스트헤드 -->
<div class="mast">
  <div class="mast-in">
    <div class="mast-left">
      <div class="live-dot" id="liveLabel">LIVE</div>
    </div>
    <div class="mast-center">
      <div class="mast-title">Energy CVC Intelligence</div>
      <div class="mast-sub">에너지 투자 신호 · 팩트 기반 · 도메인 분석</div>
    </div>
    <div class="mast-right">
      <button class="btn-sm" id="copyBtn" style="display:none" onclick="copyReport()">복사</button>
    </div>
  </div>
</div>

<!-- 날짜 바 -->
<div class="datebar">
  <div class="datebar-in">
    <div class="datebar-date" id="dateLabel">—</div>
    <div class="datebar-actions">
      <span style="font-family:var(--mono);font-size:10px;color:var(--ink-4)" id="cvLabel"></span>
    </div>
  </div>
</div>

<!-- 탭 네비 -->
<div class="nav">
  <div class="nav-in">
    <button class="nav-tab on" onclick="switchTab('today')">Today's Signals</button>
    <button class="nav-tab" onclick="switchTab('dart')">DART 공시</button>
    <button class="nav-tab" onclick="switchTab('policy')">Policy Triggers</button>
    <button class="nav-tab" onclick="switchTab('history')">Archive</button>
  </div>
</div>

// ── 검색 필터 ─────────────────────────────────────────────
function getFiltered(){
  var raw=(document.getElementById("srch")||{value:""}).value.trim();
  var qs=raw.toLowerCase().split(/\s+/).filter(Boolean);
  return SIG.filter(function(s){
    if(curF==="kr")  return s.isKorean;
    if(curF==="gl")  return !s.isKorean&&!s.isChina;
    if(curF==="cn")  return s.isChina;
    if(curF==="hi")  return s.signal_quality==="High"||s.relevance==="High";
    if(curF==="iv")  return s.next_action==="Investigate";
    if(curF==="cv")  return s.cross_validation&&s.cross_validation.sourceCount>=2;
    return true;
  }).filter(function(s){
    if(!qs.length)return true;
    var hay=[
      s.company||"", s.title||"", s.label||"", s.summary||"",
      s.source||"", s.domain_insight||"", s.why_now||"",
      s.signal_quality||"", s.next_action||"", s.eventType||"",
      s.region||"", s.tag||""
    ].join(" ").toLowerCase();
    return qs.every(function(k){return hay.indexOf(k)>=0;});
  }).sort(function(a,b){
    var cv=function(s){return s.cross_validation?s.cross_validation.sourceCount:1;};
    var sq={High:3,Medium:1,Low:0};
    var sa=cv(a)*2+(sq[a.signal_quality||a.relevance]||0);
    var sb=cv(b)*2+(sq[b.signal_quality||b.relevance]||0);
    return sb-sa;
  });
}

// ── 피드 렌더링 ───────────────────────────────────────────
function renderFeed(){
  var sigs=getFiltered(), el=document.getElementById("feedCol");
  var h="";

  // 팩트 공지
  h+='<div class="fact-notice">'
    +'<span class="fact-dot">●</span>'
    +'<span>모든 신호는 실제 언론사 기사 또는 DART 공시 원문 링크 포함 &nbsp;·&nbsp; '
    +'AI는 에너지 도메인 해석만 제공 &nbsp;·&nbsp; 수치는 기사 원문에서만 추출</span>'
    +'</div>';

  // 브리핑
  if(DATA&&DATA.brief){
    h+='<div class="brief-box">'
      +'<div class="brief-label">CVC Intelligence Brief</div>'
      +'<div class="brief-text">'+e(DATA.brief)+'</div>'
      +'</div>';
  }

  if(!sigs.length){
    var raw2=(document.getElementById("srch")||{value:""}).value.trim();
    h+='<div class="empty">'
      +(raw2?'"'+e(raw2)+'" — No results':"No signals found")
      +(raw2?'<br><br><a href="#" onclick="document.getElementById(\'srch\').value=\'\';renderFeed();return false;" style="color:var(--accent-2);font-size:10px">Clear search</a>':"")
      +'</div>';
    el.innerHTML=h; return;
  }

  h+='<div class="feed-hd"><span class="feed-title">Investment Signals</span>'
    +'<span class="feed-count">'+sigs.length+' results</span></div>';

  sigs.forEach(function(s){
    var op=EXP.has(s.id);
    var isKr=s.isKorean, isCn=s.isChina, isDart=s.isDart||s.tag==="kr_dart";
    var cv=s.cross_validation||{};
    var sq=s.signal_quality||s.relevance||"Low";
    var facts=s.extracted_facts||{};
    var hasFactNums=facts.amount||facts.round||facts.partner;

    // 교차검증 뱃지
    var cvClass=cv.sourceCount>=3?"cv-3":cv.sourceCount>=2?"cv-2":"cv-1";
    var cvLabel=cv.sourceCount>=3?"3+ 소스":cv.sourceCount>=2?"2 소스":"단일 소스";

    h+='<div class="sig'+(op?" expanded":"")+(isDart?" dart-sig":"")+'" onclick="toggleExp(\''+s.id+'\')">'
      +'<div class="sig-meta">'
      +(isKr?'<span class="tag tag-kr">KR</span>':isCn?'<span class="tag tag-cn">CN</span>':'<span class="tag tag-gl">GL</span>')
      +(isDart?'<span class="tag tag-dart">DART</span>':"")
      +(s.eventType?'<span class="tag tag-ev">'+e(s.eventType)+'</span>':"")
      +(sq==="High"?'<span class="tag tag-H">HIGH</span>':sq==="Medium"?'<span class="tag tag-M">MED</span>':"")
      +(cv.sourceCount>=2?'<span class="tag tag-cv cv-'+(cv.sourceCount>=3?"3":"2")+'">'+cvLabel+'</span>':"")
      +'<span class="sig-time">'+e(s.pubDate||"")+'</span>'
      +'</div>'
      +(s.company?'<div class="sig-co">'+e(s.company)+'</div>':"")
      +'<div class="sig-title">'
      +(s.url?'<a href="'+e(s.url)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">'+e(s.title||"")+'</a>'
             :'<span>'+e(s.title||"")+'</span>')
      +'</div>'
      +'<div class="sig-src">'+e(s.source||"")+(s.next_action&&s.next_action!=="Monitor"&&s.next_action!=="Skip"?' &nbsp;·&nbsp; <strong style="color:var(--accent)">→ '+e(s.next_action)+'</strong>':"")+'</div>'
      +(!op?'<div class="expand-hint">▾ '+(s.domain_insight?"도메인 분석 보기":"요약 보기")+'</div>':"");

    if(op){
      h+='<div class="sig-body">';

      // 수치 추출 (기사에서 추출, 생성 아님)
      if(hasFactNums){
        h+='<div class="facts-row">';
        if(facts.amount) h+='<div class="fact-item"><span class="fact-label">Amount</span><span class="fact-value">'+e(facts.amount)+'</span></div>';
        if(facts.round)  h+='<div class="fact-item"><span class="fact-label">Round</span><span class="fact-value">'+e(facts.round)+'</span></div>';
        if(facts.partner)h+='<div class="fact-item"><span class="fact-label">Partner</span><span class="fact-value">'+e(facts.partner)+'</span></div>';
        if(facts.date)   h+='<div class="fact-item"><span class="fact-label">Date</span><span class="fact-value">'+e(facts.date)+'</span></div>';
        h+='<div class="fact-item"><span class="fact-label">Source</span><span class="fact-value" style="font-size:10px;color:var(--ink-4)">기사 원문 추출</span></div>';
        h+='</div>';
      }

      // 요약
      if(s.summary) h+='<div class="smr">'+e(s.summary)+'</div>';

      // 도메인 인사이트
      if(s.domain_insight){
        h+='<div class="insight">'
          +'<div class="insight-label">Energy Domain Analysis</div>'
          +'<div class="insight-text">'+e(s.domain_insight)+'</div>'
          +(s.why_now?'<div class="why-now">Why now: '+e(s.why_now)+'</div>':"")
          +'</div>';
      }

      // 교차검증 + 원문 링크
      h+='<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px">'
        +'<span class="cv-badge '+cvClass+'">'+cvLabel+' 교차검증</span>'
        +(s.url?'<a class="orig-link" href="'+e(s.url)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">원문 보기 →</a>':"")
        +'</div>';

      // 리스크
      if(s.risk) h+='<div class="risk-row">⚠ Risk: '+e(s.risk)+'</div>';

      h+='</div>';
    }
    h+='</div>';
  });

  el.innerHTML=h;
}

// ── UI 이벤트 ─────────────────────────────────────────────
function switchTab(tab){
  curTab=tab;
  document.querySelectorAll(".nav-tab").forEach(function(t,i){
    t.classList.toggle("on",["today","dart","policy","history"][i]===tab);
  });
  document.getElementById("filterBar").style.display=tab==="today"?"block":"none";
  if(tab==="today")  renderFeed();
  else if(tab==="dart")   renderDart();
  else if(tab==="policy") renderPolicy();
  else if(tab==="history")renderHistory();
}

function setF(f,btn){
  curF=f;
  document.querySelectorAll(".pill").forEach(function(c){c.classList.remove("on");});
  btn.classList.add("on");
  renderFeed();
}

function toggleExp(id){
  if(EXP.has(id)) EXP.delete(id); else EXP.add(id);
  renderFeed();
}

function e(s){
  return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

async function loadDate(date){
  try{
    var r=await fetch("data/"+date+".json?"+Date.now());
    if(!r.ok)throw new Error();
    DATA=await r.json(); SIG=DATA.signals||[];
    renderSidebar(); switchTab("today");
  }catch{ alert(date+" 데이터를 불러올 수 없습니다."); }
}

function copyReport(){
  if(!DATA)return;
  var s=DATA.stats||{};
  var t="ENERGY CVC INTELLIGENCE — "+(DATA.dateKr||DATA.date)+"\n"
    +"총 "+(s.total||0)+"건 · High "+(s.high||0)+" · 교차검증 "+(s.multiSource||0)+"건\n"
    +"━".repeat(50)+"\n\n";
  if(DATA.brief) t+="[CVC BRIEF]\n"+DATA.brief+"\n\n"+"━".repeat(50)+"\n\n";
  getFiltered().forEach(function(sig,i){
    var f=sig.extracted_facts||{};
    t+=(i+1)+". "+(sig.company||"")+" — "+sig.title+"\n";
    t+="   "+( sig.source||"")+" · "+(sig.pubDate||"")+"\n";
    if(f.amount||f.round) t+="   ["+[f.amount,f.round,f.partner].filter(Boolean).join(" · ")+"]\n";
    if(sig.domain_insight) t+="   ▶ "+sig.domain_insight+"\n";
    if(sig.why_now) t+="   Why now: "+sig.why_now+"\n";
    if(sig.url) t+="   "+sig.url+"\n";
    t+="\n";
  });
  navigator.clipboard.writeText(t)
    .then(function(){alert("Copied to clipboard");})
    .catch(function(){alert("Copy failed");});
}

document.addEventListener("DOMContentLoaded",function(){
  Promise.all([loadData(),loadIndex()]);
});
</script>
