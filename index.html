<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Capital Intelligence</title>
<style>
  body { 
    font-family: system-ui, -apple-system, sans-serif; 
    background: #f8f7f4; 
    color: #1f1f1f; 
    margin: 0; 
    padding: 24px; 
    line-height: 1.6; 
  }
  h1 { color: #0a6640; margin-bottom: 8px; }
  .subtitle { color: #666; font-size: 1.1rem; }
  .card { 
    background: white; 
    border-radius: 12px; 
    padding: 24px; 
    margin-bottom: 28px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.07); 
  }
  .memo { 
    background: #fffef0; 
    border-left: 6px solid #0a6640; 
    padding: 20px; 
    font-size: 1.05rem; 
  }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  th, td { padding: 14px 10px; text-align: left; border-bottom: 1px solid #eee; }
  th { background: #f0ede6; }
  .high { color: #0a6640; font-weight: 600; }
</style>
</head>
<body>
  <h1>Energy Capital Intelligence</h1>
  <p class="subtitle">에너지 투자 전문 심사역 관점 브리핑 • Updated: <span id="updated"></span></p>

  <div class="card memo" id="daily-memo">
    <h2>📝 Daily Investment Memo</h2>
    <div id="memo-content">인사이트를 생성하는 중입니다...</div>
  </div>

  <div class="card">
    <h2>🔥 High-Conviction Deals</h2>
    <table id="conviction-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Company / Deal</th>
          <th>Why Important (인사이트)</th>
          <th>Score</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    async function loadData() {
      try {
        const res = await fetch('data/latest.json?' + Date.now());
        const data = await res.json();

        document.getElementById('updated').textContent = new Date(data.generated_at || Date.now()).toLocaleString('ko-KR');

        document.getElementById('memo-content').innerHTML = data.daily_memo || "오늘의 인사이트가 아직 생성되지 않았습니다.";

        const tbody = document.querySelector('#conviction-table tbody');
        tbody.innerHTML = '';
        (data.high_conviction || []).forEach(item => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${item.date}</td>
            <td><strong>${item.company}</strong></td>
            <td>${item.insight}</td>
            <td class="high">${item.score}</td>
          `;
          tbody.appendChild(row);
        });
      } catch(e) {
        console.error(e);
        document.getElementById('memo-content').innerHTML = "데이터를 불러오는 중 오류가 발생했습니다.";
      }
    }

    window.onload = loadData;
    setInterval(loadData, 30000); // 30초마다 자동 갱신
  </script>
</body>
</html>
