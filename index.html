<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Energy CVC Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&family=Spectral:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#F6F4F0;color:#1A1710;min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:#E6E2DA;border-radius:99px;}
a{color:inherit;text-decoration:none;}

/* ── 헤더 ── */
.hdr{background:#0F2744;padding:12px 24px;position:sticky;top:0;z-index:100;border-bottom:1px solid #0A1E38;}
.hdr-in{max-width:1380px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.hdr h1{font-family:'Spectral',serif;font-size:17px;font-weight:700;color:#F0EDE6;letter-spacing:-0.2px;}
.hdr-sub{font-size:10px;color:#6B7F96;margin-top:2px;}
.badge-live{font-family:'DM Mono',monospace;font-size:10px;color:#4ADE80;padding:3px 10px;border-radius:20px;background:#0F3020;border:1px solid #1A5030;}

/* ── 탭 ── */
.tabs{background:#162336;border-bottom:1px solid #1E2E38;padding:0 24px;overflow-x:auto;}
.tabs-in{max-width:1380px;margin:0 auto;display:flex;min-width:max-content;}
.tab{font-size:11px;font-weight:500;color:#6B7F96;padding:11px 14px;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.tab.on{color:#C8DFF0;border-bottom-color:#4A9EFF;font-weight:600;}

/* ── 필터바 ── */
.fbar{background:#F6F4F0;padding:9px 24px;border-bottom:1px solid #E6E2DA;position:sticky;top:49px;z-index:90;}
.fbar-in{max-width:1380px;margin:0 auto;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.chip{font-size:11px;font-weight:500;padding:4px 11px;border-radius:20px;border:1px solid #E6E2DA;background:#fff;color:#4A4538;cursor:pointer;}
.chip.on{background:#1B3A5C;color:#fff;border-color:#1B3A5C;font-weight:600;}
.chip.kr.on{background:#2A1E00;color:#FCD34D;border-color:#FFD700;}
.chip.cn.on{background:#7A0000;color:#fff;border-color:#CC0000;}
.chip.g.on{background:#0F3020;color:#4ADE80;border-color:#1A5030;}
.srch{flex:1;min-width:150px;max-width:250px;padding:5px 12px;border:1px solid #E6E2DA;border-radius:20px;font-size:12px;outline:none;}
.srch:focus{border-color:#1B3A5C;}

/* ── 레이아웃 ── */
.wrap{max-width:1380px;margin:0 auto;padding:16px 24px;display:grid;grid-template-columns:200px 1fr;gap:16px;}
@media(max-width:768px){.wrap{grid-template-columns:1fr;padding:10px 12px;}}
.sidebar{display:flex;flex-direction:column;gap:10px;}
.card{background:#fff;border:1px solid #E6E2DA;border-radius:7px;overflow:hidden;}
.chd{padding:9px 13px;border-bottom:1px solid #F0EDE8;font-size:10px;font-weight:700;color:#8A8070;text-transform:uppercase;letter-spacing:0.5px;}
.cbd{padding:12px 13px;}

/* ── 신호 피드 ── */
.feed{background:#fff;border:1px solid #E6E2DA;border-radius:7px;overflow:hidden;}
.feed-hd{padding:10px 18px;border-bottom:1px solid #E6E2DA;display:flex;justify-content:space-between;align-items:center;}
.sig{border-bottom:1px solid #F0EDE8;cursor:pointer;}
.sig:last-child{border-bottom:none;}
.sig:hover{background:#FAF9F6;}
.sig-hd{padding:11px 18px;}
.sig-bd{padding:0 18px 13px;animation:fadeIn 0.2s;}
.bx{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;}
.b{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:3px;font-size:11px;font-weight:600;white-space:nowrap;}
.b-u{background:#EDF6F1;color:#1A5C36;border:1px solid #A7E3BE;}
.b-e{background:#EDF2F8;color:#1B3A5C;border:1px solid #C0D4EC;}
.b-l{background:#F4F2EE;color:#8A8070;border:1px solid #D8D0C4;}
.b-H{background:#FDF0F0;color:#7A2020;border:1px solid #F0C0C0;}
.b-M{background:#FDF4E8;color:#6B3600;border:1px solid #F0D8A8;}
.b-Lo{background:#F4F2EE;color:#8A8070;border:1px solid #D8D0C4;}
.b-act{background:#FDF0F0;color:#7A2020;border:1px solid #F0C0C0;font-weight:700;}
.b-stg{background:#F0EDE8;color:#5A4A30;border:1px solid #D8C8A0;}
.b-kr{background:#FFF8E0;color:#92400E;border:1px solid #EAD640;}
.b-cn{background:#FFF0F0;color:#CC0000;border:1px solid #FFB0B0;}
.b-gl{background:#EDF2F8;color:#1B3A5C;border:1px solid #C0D4EC;}
.b-rt{background:#EDF6F1;color:#1A5C36;border:1px solid #A7E3BE;font-size:10px;}
.tr{display:flex;align-items:baseline;gap:7px;flex-wrap:wrap;}
.co{font-size:13px;font-weight:700;flex-shrink:0;}
.tt{font-size:13px;font-weight:600;color:#1A1710;line-height:1.4;}
.tt:hover{color:#1B3A5C;text-decoration:underline;}
.hint{font-size:10px;color:#B8B0A0;margin-top:3px;}
.ins{background:#FFFBEE;border:1px solid #EAD640;border-radius:5px;padding:10px 12px;margin-bottom:7px;}
.ins-l{font-size:10px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px;}
.ins-t{font-size:12px;color:#4A3500;line-height:1.75;}
.act-b{background:#FFF8DC;border-radius:4px;padding:5px 8px;margin-top:5px;font-size:12px;color:#4A3500;}
.rsk{background:#FEF2F2;border:1px solid #FCA5A5;border-radius:4px;padding:5px 8px;margin-top:4px;font-size:11px;color:#7A2020;}
.src-r{font-size:10px;color:#B8B0A0;margin-bottom:8px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}

/* ── 스코어카드 ── */
.sc{background:#F0F7FF;border:1px solid #BFDBFE;border-radius:5px;padding:10px 12px;margin-bottom:7px;}
.sc-hd{font-size:10px;font-weight:700;color:#1E40AF;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:7px;display:flex;justify-content:space-between;}
.sc-g{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:6px;}
.sc-i{background:rgba(255,255,255,0.7);border-radius:3px;padding:5px 7px;}
.sc-il{font-size:10px;color:#4A5568;margin-bottom:2px;}
.sc-bw{display:flex;align-items:center;gap:4px;}
.sc-bb{flex:1;height:4px;background:#DBEAFE;border-radius:99px;overflow:hidden;}
.sc-bf{height:100%;background:#3B82F6;border-radius:99px;}
.sc-n{font-family:'DM Mono',monospace;font-size:10px;color:#1E40AF;font-weight:600;}
.sc-ol{font-size:11px;color:#1E3A8A;font-style:italic;padding-top:5px;border-top:1px solid #BFDBFE;margin-top:4px;}

/* ── 유사딜 ── */
.cd{background:#F5F3FF;border:1px solid #DDD6FE;border-radius:5px;padding:10px 12px;margin-bottom:7px;}
.cd-hd{font-size:10px;font-weight:700;color:#5B21B6;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:7px;}
.di{background:rgba(255,255,255,0.7);border-radius:4px;padding:6px 8px;margin-bottom:4px;}
.di:last-child{margin-bottom:0;}
.di-t{display:flex;justify-content:space-between;margin-bottom:2px;}
.di-co{font-size:12px;font-weight:700;color:#5B21B6;}
.di-am{font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:#7C3AED;}
.di-m{font-size:10px;color:#6D28D9;}

/* ── 정책 ── */
.pt{background:#FEF9E7;border:1px solid #FCD34D;border-radius:5px;padding:10px 12px;margin-bottom:7px;}
.pt-hd{font-size:10px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:5px;}

/* ── 통계 그리드 ── */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:13px;}
@media(max-width:600px){.sg{grid-template-columns:repeat(2,1fr);}}
.sc2{background:#fff;border:1px solid #E6E2DA;border-radius:7px;padding:10px 12px;}
.sc2-n{font-family:'DM Mono',monospace;font-size:20px;font-weight:700;}
.sc2-l{font-size:11px;color:#8A8070;margin-top:2px;}
.brief{background:#0F2744;border-radius:7px;padding:15px 19px;margin-bottom:13px;}
.brief-t{font-family:'Spectral',serif;font-size:13px;font-weight:700;color:#EDE9E0;margin-bottom:6px;}
.brief-b{font-size:12px;color:#9AB0C0;line-height:1.9;white-space:pre-wrap;}


.trust-fact{background:#EDF6F1;color:#1A5C36;border:1px solid #A7E3BE;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;}
.trust-ai{background:#EDF2F8;color:#1B3A5C;border:1px solid #C0D4EC;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;}
.trust-est{background:#FDF4E8;color:#A85400;border:1px solid #F0D8A8;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;}
.trust-banner{background:#F0FDF4;border:1px solid #A7E3BE;border-radius:6px;padding:9px 14px;margin-bottom:12px;font-size:11px;color:#1A5C36;line-height:1.7;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{animation:spin 1.5s linear infinite;display:inline-block;}

/* ═══════════════════════════════════════
   새 탭들 스타일
═══════════════════════════════════════ */

/* ── 시장 지도 ── */
.map-wrap{padding:0;}
.map-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.map-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#4A4538;}
.map-leg-dot{width:10px;height:10px;border-radius:50%;}
.sector-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;}
.sector-box{background:#fff;border:1px solid #E6E2DA;border-radius:8px;overflow:hidden;}
.sector-hd{padding:11px 15px;font-size:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.sector-companies{padding:10px 12px;display:flex;flex-wrap:wrap;gap:7px;}
.bubble{padding:7px 10px;border-radius:6px;cursor:pointer;transition:all 0.15s;position:relative;}
.bubble:hover{transform:translateY(-2px);box-shadow:0 3px 10px rgba(0,0,0,0.1);}
.bubble-name{font-size:12px;font-weight:600;}
.bubble-stage{font-size:10px;opacity:0.8;margin-top:1px;}
.bubble-score{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;position:absolute;top:4px;right:6px;}

/* ── 경쟁사 비교 ── */
.cmp-wrap{overflow-x:auto;}
.cmp-table{width:100%;border-collapse:collapse;font-size:12px;}
.cmp-table th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;color:#8A8070;text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid #E6E2DA;white-space:nowrap;background:#FAF9F6;}
.cmp-table td{padding:10px 14px;border-bottom:1px solid #F0EDE8;vertical-align:top;}
.cmp-table tr:hover td{background:#FAF9F6;}
.cmp-sector-row td{background:#F6F4F0;font-weight:600;color:#1B3A5C;padding:6px 14px;font-size:11px;}
.score-bar{display:flex;align-items:center;gap:5px;}
.score-bg{width:50px;height:5px;background:#F0EDE8;border-radius:99px;overflow:hidden;}
.score-fill{height:100%;border-radius:99px;}

/* ── 펀딩 타임라인 ── */
.timeline-wrap{padding:4px;}
.tl-company{margin-bottom:20px;}
.tl-name{font-size:13px;font-weight:700;color:#1A1710;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.tl-track{position:relative;padding:8px 0;}
.tl-line{position:absolute;top:50%;left:0;right:0;height:2px;background:#E6E2DA;transform:translateY(-50%);}
.tl-events{display:flex;gap:0;position:relative;z-index:1;justify-content:space-between;align-items:center;padding:0 10px;}
.tl-event{display:flex;flex-direction:column;align-items:center;gap:3px;}
.tl-dot{width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 2px currentColor;}
.tl-label{font-size:10px;font-weight:600;white-space:nowrap;}
.tl-date{font-family:'DM Mono',monospace;font-size:9px;color:#B8B0A0;}
.tl-pred{border:2px dashed currentColor!important;background:#fff!important;}

/* ── 대기업 생태계 ── */
.eco-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px;}
.eco-card{background:#fff;border:1px solid #E6E2DA;border-radius:8px;overflow:hidden;}
.eco-hd{padding:12px 16px;display:flex;align-items:center;gap:10px;}
.eco-logo{width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;}
.eco-name{font-size:14px;font-weight:700;color:#1A1710;}
.eco-sub{font-size:11px;color:#8A8070;}
.eco-strategy{padding:10px 16px;font-size:12px;color:#4A4538;line-height:1.65;border-bottom:1px solid #F0EDE8;}
.eco-startups{padding:10px 16px;}
.eco-startup-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #F6F4F0;}
.eco-startup-item:last-child{border-bottom:none;}
.eco-startup-name{font-size:12px;font-weight:600;color:#1A1710;}
.eco-startup-rel{font-size:11px;color:#8A8070;}
.eco-startup-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;}

/* ── 주간 리포트 ── */
.weekly-wrap{max-width:700px;}
.weekly-preview{background:#fff;border:1px solid #E6E2DA;border-radius:8px;overflow:hidden;margin-bottom:14px;}
.weekly-preview-hd{background:#0F2744;padding:14px 18px;}
.weekly-settings{padding:16px;}

/* ── 프로파일 ── */
.prof-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.prof-card{background:#fff;border:1px solid #E6E2DA;border-radius:7px;padding:14px;cursor:pointer;transition:all 0.15s;}
.prof-card:hover{border-color:#1B3A5C;box-shadow:0 2px 8px rgba(27,58,92,0.1);}
.hist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:9px;}
.hist-card{background:#fff;border:1px solid #E6E2DA;border-radius:7px;padding:12px;cursor:pointer;transition:all 0.15s;}
.hist-card:hover{border-color:#1B3A5C;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-in">
    <div>
      <h1>⚡ Energy CVC Intelligence</h1>
      <div class="hdr-sub">국내 + 글로벌 + 중국 · 시장지도 · 경쟁사 비교 · 펀딩 타임라인 · 생태계 레이더</div>
    </div>
    <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;">
      <div class="badge-live" id="liveBadge">● 로딩 중</div>
      <button id="copyBtn" onclick="copyReport()" style="display:none;font-size:11px;font-weight:600;padding:5px 11px;border-radius:5px;background:#1A5C36;color:#fff;border:none;cursor:pointer;">📋 복사</button>
    </div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tabs-in">
    <button class="tab on" onclick="switchTab('today')">📡 오늘 신호</button>
    <button class="tab" onclick="switchTab('map')">🗺 시장 지도</button>
    <button class="tab" onclick="switchTab('compare')">📊 경쟁사 비교</button>
    <button class="tab" onclick="switchTab('timeline')">⏱ 펀딩 타임라인</button>
    <button class="tab" onclick="switchTab('ecosystem')">🏭 대기업 생태계</button>
    <button class="tab" onclick="switchTab('profiles')">🏢 기업 프로파일</button>
    <button class="tab" onclick="switchTab('weekly')">📧 주간 리포트</button>
    <button class="tab" onclick="switchTab('history')">🗂 과거</button>
  </div>
</div>

<!-- FILTER BAR -->
<div class="fbar" id="filterBar">
  <div class="fbar-in">
    <input class="srch" id="srch" placeholder="🔍 기업명, 키워드… (예: 수소, High, ESS)" oninput="renderFeed()">
    <button class="chip on"  onclick="setF('all',this)">전체</button>
    <button class="chip kr"  onclick="setF('kr',this)">🇰🇷 국내</button>
    <button class="chip"     onclick="setF('gl',this)">🌍 글로벌</button>
    <button class="chip cn"  onclick="setF('cn',this)">🇨🇳 중국</button>
    <button class="chip g"   onclick="setF('un',this)">🟢 비상장</button>
    <button class="chip"     onclick="setF('hi',this)">🔴 High</button>
    <button class="chip"     onclick="setF('iv',this)">⚡ 즉시검토</button>
    <button class="chip"     onclick="setF('sc',this)">📊 스코어카드</button>
  </div>
</div>

<!-- MAIN -->
<div class="wrap" id="mainWrap">
  <div class="sidebar">
    <div class="card"><div class="chd">요약</div><div class="cbd" id="statsBox"><div style="font-size:11px;color:#B8B0A0">로딩 중…</div></div></div>
    <div class="card"><div class="chd">🗂 날짜별</div><div class="cbd" style="padding:6px 6px" id="dateList"></div></div>
    <div class="card"><div class="chd">📋 정책 트리거</div><div class="cbd" id="policyMini"></div></div>
  </div>
  <div id="feedArea"><div style="text-align:center;padding:40px;"><div class="spin" style="font-size:26px">⟳</div><div style="font-size:13px;color:#8A8070;margin-top:10px">로딩 중…</div></div></div>
</div>

<!-- 설정 패널 -->
<div id="settingsPanel" style="display:none;padding:24px;max-width:560px;margin:0 auto;">
  <div class="card"><div class="chd">API 설정</div><div class="cbd">
    <div style="padding:12px;background:#F0FDF4;border-radius:5px;border:1px solid #A7E3BE;font-size:11px;color:#1A5C36;line-height:1.8">
      ✓ 매일 오전 7시 KST 자동 실행<br>✓ NewsAPI 실제 뉴스 수집<br>✓ Claude AI 투자 분석<br>✓ 기업 프로파일 누적 저장<br>✓ 스코어카드 자동 생성
    </div>
  </div></div>
</div>

<script>
// ── 데이터 ────────────────────────────────────────────────
let DATA=null, SIG=[], IDX=[], PROF={}, POL=[];
let curF="all", curTab="today", EXP=new Set();

// ── 시장 지도 데이터 ──────────────────────────────────────
const MARKET_MAP = [
  { sector:"ESS — Long Duration", color:"#1B3A5C", bg:"#EDF2F8",
    kr:[{name:"스탠다드에너지",stage:"Series-B",score:82,tag:"바나듐 플로우"},{name:"씨에스에너지",stage:"Series-A",score:64,tag:"리튬 ESS"},{name:"하나기술",stage:"Series-A",score:58,tag:"산업용 ESS"},{name:"에이치에너지",stage:"Pre-A",score:45,tag:"장주기"}],
    global:[{name:"Form Energy",stage:"Series-E",score:92,tag:"철-공기"},{name:"Ambri",stage:"Series-E",score:88,tag:"액체금속"},{name:"Hydrostor",stage:"Series-C",score:79,tag:"압축공기"},{name:"CMBlu",stage:"Series-B",score:71,tag:"유기 플로우"}] },
  { sector:"수소 / 연료전지", color:"#0F4A3A", bg:"#E8F5F1",
    kr:[{name:"하이리움산업",stage:"Series-B",score:76,tag:"액화수소"},{name:"에스퓨얼셀",stage:"Series-A",score:68,tag:"건물용 PAFC"},{name:"범한퓨얼셀",stage:"Series-A",score:65,tag:"선박 SOFC"},{name:"그린수소시스템",stage:"Seed",score:41,tag:"PEM 수전해"}],

  });
}
function getFiltered(){
  const raw=(document.getElementById("srch")||{value:""}).value.trim();
  const qs=raw.toLowerCase().split(/\s+/).filter(Boolean);
  return SIG.filter(function(s){
    if(curF==="kr")return s.isKorean;
    if(curF==="gl")return !s.isKorean&&!s.isChina;
    if(curF==="cn")return s.isChina;
    if(curF==="un")return s.companyType==="unlisted_startup";
    if(curF==="hi")return s.relevance==="High";
    if(curF==="iv")return s.next_action==="Investigate";
    if(curF==="sc")return !!s.scorecard;
    return true;
  }).filter(function(s){
    if(!qs.length)return true;
    var hay=[
      s.company||"", s.title||"", s.category||"", s.deep_insight||"",
      s.summary||"", s.source||"", s.country||"", s.region||"",
      s.fundingStage||"", s.eventType||"", s.relevance||"",
      s.signal_type||"", s.next_action||"", s.cvc_action||"", s.risk||"",
      (s.policyTriggers||[]).map(function(p){return p.label||"";}).join(" "),
      (s.comparableDeals||[]).map(function(d){return d.company||"";}).join(" ")
    ].join(" ").toLowerCase();
    return qs.every(function(k){return hay.indexOf(k)>=0;});
  }).sort(function(a,b){
    var sa=(a.companyType==="unlisted_startup"?10:0)+({High:3,Medium:1,Low:0}[a.relevance]||0);
    var sb=(b.companyType==="unlisted_startup"?10:0)+({High:3,Medium:1,Low:0}[b.relevance]||0);
    return sb-sa;
  });
}

      sp.style.cssText="font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,0.7);color:"+uc+";font-weight:500;";
      sp.textContent=c.split("(")[0].trim();
      cw.appendChild(sp);
    });
    card.appendChild(cw);
    if(p.url){
      const btn=document.createElement("a");
      btn.href=p.url; btn.target="_blank"; btn.rel="noopener noreferrer";
      btn.style.cssText="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#1B3A5C;font-weight:600;padding:5px 12px;border:1px solid #C0D4EC;border-radius:4px;background:#EDF2F8;text-decoration:none;margin-bottom:6px;";
      btn.textContent="🔗 "+(p.urlLabel||"공식 문서")+" →";
      btn.onmouseover=function(){this.style.background="#DBEAFE";};
      btn.onmouseout =function(){this.style.background="#EDF2F8";};
      card.appendChild(btn);
      const note=document.createElement("div");
      note.style.cssText="font-size:10px;color:#1A5C36;";
      note.textContent="✓ 팩트 — 실제 정부/기관 공식 출처";
      card.appendChild(note);
    }
    grid.appendChild(card);
  });
  el.innerHTML="";
  el.appendChild(grid);
}
function renderHistory(){
  const el=document.getElementById("feedArea");
  if(!IDX.length){el.innerHTML=`<div style="text-align:center;padding:48px"><div style="font-size:14px;color:#8A8070">히스토리 없음</div></div>`;return;}
  el.innerHTML=`<div class="hist-grid">${IDX.map(d=>`<div class="hist-card" onclick="loadDate('${d.date}')"><div style="font-family:'DM Mono',monospace;font-size:12px;color:#1B3A5C;font-weight:600;margin-bottom:4px">${d.date}</div><div style="font-size:12px;color:#4A4538;margin-bottom:6px">${d.dateKr||""}</div><div style="display:flex;gap:8px;flex-wrap:wrap">${[{n:d.stats?.total||0,l:"총",c:"#1A1710"},{n:d.stats?.high||0,l:"High",c:"#B83232"},{n:d.stats?.kr||0,l:"국내",c:"#B8860B"},{n:d.stats?.cn||0,l:"중국",c:"#CC0000"}].map(x=>`<span style="font-size:11px;color:${x.c}">${x.l} ${x.n}</span>`).join("")}</div></div>`).join("")}</div>`;
}

// ── UI ────────────────────────────────────────────────────
function switchTab(tab){
  curTab=tab;
  document.querySelectorAll(".tab").forEach((t,i)=>{t.classList.toggle("on",["today","map","compare","timeline","ecosystem","profiles","weekly","history","settings"][i]===tab);});
  document.getElementById("filterBar").style.display=tab==="today"?"block":"none";
  document.getElementById("settingsPanel").style.display=tab==="settings"?"block":"none";
  document.getElementById("mainWrap").style.display=tab==="settings"?"none":"grid";
  if(tab==="today")renderFeed();
  else if(tab==="map")renderMarketMap();
  else if(tab==="compare")renderCompare();
  else if(tab==="timeline")renderTimeline();
  else if(tab==="ecosystem")renderEcosystem();
  else if(tab==="profiles")renderProfiles();
  else if(tab==="weekly")renderWeekly();
  else if(tab==="history")renderHistory();
}

function setF(f,btn){curF=f;document.querySelectorAll(".chip").forEach(c=>c.classList.remove("on"));btn.classList.add("on");renderFeed();}
function toggleExp(id){if(EXP.has(id))EXP.delete(id);else EXP.add(id);renderFeed();}
function e(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

async function loadDate(date){
  try{const r=await fetch(`data/${date}.json?`+Date.now());if(!r.ok)throw new Error();DATA=await r.json();SIG=DATA.signals||[];POL=DATA.policyTriggers||[];switchTab("today");}
  catch{alert(`${date} 데이터를 불러올 수 없습니다.`);}
}

function copyReport(){
  if(!DATA)return;
  const s=DATA.stats;
  let t=`ENERGY CVC INTELLIGENCE — ${DATA.dateKr||DATA.date}\n총 ${s.total}건 · 비상장 ${s.unlisted||0} · High ${s.high}\n${"=".repeat(60)}\n\n`;
  if(DATA.brief)t+=`【CVC 딥 브리핑】\n${DATA.brief}\n\n${"=".repeat(60)}\n\n`;
  getFiltered().forEach((sig,i)=>{
    t+=`${i+1}. [${sig.relevance}] ${sig.company||""} (${sig.fundingStage||sig.companyType})\n   ${sig.title}\n   ${sig.source||""} · ${sig.pubDate||""}\n   ${sig.summary||""}\n`;
    if(sig.deep_insight)t+=`   ▶ ${sig.deep_insight}\n`;
    if(sig.cvc_action)t+=`   📋 ${sig.cvc_action}\n`;
    if(sig.risk)t+=`   ⚠ ${sig.risk}\n`;
    if(sig.scorecard)t+=`   📊 ${sig.scorecard.conviction} · ${sig.scorecard.timing_signal} · ${sig.scorecard.one_line||""}\n`;
    if(sig.url)t+=`   🔗 ${sig.url}\n`;
    t+="\n";
  });
  navigator.clipboard.writeText(t).then(()=>alert("✅ 복사 완료!")).catch(()=>alert("복사 실패"));
}

document.addEventListener("DOMContentLoaded",async()=>{
  await Promise.all([loadLatest(),loadIndex(),loadProfiles()]);
});
</script>
